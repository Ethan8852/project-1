            :`<span class="modal-task-text${t.starred?' starred-text':''}" onclick="startModalEdit('today',${t.id},-1)">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row" id="mtask-t-${t.id}"><span class="modal-task-dot todo"></span>${el}<button class="modal-check-btn" onclick="modalCompleteTask(${t.id})" title="완료 처리">✓</button><button class="modal-del-btn" onclick="deleteModalTask(${t.id})">×</button></div>`;
        }).join('');
      }
      if(dones.length>0){
        html+='<div class="modal-section-title">✅ 완료 <span class="edit-hint">· 탭하여 수정</span></div>';
        html+=dones.map(t=>{
          const isEd=modalEditInfo&&modalEditInfo.type==='today-done'&&modalEditInfo.id===t.id;
          const el=isEd
            ?`<input class="modal-edit-input" id="medit-td-${t.id}" value="${escapeHtml(t.text)}"
                onkeydown="handleModalEditKey(event,'today-done',${t.id},-1)" onblur="cancelModalEdit()" onclick="event.stopPropagation()">`
            :`<span class="modal-task-text done-style" onclick="startModalEdit('today-done',${t.id},-1)">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row" id="mtask-td-${t.id}"><span class="modal-task-dot done"></span>${el}<button class="modal-check-btn done-state" onclick="modalUndoComplete(${t.id})" title="되돌리기">✓</button><button class="modal-del-btn" onclick="deleteModalDoneTask(${t.id})" title="삭제">×</button></div>`;
        }).join('');
      }
      const todayLong=(state.longTasks||[]).filter(t=>t.stage>0&&t.startDate&&t.startDate<=today);
      if(todayLong.length>0){
        html+='<div class="modal-section-title">📌 진행 중 장기업무 <span class="edit-hint">· ▸ 버튼으로 단계 진행</span></div>';
        html+=todayLong.map(t=>{
          const stageLabel=['미시작','시작','진행중','마무리'][t.stage];
          return`<div class="modal-task-row" id="mlong-${t.id}"><span class="modal-task-dot" style="background:#A2D2FF"></span><span class="modal-task-text${t.starred?' starred-text':''}">${t.starred?'⭐ ':''}${escapeHtml(t.text)} <span class="long-badge">장기</span></span><button class="modal-check-btn" style="width:auto;border-radius:8px;padding:0 8px;font-size:10px;border-color:#A2D2FF;color:#5A90BE;white-space:nowrap" onclick="advanceLongStageFromModal(${t.id})" title="다음 단계">${stageLabel} ▸</button></div>`;
        }).join('');
      }
    }
  }else if(dateStr<today){
    const log=state.log[dateStr];
    const pastLong=[...(state.longTasks||[]).filter(t=>{if(!t.startDate||t.stage===0)return false;const end=t.endDate||today;return t.startDate<=dateStr&&dateStr<=end;}),...(state.doneLongTasks||[]).filter(t=>{if(!t.startDate||!t.endDate)return false;return t.startDate<=dateStr&&dateStr<=t.endDate;})];
    if((!log||((!log.done||log.done.length===0)&&(!log.missed||log.missed.length===0)))&&pastLong.length===0){html='<div class="modal-empty">이 날의 기록이 없어요</div>';}
    else{
      if(log&&log.done&&log.done.length>0){
        html+='<div class="modal-section-title">✅ 완료한 일 <span class="edit-hint">· 탭하여 수정</span></div>';
        html+=log.done.map((t,i)=>{
          const isEd=modalEditInfo&&modalEditInfo.type==='log-done'&&modalEditInfo.idx===i;
          const el=isEd
            ?`<input class="modal-edit-input" id="medit-ld-${i}" value="${escapeHtml(t.text)}"
                onkeydown="handleModalEditKey(event,'log-done',-1,${i})" onblur="cancelModalEdit()" onclick="event.stopPropagation()">`
            :`<span class="modal-task-text done-style" onclick="startModalEdit('log-done',-1,${i})">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row" id="mlog-d-${i}"><span class="modal-task-dot done"></span>${el}<button class="modal-del-btn" onclick="deleteLogTask('${dateStr}','done',${i})" title="삭제">×</button></div>`;
        }).join('');
      }
      if(log&&log.missed&&log.missed.length>0){
        html+='<div class="modal-section-title">❌ 미완료 <span class="edit-hint">· 탭하여 수정</span></div>';
        html+=log.missed.map((t,i)=>{
          const isEd=modalEditInfo&&modalEditInfo.type==='log-missed'&&modalEditInfo.idx===i;
          const el=isEd
            ?`<input class="modal-edit-input" id="medit-lm-${i}" value="${escapeHtml(t.text)}"
                onkeydown="handleModalEditKey(event,'log-missed',-1,${i})" onblur="cancelModalEdit()" onclick="event.stopPropagation()">`
            :`<span class="modal-task-text missed-style" onclick="startModalEdit('log-missed',-1,${i})">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row" id="mlog-m-${i}"><span class="modal-task-dot missed"></span>${el}<button class="modal-del-btn" onclick="deleteLogTask('${dateStr}','missed',${i})" title="삭제">×</button></div>`;
        }).join('');
      }
      if(pastLong.length>0){
        html+='<div class="modal-section-title">📌 장기업무</div>';
        html+=pastLong.map(t=>{
          const isDone=!!t.done;
          const stageLabel=isDone?'완료':(['미시작','시작','진행중','마무리'][t.stage]||'');
          return`<div class="modal-task-row"><span class="modal-task-dot" style="background:${isDone?'linear-gradient(135deg,#CDB4DB,#FFAFCC)':'#A2D2FF'}"></span><span class="modal-task-text${isDone?' done-style':''}">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span><span class="long-cur-stage s${isDone?3:t.stage}" style="font-size:10px">${stageLabel}</span></div>`;
        }).join('');
      }
    }
  }else{
    const future=state.futureTasks[dateStr]||[];
    const futureLong=(state.longTasks||[]).filter(t=>{if(!t.startDate||t.stage===0)return false;const end=t.endDate||today;return t.startDate<=dateStr&&dateStr<=end;});
    if(future.length===0&&futureLong.length===0){html='<div class="modal-empty">예정된 할 일이 없어요<br>아래에서 추가해보세요 📅</div>';}
    else{
      if(future.length>0){
        html+='<div class="modal-section-title">📅 예정</div>';
        html+=future.map((t,i)=>{
          const isEd=modalEditInfo&&modalEditInfo.type==='future'&&modalEditInfo.idx===i&&modalEditInfo.date===dateStr;
          const el=isEd
            ?`<input class="modal-edit-input" id="medit-f-${i}" value="${escapeHtml(t.text)}"
                onkeydown="handleModalEditKey(event,'future',-1,${i})" onblur="cancelModalEdit()" onclick="event.stopPropagation()">`
            :`<span class="modal-task-text" onclick="startModalEdit('future',-1,${i})">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row" id="mtask-f-${i}"><span class="modal-task-dot future"></span>${el}<button class="modal-del-btn" onclick="deleteFutureTask('${dateStr}',${i})">×</button></div>`;
        }).join('');
      }
      if(futureLong.length>0){
        html+='<div class="modal-section-title">📌 장기업무</div>';
        html+=futureLong.map(t=>{
          const stageLabel=['미시작','시작','진행중','마무리'][t.stage];
          return`<div class="modal-task-row"><span class="modal-task-dot" style="background:#A2D2FF"></span><span class="modal-task-text">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span><span class="long-cur-stage s${t.stage}" style="font-size:10px">${stageLabel}</span></div>`;
        }).join('');
      }
    }
  }
  document.getElementById('dayModalBody').innerHTML=html;
  if(modalEditInfo){
    const inputId=getModalInputId(modalEditInfo.type,modalEditInfo.id,modalEditInfo.idx);
    if(inputId){const inp=document.getElementById(inputId);if(inp){inp.focus();inp.select();}}
  }
}
function startModalEdit(type,id,idx){modalEditInfo={type,id,idx,date:currentModalDate};renderDayModal();}
function cancelModalEdit(){modalEditInfo=null;renderDayModal();}
function modalCompleteTask(id){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;
  const text=t.text;
  const el=document.getElementById(`mtask-t-${id}`);
  if(el)el.classList.add('completing');
  setTimeout(()=>{_doComplete(id);celebrate(text);renderDayModal();},350);
}
function modalUndoComplete(id){
  undoComplete(id);renderDayModal();
}
function advanceLongStageFromModal(id){
  advanceLongStage(id);renderDayModal();renderCal();
}
function handleModalEditKey(e,type,id,idx){
  if(e.key==='Enter'){
    e.preventDefault();
    const inputId=getModalInputId(type,id,idx);
    const inp=inputId?document.getElementById(inputId):null;if(!inp)return;
    const newText=inp.value.trim();if(!newText)return;
    const dateStr=currentModalDate;let changed=false;
    if(type==='today'){const t=state.tasks.find(t=>t.id===id);if(t&&t.text!==newText){t.text=newText;changed=true;saveState();render();}}
    else if(type==='today-done'){const t=state.doneTasks.find(t=>t.id===id);if(t&&t.text!==newText){t.text=newText;changed=true;saveState();renderDone();}}
    else if(type==='future'){if(state.futureTasks[dateStr]&&state.futureTasks[dateStr][idx]&&state.futureTasks[dateStr][idx].text!==newText){state.futureTasks[dateStr][idx].text=newText;changed=true;saveState();}}
    else if(type==='log-done'){if(state.log[dateStr]&&state.log[dateStr].done&&state.log[dateStr].done[idx]&&state.log[dateStr].done[idx].text!==newText){state.log[dateStr].done[idx].text=newText;changed=true;saveState();}}
    else if(type==='log-missed'){if(state.log[dateStr]&&state.log[dateStr].missed&&state.log[dateStr].missed[idx]&&state.log[dateStr].missed[idx].text!==newText){state.log[dateStr].missed[idx].text=newText;changed=true;saveState();}}
    modalEditInfo=null;renderDayModal();renderCal();
    if(changed)showToast(`<strong>✏️ 수정 완료!</strong> "${escapeHtml(newText)}"`, 'edit');
  }
  if(e.key==='Escape'){e.preventDefault();cancelModalEdit();}
}
function deleteModalTask(id){
  const t=state.tasks.find(t=>t.id===id);
  const el=document.getElementById(`mtask-t-${id}`);
  if(el)el.classList.add('deleting');
  setTimeout(()=>{
    if(pendingComplete[id]){clearTimeout(pendingComplete[id].timerId);delete pendingComplete[id];}
    clearInterval(alarmTimers[id]);state.tasks=state.tasks.filter(t=>t.id!==id);
    saveState();render();renderDayModal();renderCal();
    if(t)showToast(`🗑 "<strong>${escapeHtml(t.text)}</strong>" 삭제됨`);
  },300);
}
function deleteModalDoneTask(id){
  const t=state.doneTasks.find(t=>t.id===id);
  const el=document.getElementById(`mtask-td-${id}`);
  if(el)el.classList.add('deleting');
  setTimeout(()=>{
    state.doneTasks=state.doneTasks.filter(t=>t.id!==id);
    saveState();renderDone();updateProgress();renderDayModal();renderCal();
    if(t)showToast(`🗑 "<strong>${escapeHtml(t.text)}</strong>" 삭제됨`);
  },300);
}
function deleteLogTask(dateStr,type,idx){
  if(!state.log[dateStr]||!state.log[dateStr][type])return;
  const t=state.log[dateStr][type][idx];
  const elId=type==='done'?`mlog-d-${idx}`:`mlog-m-${idx}`;
  const el=document.getElementById(elId);if(el)el.classList.add('deleting');
  setTimeout(()=>{
    if(!state.log[dateStr]||!state.log[dateStr][type])return;
    state.log[dateStr][type].splice(idx,1);
    if((!state.log[dateStr].done||state.log[dateStr].done.length===0)&&(!state.log[dateStr].missed||state.log[dateStr].missed.length===0))delete state.log[dateStr];
    saveState();renderDayModal();renderCal();
    if(t)showToast(`🗑 "<strong>${escapeHtml(t.text)}</strong>" 삭제됨`);
  },300);
}
function deleteFutureTask(dateStr,idx){
  const t=state.futureTasks[dateStr]&&state.futureTasks[dateStr][idx];
  const el=document.getElementById(`mtask-f-${idx}`);
  if(el)el.classList.add('deleting');
  setTimeout(()=>{
    if(!state.futureTasks[dateStr])return;
    state.futureTasks[dateStr].splice(idx,1);
    if(state.futureTasks[dateStr].length===0)delete state.futureTasks[dateStr];
    saveState();renderDayModal();renderCal();
    if(t)showToast(`🗑 "<strong>${escapeHtml(t.text)}</strong>" 삭제됨`);
  },300);
}
function addDayTask(){
  const input=document.getElementById('dayTaskInput');
  const text=input.value.trim();if(!text)return;
  const today=todayStr();
  if(currentModalDate===today){
    const task={id:state.nextId++,text,registeredAt:Date.now(),done:false,starred:false};
    state.tasks.push(task);scheduleAlarm(task);saveState();render();
  }else if(currentModalDate>today){
    if(!state.futureTasks[currentModalDate])state.futureTasks[currentModalDate]=[];
    state.futureTasks[currentModalDate].push({id:state.nextId++,text,starred:false});saveState();
  }
  input.value='';renderDayModal();renderCal();
  showToast(`<strong>➕ 할 일 추가됨</strong> — "${escapeHtml(text)}"`, 'success');
}

function printCal(){
  const win=window.open('','_blank','width=1100,height=800');
  if(!win){alert('팝업이 차단되었어요.');return;}
  const dows=['일','월','화','수','목','금','토'];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayD=new Date();
  const mNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let cells='';
  cells+=dows.map((d,i)=>`<div class="dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)cells+=`<div class="day empty"></div>`;
  let tDone=0,tMissed=0,tTodo=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isT=todayD.getFullYear()===calYear&&todayD.getMonth()===calMonth&&todayD.getDate()===d;
    const dow=new Date(calYear,calMonth,d).getDay();
    const data=getDayData(ds);let chips='';
    if(data){
      (data.done||[]).forEach(t=>{tDone++;chips+=`<div class="chip done">${t.starred?'★ ':''}${escapeHtml(t.text)}</div>`;});
      (data.missed||[]).forEach(t=>{tMissed++;chips+=`<div class="chip missed">${t.starred?'★ ':''}${escapeHtml(t.text)}</div>`;});
      (data.todo||[]).forEach(t=>{tTodo++;chips+=`<div class="chip todo">${t.starred?'★ ':''}${escapeHtml(t.text)}</div>`;});
    }
    const cls=['day',isT?'today':'',dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}"><div class="dn${isT?' tc':''}">${d}</div>${chips}</div>`;
  }
  const rate=tDone+tMissed>0?Math.round(tDone/(tDone+tMissed)*100):0;
  const mOriginP=new Date(`${calYear}-${pad(calMonth+1)}-01T00:00:00`);
  const allLongP=[...(state.longTasks||[]),...(state.doneLongTasks||[])];
  const monthStartP=`${calYear}-${pad(calMonth+1)}-01`;
  const monthEndP=`${calYear}-${pad(calMonth+1)}-${pad(daysInMonth)}`;
  const visibleP=allLongP.filter(t=>{const s=t.startDate||t.endDate;if(!s)return false;const e=t.endDate||todayStr();return s<=monthEndP&&e>=monthStartP;});
  let ganttHtml='';
  if(visibleP.length>0){
    const ganttRows=visibleP.map(t=>{
      const sDate=new Date((t.startDate||todayStr())+'T12:00:00');
      const eDate=new Date((t.endDate||todayStr())+'T12:00:00');
      const sDay=Math.round((sDate-mOriginP)/86400000)+1;
      const eDay=Math.round((eDate-mOriginP)/86400000)+1;
      const clampS=Math.max(1,Math.min(daysInMonth,sDay));
      const clampE=Math.max(1,Math.min(daysInMonth,eDay));
      const leftPct=((clampS-1)/daysInMonth)*100;
      const wPct=Math.max(1.5,((clampE-clampS+1)/daysInMonth)*100);
      const isDone=!!t.done;
      const days=Math.max(1,Math.round((eDate-sDate)/86400000)+1);
      const stLabel=isDone?'완료':['미시작','시작','진행중','마무리'][t.stage]||'미시작';
      return`<div class="gr"><div class="gl">${t.starred?'★ ':''}${escapeHtml(t.text)}</div><div class="gt"><div class="gb${isDone?'':' gba'}" style="left:${leftPct.toFixed(1)}%;width:${wPct.toFixed(1)}%;"></div></div><div class="gs">${stLabel}</div></div>`;
    }).join('');
    ganttHtml=`<div class="gantt-section"><div class="g-hdr">📊 장기업무 일정 (간트)</div><div class="g-body">${ganttRows}</div></div>`;
  }
  win.document.write(`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">

// ══ 매일 반복 ══
function checkRecurring(){
  if(!state.recurringTasks||state.recurringTasks.length===0)return;
  const today=todayStr();
  const nowTs=Date.now();
  let added=false;
  state.recurringTasks.forEach(rt=>{
    const exists=state.tasks.some(t=>t.text===rt.text)||state.doneTasks.some(t=>t.text===rt.text);
    if(!exists){
      const task={id:state.nextId++,text:rt.text,registeredAt:nowTs,done:false,starred:rt.starred||false,isRecurring:true};
      state.tasks.push(task);scheduleAlarm(task);added=true;
    }
  });
  state.recurringLastDate=today;
  if(added){saveState();render();}
}
function scheduleRecurringCheck(){
  const now=new Date();
  const next9=new Date(now.getFullYear(),now.getMonth(),now.getDate(),9,0,0,0);
  if(now>=next9)next9.setDate(next9.getDate()+1);
  setTimeout(()=>{checkRecurring();scheduleRecurringCheck();},next9-now);
}
function openRecurringModal(){
  renderRecurringBody();
  document.getElementById('recurringOverlay').classList.add('active');
  document.getElementById('recurringModal').classList.add('active');
}
function closeRecurringModal(){
  document.getElementById('recurringOverlay').classList.remove('active');
  document.getElementById('recurringModal').classList.remove('active');
}
let recurringEditId=null;
function renderRecurringBody(){
  const body=document.getElementById('recurringBody');
  if(!state.recurringTasks||state.recurringTasks.length===0){
    body.innerHTML='<div class="modal-empty">매일 자동 등록할 할 일이 없어요<br>아래에서 추가하세요 🔁</div>';return;
  }
  body.innerHTML=state.recurringTasks.map(rt=>{
    const isEd=recurringEditId===rt.id;
    return`<div class="recurring-item">
      <span style="font-size:14px">🔁</span>
      ${isEd
        ?`<input class="recurring-edit-input" id="rec-edit-${rt.id}" value="${escapeHtml(rt.text)}"
            onkeydown="saveRecurringEdit(event,${rt.id})" onblur="cancelRecurringEdit()" onclick="event.stopPropagation()">`
        :`<span class="recurring-item-text" onclick="startRecurringEdit(${rt.id})" title="클릭하여 수정">${escapeHtml(rt.text)}${rt.starred?' ⭐':''}</span>`}
      <button class="recurring-del-btn" onclick="removeRecurringTask(${rt.id})">×</button>
    </div>`;
  }).join('');
  if(recurringEditId){const inp=document.getElementById(`rec-edit-${recurringEditId}`);if(inp){inp.focus();inp.select();}}
}
function startRecurringEdit(id){recurringEditId=id;renderRecurringBody();}
function cancelRecurringEdit(){recurringEditId=null;renderRecurringBody();}
function saveRecurringEdit(e,id){
  if(e.key==='Escape'){cancelRecurringEdit();return;}
  if(e.key!=='Enter')return;
  const inp=document.getElementById(`rec-edit-${id}`);if(!inp)return;
  const newText=inp.value.trim();if(!newText)return;
  const rt=state.recurringTasks.find(r=>r.id===id);
  if(rt){
    const old=rt.text;rt.text=newText;
    state.tasks.filter(t=>t.isRecurring&&t.text===old).forEach(t=>t.text=newText);
    saveState();render();
  }
  recurringEditId=null;renderRecurringBody();
  showToast(`✏️ "<strong>${escapeHtml(newText)}</strong>" 수정 완료`,'edit');
}
function addRecurringTask(){
  const inp=document.getElementById('recurringInput');
  const text=inp.value.trim();if(!text)return;
  if(!state.recurringTasks)state.recurringTasks=[];
  state.recurringTasks.push({id:state.nextId++,text,starred:false});
  state.recurringLastDate=null;
  inp.value='';saveState();renderRecurringBody();
  if(new Date().getHours()>=9){
    const exists=state.tasks.some(t=>t.text===text)||state.doneTasks.some(t=>t.text===text);
    if(!exists){
      const task={id:state.nextId++,text,registeredAt:Date.now(),done:false,starred:false,isRecurring:true};
      state.tasks.push(task);scheduleAlarm(task);state.recurringLastDate=todayStr();saveState();render();
    }
  }
  showToast(`🔁 "<strong>${escapeHtml(text)}</strong>" 매일 자동 등록 추가!`,'success');
}
function removeRecurringTask(id){
  state.recurringTasks=state.recurringTasks.filter(rt=>rt.id!==id);
  saveState();renderRecurringBody();
}

// ══ 장기업무 ══
const LONG_STAGES=['시작','진행중','마무리'];
function toggleLongInput(){
  const row=document.getElementById('longAddRow');
  const btn=document.getElementById('longToggleBtn');
  const visible=row.style.display==='flex';
  row.style.display=visible?'none':'flex';
  btn.classList.toggle('on',!visible);
  if(!visible)document.getElementById('longTaskInput').focus();
}
function submitLongTask(){
  const inp=document.getElementById('longTaskInput');
  const text=inp.value.trim();if(!text)return;
  if(!state.longTasks)state.longTasks=[];
  const task={id:state.nextId++,text,starred:false,stage:0,startDate:null,endDate:null,createdAt:Date.now()};
  state.longTasks.push(task);
  saveState();renderLongTasks();inp.value='';
  showToast(`📌 "<strong>${escapeHtml(text)}</strong>" 장기업무 추가!`,'success');
}
let pendingLongComplete={};
function advanceLongStage(id){
  if(!state.longTasks)return;
  const t=state.longTasks.find(t=>t.id===id);if(!t)return;
  if(t.stage===3){startLongComplete(id);return;}
  const today=todayStr();
  if(t.stage===0){t.stage=1;t.startDate=today;}
  else if(t.stage===1){t.stage=2;}
  else if(t.stage===2){t.stage=3;}
  saveState();renderLongTasks();
}
function setLongStage(id,targetStage){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  if(t.stage===targetStage)return;
  if(pendingLongComplete[id]){clearTimeout(pendingLongComplete[id].timerId);delete pendingLongComplete[id];}
  const today=todayStr();
  if(targetStage>=1&&!t.startDate)t.startDate=today;
  if(targetStage===0)t.startDate=null;
  t.stage=targetStage;saveState();renderLongTasks();
}
function startLongComplete(id){
  if(pendingLongComplete[id]){clearTimeout(pendingLongComplete[id].timerId);delete pendingLongComplete[id];renderLongTasks();return;}
  const timerId=setTimeout(()=>{delete pendingLongComplete[id];_doCompleteLong(id);},1000);
  pendingLongComplete[id]={timerId};renderLongTasks();
}
function _doCompleteLong(id){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  const today=todayStr();
  const completed={...t,endDate:today,done:true,doneAt:Date.now()};
  if(!state.doneLongTasks)state.doneLongTasks=[];
  state.doneLongTasks.push(completed);
  state.longTasks=state.longTasks.filter(lt=>lt.id!==id);
  celebrate(t.text);saveState();renderLongTasks();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
  if(document.getElementById('panel-done').classList.contains('active'))renderDone();
}
function deleteLongTask(id){
  const t=(state.longTasks||[]).find(t=>t.id===id);
  state.longTasks=(state.longTasks||[]).filter(t=>t.id!==id);
  saveState();renderLongTasks();
  if(t)showToast(`🗑 "<strong>${escapeHtml(t.text)}</strong>" 삭제됨`);
}
function undoLongComplete(id){
  const idx=(state.doneLongTasks||[]).findIndex(t=>t.id===id);if(idx===-1)return;
  const t={...state.doneLongTasks[idx],done:false,endDate:null};delete t.doneAt;
  state.doneLongTasks.splice(idx,1);
  if(!state.longTasks)state.longTasks=[];
  state.longTasks.push(t);
  saveState();renderDone();renderLongTasks();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
  showToast(`↩ "<strong>${escapeHtml(t.text)}</strong>" 장기업무 되돌렸어요`);
}
function toggleLongStar(id){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  t.starred=!t.starred;saveState();renderLongTasks();
}
function updateLongStageNote(id,stageIdx,value){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  if(!t.stageNotes)t.stageNotes=['','',''];
  t.stageNotes[stageIdx]=value;
  saveState();
}
function renderLongTasks(){
  const container=document.getElementById('longTaskSection');
  if(!container)return;
  if(!state.longTasks||state.longTasks.length===0){container.innerHTML='';return;}
  let html=`<div class="long-section-label">📌 장기 업무 <span style="font-size:12px;color:#AEAEB2;font-weight:400">· 단계별 완료</span></div><div class="task-list">`;
  html+=state.longTasks.map(t=>{
    const isPend=!!pendingLongComplete[t.id];
    const sc=t.stage>0?`s${t.stage}`:'';
    const icon=isPend?'…':(t.stage===0?'→':t.stage===1?'②':t.stage===2?'③':'✓');
    const steps=[1,2,3].map(s=>{
      const cls=s<t.stage?'s-done':s===t.stage?'s-active':'';
      return`<div class="long-stage-step ${cls}" onclick="setLongStage(${t.id},${s})" title="${LONG_STAGES[s-1]}로 설정"></div>`;
    }).join('');
    const labels=LONG_STAGES.map((l,i)=>{
      const cls=(i+1)<t.stage?'s-done':(i+1)===t.stage?'s-active':'';
      return`<div class="long-stage-label ${cls}" onclick="setLongStage(${t.id},${i+1})" title="${l}로 설정">${l}</div>`;
    }).join('');
    const longTextEl=longEditingId===t.id
      ?`<input class="task-edit-input" id="longedit-${t.id}" value="${escapeHtml(t.text)}"
          onkeydown="handleLongEditKey(event,${t.id})" onblur="cancelLongEdit()" onclick="event.stopPropagation()">`
      :`<div class="task-text" onclick="startLongEdit(${t.id})" title="클릭: 제목 수정">${escapeHtml(t.text)}</div>`;
    const notes=t.stageNotes||['','',''];
    const stageNoteInputs=['시작','진행','마무리'].map((pl,i)=>`<input class="long-note-inp" placeholder="${pl}..." value="${escapeHtml(notes[i]||'')}" onchange="updateLongStageNote(${t.id},${i},this.value)" onclick="event.stopPropagation()" title="${pl} 단계 메모">`).join('');
    return`<div class="long-task-item${isPend?' long-pending':''}" id="longtask-${t.id}"
      draggable="true"
      ondragstart="onLongDragStart(event,${t.id})"
      ondragend="onLongDragEnd(event,${t.id})">
      ${isPend?'<div class="pending-bar"></div>':''}
      <div class="long-task-top">
        <div class="long-check-btn ${sc}" onclick="advanceLongStage(${t.id})" title="${t.stage===3?'완료 (1초)':'다음 단계'}">${icon}</div>
        <div class="task-info">
          ${longTextEl}
          <div class="task-time">
            <span class="long-badge">장기업무</span>
            <span class="long-cur-stage s${t.stage}">${['미시작','시작','진행중','마무리'][t.stage]}</span>
            ${t.stage>0?`<span>시작: ${t.startDate}</span>`:''}
          </div>
          ${isPend?'<div class="long-pending-hint">⚡ 1초 후 완료 · 다시 누르면 취소</div>':''}
        </div>
        <button class="icon-btn star${t.starred?' on':''}" onclick="toggleLongStar(${t.id})" title="중요">⭐</button>
        <button class="icon-btn trash" onclick="deleteLongTask(${t.id})" title="삭제">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 3.5h12M6 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9"/>
            <line x1="6" y1="7" x2="6" y2="10.5"/><line x1="9" y1="7" x2="9" y2="10.5"/>
          </svg>
        </button>
      </div>
      <div class="long-stage-notes">${stageNoteInputs}</div>
      <div class="long-stage-bar">${steps}</div>
      <div class="long-stage-labels">${labels}</div>
    </div>`;
  }).join('');
  html+='</div>';
  container.innerHTML=html;
  if(longEditingId){const inp=document.getElementById(`longedit-${longEditingId}`);if(inp){inp.focus();inp.select();}}
}

// ══ 장기업무 관리 모달 ══
let lmgmtEditInfo=null;
function openLongMgmtModal(){
  lmgmtEditInfo=null;renderLongMgmtModal();
  document.getElementById('lmgmtOverlay').classList.add('active');
  document.getElementById('lmgmtModal').classList.add('active');
}
function closeLongMgmtModal(){
  document.getElementById('lmgmtOverlay').classList.remove('active');
  document.getElementById('lmgmtModal').classList.remove('active');
  lmgmtEditInfo=null;
}
function renderLongMgmtModal(){
  const body=document.getElementById('lmgmtBody');
  const active=state.longTasks||[];const done=state.doneLongTasks||[];
  if(active.length===0&&done.length===0){
    body.innerHTML='<div class="modal-empty">장기업무가 없어요<br>할 일 탭에서 📌 버튼으로 추가하세요</div>';return;
  }
  let html='';
  if(active.length>0){
    html+=`<div class="lmgmt-section-title">진행 중 (${active.length})</div>`;
    html+=active.map(t=>{
      const isEditName=lmgmtEditInfo&&lmgmtEditInfo.id===t.id&&lmgmtEditInfo.field==='name';
      const isEditStart=lmgmtEditInfo&&lmgmtEditInfo.id===t.id&&lmgmtEditInfo.field==='start';
      const stageLabel=['미시작','시작','진행중','마무리'][t.stage];
      return`<div class="lmgmt-row">
        <div class="lmgmt-dot active"></div>
        ${isEditName
          ?`<input class="lmgmt-name-input" id="lmgmt-n-${t.id}" value="${escapeHtml(t.text)}"
              onkeydown="saveLmgmtName(event,${t.id},'active')" onblur="cancelLmgmtEdit()">`
          :`<div class="lmgmt-name" onclick="startLmgmtEdit(${t.id},'name')">${escapeHtml(t.text)}</div>`}
        <div class="lmgmt-date">
          ${isEditStart
            ?`<input type="date" value="${t.startDate||''}" onchange="saveLmgmtDate(event,${t.id},'start','active')" onblur="cancelLmgmtEdit()">`
            :`<span onclick="startLmgmtEdit(${t.id},'start')" style="cursor:pointer">${t.startDate||'미시작'}</span>`}
        </div>
        <span class="long-cur-stage s${t.stage}" style="font-size:10px">${stageLabel}</span>
        <button class="lmgmt-del" onclick="lmgmtDelete(${t.id},'active')">×</button>
      </div>`;
    }).join('');
  }
  if(done.length>0){
    html+=`<div class="lmgmt-section-title">완료 (${done.length})</div>`;
    html+=done.map(t=>{
      const isEditName=lmgmtEditInfo&&lmgmtEditInfo.id===t.id&&lmgmtEditInfo.field==='name';
      return`<div class="lmgmt-row">
        <div class="lmgmt-dot done"></div>
        ${isEditName
          ?`<input class="lmgmt-name-input" id="lmgmt-n-${t.id}" value="${escapeHtml(t.text)}"
              onkeydown="saveLmgmtName(event,${t.id},'done')" onblur="cancelLmgmtEdit()">`
          :`<div class="lmgmt-name" onclick="startLmgmtEdit(${t.id},'name')">${escapeHtml(t.text)}</div>`}
        <div class="lmgmt-date">${t.startDate||'?'} → ${t.endDate||'?'}</div>
        <button class="lmgmt-del" onclick="lmgmtDelete(${t.id},'done')">×</button>
      </div>`;
    }).join('');
  }
  body.innerHTML=html;
  if(lmgmtEditInfo){const inp=document.getElementById(`lmgmt-n-${lmgmtEditInfo.id}`);if(inp){inp.focus();inp.select();}}
}
function startLmgmtEdit(id,field){lmgmtEditInfo={id,field};renderLongMgmtModal();}
function cancelLmgmtEdit(){lmgmtEditInfo=null;renderLongMgmtModal();}
function saveLmgmtName(e,id,type){
  if(e.key==='Escape'){cancelLmgmtEdit();return;}
  if(e.key!=='Enter')return;
  const inp=document.getElementById(`lmgmt-n-${id}`);if(!inp)return;
  const newText=inp.value.trim();if(!newText)return;
  const arr=type==='active'?state.longTasks:state.doneLongTasks;
  const t=(arr||[]).find(t=>t.id===id);
  if(t){t.text=newText;saveState();renderLongTasks();}
  lmgmtEditInfo=null;renderLongMgmtModal();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}
function saveLmgmtDate(e,id,field,type){
  const val=e.target.value;
  const arr=type==='active'?state.longTasks:state.doneLongTasks;
  const t=(arr||[]).find(t=>t.id===id);
  if(t){t[field==='start'?'startDate':'endDate']=val;saveState();renderLongTasks();}
  lmgmtEditInfo=null;renderLongMgmtModal();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}
function lmgmtDelete(id,type){
  const arr=type==='active'?state.longTasks:state.doneLongTasks;
  const t=(arr||[]).find(t=>t.id===id);
  if(type==='active'){state.longTasks=(state.longTasks||[]).filter(t=>t.id!==id);renderLongTasks();}
  else{state.doneLongTasks=(state.doneLongTasks||[]).filter(t=>t.id!==id);renderDone();}
  saveState();renderLongMgmtModal();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
  if(t)showToast(`🗑 "<strong>${escapeHtml(t.text)}</strong>" 삭제됨`);
}

// ══ 간트 차트 ══
function renderGantt(){
  const container=document.getElementById('ganttSection');
  if(!container)return;
  const allLong=[...(state.longTasks||[]),...(state.doneLongTasks||[])];
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const monthStart=`${calYear}-${pad(calMonth+1)}-01`;
  const monthEnd=`${calYear}-${pad(calMonth+1)}-${pad(daysInMonth)}`;
  const visible=allLong.filter(t=>{
    const s=t.startDate||t.endDate;if(!s)return false;
    const e=t.endDate||todayStr();return s<=monthEnd&&e>=monthStart;
  });
  if(visible.length===0){container.innerHTML='';return;}
  const mOrigin=new Date(`${calYear}-${pad(calMonth+1)}-01T00:00:00`);
  let html=`<div class="gantt-wrap"><div class="gantt-hdr" onclick="openLongMgmtModal()" title="클릭: 장기업무 관리">📊 장기업무 일정 (간트) <span style="font-size:10px;opacity:0.55;margin-left:4px">▸ 클릭해서 수정/삭제</span></div><div class="gantt-body">`;
  html+=visible.map(t=>{
    const sDate=new Date((t.startDate||todayStr())+'T12:00:00');
    const eDate=new Date((t.endDate||todayStr())+'T12:00:00');
    const sDay=Math.round((sDate-mOrigin)/86400000)+1;
    const eDay=Math.round((eDate-mOrigin)/86400000)+1;
    const clampS=Math.max(1,Math.min(daysInMonth,sDay));
    const clampE=Math.max(1,Math.min(daysInMonth,eDay));
    const leftPct=((clampS-1)/daysInMonth)*100;
    const wPct=Math.max(2,((clampE-clampS+1)/daysInMonth)*100);
    const isDone=!!t.done;
    const stageLabel=isDone?'완료':t.stage>0?LONG_STAGES[t.stage-1]:'미시작';
    const totalDays=Math.max(1,Math.round((eDate-sDate)/86400000)+1);
    const tipText=`${t.startDate||'?'} ~ ${t.endDate||todayStr()} (${totalDays}일)`;
    const stageIdx=isDone?-1:t.stage;
    const badgeCls=isDone?'s3':`s${stageIdx}`;
    const badgeLabel=isDone?'완료':['미시작','시작','진행중','마무리'][stageIdx];
    return`<div class="gantt-row">
      <div class="gantt-label" title="${escapeHtml(t.text)}">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</div>
      <div class="gantt-bar-outer">
        <div class="gantt-track">
          <div class="gantt-bar${isDone?'':' g-active'}" style="left:${leftPct.toFixed(1)}%;width:${wPct.toFixed(1)}%;">
            <div class="gantt-tip">${tipText}</div>
          </div>
        </div>
      </div>
      <div class="gantt-status">${isDone?`<span class="long-cur-stage s3">완료</span>`:`<span class="long-cur-stage ${badgeCls} gantt-stage-btn" onclick="openGanttStagePicker(event,${t.id})" title="클릭해서 단계 변경">${badgeLabel}</span>`}</div>
    </div>`;
  }).join('');
  html+='</div></div>';
  container.innerHTML=html;
}
function openGanttStagePicker(e,taskId){
  e.stopPropagation();
  const existing=document.getElementById('ganttStagePicker');
  if(existing){const wasThis=existing.dataset.taskId===String(taskId);existing.remove();if(wasThis)return;}
  const task=(state.longTasks||[]).find(t=>t.id==taskId);if(!task)return;
  const stageLabels=['미시작','시작','진행중','마무리'];
  const rect=e.currentTarget.getBoundingClientRect();
  const picker=document.createElement('div');
  picker.id='ganttStagePicker';picker.dataset.taskId=String(taskId);
  picker.style.cssText='position:fixed;z-index:9999;background:rgba(255,255,255,0.97);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:5px 4px;display:flex;flex-direction:column;gap:2px;min-width:76px;backdrop-filter:blur(8px);border:1px solid rgba(205,180,219,0.3);';
  const totalH=stageLabels.length*34+10;
  const top=rect.bottom+4+totalH<window.innerHeight?rect.bottom+4:rect.top-totalH-4;
  picker.style.top=Math.max(4,top)+'px';picker.style.left=Math.max(4,rect.left-10)+'px';
  stageLabels.forEach((label,idx)=>{
    const btn=document.createElement('button');btn.textContent=label;
    const isCur=task.stage===idx;
    btn.style.cssText=`border:none;background:${isCur?'rgba(205,180,219,0.32)':'transparent'};padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;text-align:left;font-family:inherit;font-weight:${isCur?'600':'400'};color:#333;transition:background 0.12s;width:100%;`;
    btn.onmouseenter=()=>{if(!isCur)btn.style.background='rgba(205,180,219,0.15)';};
    btn.onmouseleave=()=>{btn.style.background=isCur?'rgba(205,180,219,0.32)':'transparent';};
    btn.onclick=(ev)=>{
      ev.stopPropagation();task.stage=idx;saveState();render();renderLongTasks();
      if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
      picker.remove();showToast(`단계 변경: <strong>${label}</strong>`);
    };
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  function closePicker(ev){if(!picker.contains(ev.target)){picker.remove();document.removeEventListener('click',closePicker,true);}}
  setTimeout(()=>document.addEventListener('click',closePicker,true),50);
}

// ══ 공유 ══
function openShareSheet(){
  document.getElementById('shareOverlay').classList.add('active');
  document.getElementById('shareSheet').classList.add('active');
}
function closeShareSheet(){
  document.getElementById('shareOverlay').classList.remove('active');
  document.getElementById('shareSheet').classList.remove('active');

function _buildShareText(dateStr){
  const data=getDayData(dateStr);
  const d=new Date(dateStr+'T12:00:00');
  const days=['일','월','화','수','목','금','토'];
  const header=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]}) — ${state.userName||'민재'}의 하루`;
  const lines=[header,''];
  const done=(data&&data.done)||[];const todo=(data&&data.todo)||[];const missed=(data&&data.missed)||[];
  if(todo.length>0){lines.push('📝 할 일');todo.forEach(t=>lines.push(`  ○ ${t.starred?'⭐ ':''}${t.text}`));lines.push('');}
  if(done.length>0){lines.push('✅ 완료');done.forEach(t=>lines.push(`  ✓ ${t.starred?'⭐ ':''}${t.text}`));lines.push('');}
  if(missed.length>0){lines.push('❌ 미완료');missed.forEach(t=>lines.push(`  — ${t.text}`));lines.push('');}
  lines.push('오늘하자제발 · project-six-nu-30.vercel.app');
  return lines.join('\n');
}
function _generateDayImage(dateStr,cb){
  const data=getDayData(dateStr);
  const d=new Date(dateStr+'T12:00:00');
  const days=['일','월','화','수','목','금','토'];
  const dateLabel=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
  const userName=state.userName||'민재';
  const done=(data&&data.done)||[];const todo=(data&&data.todo)||[];const missed=(data&&data.missed)||[];
  const allItems=[];
  todo.forEach(t=>allItems.push({label:(t.starred?'⭐ ':'')+t.text,type:'todo'}));
  done.forEach(t=>allItems.push({label:(t.starred?'⭐ ':'')+t.text,type:'done'}));
  missed.forEach(t=>allItems.push({label:t.text,type:'missed'}));

  const S=2; // 레티나 2x
  const W=750,HPAD=32,VPAD=20,ITEM_H=66,HDR_H=210,FTR_H=68;
  const H=HDR_H+(allItems.length||1)*ITEM_H+VPAD+FTR_H;
  const cv=document.createElement('canvas');cv.width=W*S;cv.height=H*S;
  const c=cv.getContext('2d');c.scale(S,S);

  // 배경
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#EDE8FF');bg.addColorStop(0.5,'#FDE8F3');bg.addColorStop(1,'#E8F2FF');
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // 헤더 그라데이션 카드 (하단 둥글지 않게 — 아이템과 자연스럽게 이어지도록)
  const hg=c.createLinearGradient(0,0,W*0.8,HDR_H);
  hg.addColorStop(0,'#BFA3D4');hg.addColorStop(0.5,'#EAA8CB');hg.addColorStop(1,'#FFC2D4');
  c.fillStyle=hg;
  c.beginPath();c.moveTo(0,0);c.lineTo(W,0);c.lineTo(W,HDR_H);c.lineTo(0,HDR_H);c.closePath();c.fill();

  // 헤더 우측 장식 원
  c.fillStyle='rgba(255,255,255,0.10)';
  c.beginPath();c.arc(W-40,30,130,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(W+20,HDR_H-20,90,0,Math.PI*2);c.fill();

  // 날짜
  c.fillStyle='rgba(255,255,255,0.80)';
  c.font=`500 20px -apple-system,sans-serif`;
  c.fillText(dateLabel,HPAD+8,54);

  // 이름
  c.fillStyle='#fff';
  c.font=`800 46px -apple-system,sans-serif`;
  c.shadowColor='rgba(120,60,160,0.18)';c.shadowBlur=12;c.shadowOffsetY=3;
  c.fillText(`${userName}의 하루`,HPAD+8,116);
  c.shadowBlur=0;c.shadowOffsetY=0;

  // 통계 뱃지
  const statText=`완료 ${done.length} · 할일 ${todo.length}`;
  const bW=c.measureText(statText).width+36;
  c.fillStyle='rgba(255,255,255,0.22)';_roundRect(c,HPAD+8,134,bW,38,19,null,true);
  c.fillStyle='rgba(255,255,255,0.92)';c.font='600 16px -apple-system,sans-serif';
  c.fillText(statText,HPAD+8+18,158);

  // 아이템 영역 배경 (헤더 아래 흰 섹션)
  const listY=HDR_H;const listH=H-HDR_H-FTR_H;
  c.fillStyle='rgba(255,255,255,0.60)';
  c.fillRect(0,listY,W,listH);

  // 아이템 목록
  let y=listY+VPAD/2;
  if(allItems.length===0){
    c.fillStyle='#C7C7CC';c.font='400 20px -apple-system,sans-serif';
    c.textAlign='center';c.fillText('오늘의 기록이 없어요',W/2,y+36);c.textAlign='left';
  }
  allItems.forEach(item=>{
    const cardY=y+4,cardH=ITEM_H-8;
    // 카드
    c.fillStyle='rgba(255,255,255,0.92)';
    _roundRect(c,HPAD,cardY,W-HPAD*2,cardH,16,null,true);

    // 왼쪽 컬러 바
    const barColor=item.type==='todo'?'#CDB4DB':item.type==='done'?'#A2D2FF':'#FFAFCC';
    c.fillStyle=barColor;
    c.fillRect(HPAD,cardY,5,cardH);
    // 카드 좌상단 둥글게
    c.fillStyle='rgba(255,255,255,0.92)';
    c.fillRect(HPAD,cardY,12,6);
    c.fillRect(HPAD,cardY+cardH-6,12,6);

    // 아이콘
    const iconX=HPAD+22,iconCY=cardY+cardH/2;
    c.fillStyle=barColor;
    if(item.type==='done'){
      // 체크 원
      c.beginPath();c.arc(iconX,iconCY,9,0,Math.PI*2);c.fill();
      c.strokeStyle='#fff';c.lineWidth=2;c.lineCap='round';c.lineJoin='round';
      c.beginPath();c.moveTo(iconX-4,iconCY);c.lineTo(iconX-1,iconCY+3);c.lineTo(iconX+5,iconCY-4);c.stroke();
    }else if(item.type==='missed'){
      c.beginPath();c.arc(iconX,iconCY,9,0,Math.PI*2);c.fill();
      c.strokeStyle='#fff';c.lineWidth=2;c.lineCap='round';
      c.beginPath();c.moveTo(iconX-4,iconCY-4);c.lineTo(iconX+4,iconCY+4);c.stroke();
      c.beginPath();c.moveTo(iconX+4,iconCY-4);c.lineTo(iconX-4,iconCY+4);c.stroke();
    }else{
      c.beginPath();c.arc(iconX,iconCY,7,0,Math.PI*2);c.fill();
    }

    // 텍스트
    const txtX=HPAD+42,txtY=cardY+cardH/2+7;
    c.fillStyle=item.type==='done'?'#AEAEB2':item.type==='missed'?'#D08090':'#1D1D1F';
    c.font=(item.type==='done'?'400':'500')+' 20px -apple-system,sans-serif';
    const maxW=W-HPAD*2-58;
    let txt=item.label;
    while(c.measureText(txt).width>maxW&&txt.length>0)txt=txt.slice(0,-1);
    if(txt!==item.label)txt=txt.slice(0,-1)+'…';
    c.fillText(txt,txtX,txtY);

    // 완료 취소선
    if(item.type==='done'){
      const tw=Math.min(c.measureText(txt).width,maxW);
      c.strokeStyle='rgba(174,174,178,0.65)';c.lineWidth=1.5;
      c.beginPath();c.moveTo(txtX,txtY-8);c.lineTo(txtX+tw,txtY-8);c.stroke();
    }
    y+=ITEM_H;
  });

  // 푸터 구분선
  const ftY=H-FTR_H;
  c.strokeStyle='rgba(205,180,219,0.25)';c.lineWidth=1;
  c.beginPath();c.moveTo(HPAD*2,ftY+8);c.lineTo(W-HPAD*2,ftY+8);c.stroke();

  // 푸터 텍스트
  c.fillStyle='#AEAEB2';c.font='400 14px -apple-system,sans-serif';c.textAlign='center';
  c.fillText('오늘하자제발  ·  project-six-nu-30.vercel.app',W/2,ftY+40);
  cb(cv);
}
function _roundRect(c,x,y,w,h,r,fill,stroke){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
  if(fill){c.fillStyle=fill;c.fill();}else if(stroke){c.fill();}else{c.fill();}
}
async function shareAction(type){
  closeShareSheet();
  const dateStr=currentModalDate;if(!dateStr)return;
  if(type==='sms'){
    const text=_buildShareText(dateStr);
    window.location.href='sms:?body='+encodeURIComponent(text);
    return;
  }
  // 이미지 생성
  showToast('🖼️ 이미지 생성 중…');
  _generateDayImage(dateStr,async cv=>{
    cv.toBlob(async blob=>{
      const d=new Date(dateStr+'T12:00:00');
      const fname=`오늘하자_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.png`;
      if(type==='save'){
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download=fname;a.click();
        URL.revokeObjectURL(url);
        showToast('🖼️ 이미지가 저장됐어요!','success');
      }else if(type==='kakao'){
        // 카카오는 Web Share API(모바일에서 카카오톡 앱 공유 가능)
        if(navigator.share){
          try{
            const file=new File([blob],fname,{type:'image/png'});
            if(navigator.canShare&&navigator.canShare({files:[file]})){
              await navigator.share({files:[file],title:'오늘하자제발',text:dateStr+'의 할일'});
            }else{
              await navigator.share({title:'오늘하자제발',text:_buildShareText(dateStr)});
            }
          }catch(e){if(e.name!=='AbortError')showToast('공유를 취소했어요.');}
        }else{
          // 데스크톱 폴백: 이미지 저장
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download=fname;a.click();
          URL.revokeObjectURL(url);
          showToast('📱 모바일에서 카카오톡 공유가 가능해요. 이미지를 저장했습니다.');
        }
      }
    },'image/png');
  });
}

// ══ 데이터 내보내기/가져오기 ══
function exportData(){
  const data=localStorage.getItem('ijma_v3');
  if(!data){showToast('저장된 데이터가 없어요.');return;}
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;a.download=`오늘하자_백업_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click();URL.revokeObjectURL(url);
  showToast('💾 데이터 내보내기 완료!','success');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const text=ev.target.result;
      JSON.parse(text); // 유효성 검사
      if(confirm('기존 데이터를 덮어씁니다. 계속할까요?')){
        localStorage.setItem('ijma_v3',text);
        showToast('📂 가져오기 완료! 새로고침합니다…','success');
        setTimeout(()=>location.reload(),1200);
      }
    }catch(err){showToast('❌ 올바른 백업 파일이 아닙니다.');}
  };
  reader.readAsText(file);
  e.target.value='';
}
