<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘하자제발</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#CDB4DB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오늘하자">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
<style>
  /* ══ CSS 변수 ══ */
  :root {
    --primary:   #CDB4DB;
    --accent:    #FFAFCC;
    --accent2:   #A2D2FF;
    --bg-from:   #F5F2FF;
    --bg-mid:    #FEF2F7;
    --bg-to:     #F2F7FF;
    --card:      rgba(255,255,255,0.88);
    --glass:     rgba(255,255,255,0.75);
    --border:    rgba(205,180,219,0.18);
    --text:      #1D1D1F;
    --text-sub:  #8E8E93;
    --text-mute: #C7C7CC;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 8px;
    --shadow-card: 0 2px 20px rgba(180,140,210,0.07), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 28px rgba(180,140,210,0.12), 0 1px 4px rgba(0,0,0,0.05);
    --shadow-modal: 0 -8px 48px rgba(150,100,200,0.14);
  }

  /* ══ 리셋 & 기본 ══ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: linear-gradient(160deg, var(--bg-from) 0%, var(--bg-mid) 45%, var(--bg-to) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    cursor: default;
  }

  /* ══ 헤더 ══ */
  header {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    position: sticky; top: 0; z-index: 20;
    border-bottom: 0.5px solid rgba(205,180,219,0.25);
    user-select: none;
  }
  .header-left { display: flex; align-items: center; }
  .header-title { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; white-space: nowrap; }
  #userNameSpan { cursor: pointer; border-bottom: 1px dashed transparent; transition: color 0.18s, border-color 0.18s; }
  #userNameSpan:hover { color: var(--primary); border-bottom-color: var(--primary); }
  .user-name-input {
    font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.2px;
    border: none; border-bottom: 1.5px solid var(--primary); background: transparent;
    outline: none; font-family: inherit; width: 5em; caret-color: var(--primary);
  }
  .header-date  { font-size: 10px; color: var(--text-sub); margin-top: 1px; font-weight: 400; white-space: nowrap; }

  /* ══ 중앙 로고 ══ */
  .header-center { text-align: center; }
  .c-logo-wrap { display: inline-flex; align-items: baseline; gap: 0; line-height: 1; }
  .clo-em {
    font-size: 18px; font-weight: 800; line-height: 1; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .clo-nm  { font-size: 10px; font-weight: 400; color: #AEAEB2; letter-spacing: 0; }
  .clo-dot { font-size: 10px; font-weight: 700; color: var(--accent2); margin: 0 1px; align-self: center; }
  .c-logo-sub { font-size: 7px; letter-spacing: 2px; color: #C7C7CC; font-weight: 500; text-align: center; margin-top: 2px; }

  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  #clockLabel { font-size: 11px; color: #6E6E73; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; user-select: none; white-space: nowrap; }
  .auth-row { display: flex; align-items: center; gap: 5px; }
  .auth-btn {
    font-size: 10px; font-weight: 600; font-family: inherit;
    border: none; border-radius: 10px; padding: 2px 8px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
  }
  .auth-btn.login  { background: rgba(162,210,255,0.20); color: #5A90BE; border: 0.5px solid rgba(162,210,255,0.40); }
  .auth-btn.logout { background: rgba(205,180,219,0.18); color: #9B7BB4; border: 0.5px solid rgba(205,180,219,0.35); }
  .auth-btn:hover  { transform: scale(1.06); filter: brightness(1.1); }
  .auth-avatar { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: #34C759; box-shadow: 0 0 4px rgba(52,199,89,0.5);
  }
  .sync-dot.syncing { background: var(--accent2); animation: blink 0.7s ease-in-out infinite; }
  .sync-dot.off { background: #C7C7CC; box-shadow: none; }

  /* ══ 탭 바 ══ */
  .tabs {
    display: flex;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-bottom: 0.5px solid rgba(205,180,219,0.20);
    position: sticky; top: 65px; z-index: 19;
    user-select: none;
  }
  .tab-btn {
    flex: 1; padding: 12px 4px; text-align: center;
    font-size: 14px; font-weight: 500; color: #AEAEB2;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.22s cubic-bezier(0.34,1.0,0.64,1);
    background: none; border-top: none; border-left: none; border-right: none;
    letter-spacing: -0.1px;
  }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ══ 섹션 레이블 ══ */
  .section-label {
    padding: 22px 22px 6px;
    font-size: 22px; font-weight: 800; color: var(--text);
    letter-spacing: -0.5px; cursor: default; user-select: none;
  }
  .section-label .sub { font-size: 13px; font-weight: 400; color: var(--text-sub); margin-left: 8px; letter-spacing: 0; }
  .task-list { padding: 0 16px; }

  /* ══ 할 일 카드 ══ */
  .task-item {
    background: var(--card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius-lg);
    padding: 15px 14px 15px 16px; margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 12px;
    border: 0.5px solid var(--border);
    box-shadow: var(--shadow-card);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.25s ease, opacity 0.3s, filter 0.3s;
    position: relative; overflow: hidden; cursor: default;
  }
  .task-item:active { transform: scale(0.985); }
  .task-item:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
  }
  .task-item.starred {
    background: rgba(255,200,221,0.10);
    border-color: rgba(255,175,204,0.30);
  }
  .task-item.pending { opacity: 0.55; filter: blur(0.7px); animation: pending-pulse 0.7s ease-in-out infinite alternate; }
  @keyframes pending-pulse { from{opacity:.42}to{opacity:.62} }
  .task-item.completing { animation: fly-out 0.38s ease-in forwards; }
  .modal-task-row.deleting { animation: fly-out 0.3s ease-in forwards; pointer-events: none; }
  @keyframes fly-out { 0%{transform:translateX(0) scale(1);opacity:1} 100%{transform:translateX(60px) scale(0.85);opacity:0} }
  .done-item.pending { opacity: 0.55; filter: blur(0.7px); animation: pending-pulse 0.7s ease-in-out infinite alternate; }

  .pending-bar {
    position: absolute; bottom: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    animation: pending-progress 1s linear forwards;
  }
  @keyframes pending-progress { from{width:0%} to{width:100%} }

  /* ══ 체크 버튼 ══ */
  .check-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid #D8C8E8; background: #fff;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    margin-top: 1px; font-size: 13px; font-weight: 700;
  }
  .check-btn:hover { border-color: var(--primary); background: rgba(205,180,219,0.12); transform: scale(1.12); }
  .check-btn.pending-state { background: var(--accent); border-color: var(--accent); color: white; }

  .task-info { flex: 1; min-width: 0; cursor: default; }

  /* ══ 할 일 텍스트 ══ */
  .task-text {
    font-size: 15px; color: var(--text); line-height: 1.5;
    word-break: break-all; cursor: text; letter-spacing: -0.1px;
  }
  .task-text:hover { color: #9B7BB4; }
  .task-text a { color: var(--accent2); text-decoration: underline; cursor: pointer; }
  .task-edit-input {
    width: 100%; font-size: 15px; color: var(--text); line-height: 1.5;
    border: none; outline: none; background: transparent;
    font-family: inherit; padding: 0; margin: 0;
    border-bottom: 2px solid var(--primary); caret-color: var(--primary); cursor: text;
    letter-spacing: -0.1px;
  }

  .task-time {
    font-size: 12px; color: #AEAEB2; margin-top: 5px;
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    cursor: default; user-select: none;
  }
  .task-time.overdue { color: #FF6B8A; font-weight: 600; }
  .repeat-badge {
    font-size: 11px; background: rgba(255,200,221,0.22); color: #CC7090;
    padding: 2px 8px; border-radius: 20px; cursor: default; user-select: none;
  }
  .pending-hint {
    font-size: 11px; color: var(--accent); font-weight: 600; margin-top: 3px;
    animation: blink 0.85s ease-in-out infinite; cursor: default; user-select: none;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.38} }

  /* ══ 아이콘 버튼 ══ */
  .icon-btn {
    background: none; border: none; cursor: pointer;
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px; line-height: 1; opacity: 0.22;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .icon-btn:hover { background: rgba(0,0,0,0.04); opacity: 0.9; transform: scale(1.12); }
  .icon-btn.star.on { opacity: 1; }
  .icon-btn.trash { color: #FF6B8A; }
  .icon-btn.trash:hover { background: rgba(255,107,138,0.08); opacity: 1; }

  /* ══ 드래그 & 드롭 ══ */
  .task-item[draggable="true"] { cursor: grab; }
  .task-item[draggable="true"]:active { cursor: grabbing; }
  .task-item.is-dragging {
    opacity: 0.40; transform: scale(0.96) rotate(-0.7deg) !important;
    box-shadow: 0 20px 56px rgba(180,140,210,0.32) !important;
    background: rgba(255,255,255,0.98) !important; z-index: 50;
    filter: blur(0.5px);
  }
  .task-item.drag-over {
    border-color: rgba(205,180,219,0.60) !important;
    background: rgba(205,180,219,0.12) !important;
    transform: translateY(-4px) scale(1.012) !important;
    box-shadow: 0 10px 32px rgba(180,140,210,0.20) !important;
  }
  .task-item.drag-over::before {
    content:''; position:absolute; top:-2px; left:16px; right:16px; height:3px;
    background:linear-gradient(90deg,var(--primary),var(--accent)); border-radius:2px; z-index:1;
  }

  /* ══ 완료 카드 ══ */
  .done-item {
    background: rgba(255,255,255,0.80);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 12px;
    border: 0.5px solid rgba(205,180,219,0.14);
    box-shadow: 0 1px 10px rgba(180,140,210,0.05);
    cursor: default; position: relative; overflow: hidden;
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, background 0.2s ease;
  }
  .done-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(180,140,210,0.13), 0 1px 4px rgba(0,0,0,0.05);
    background: rgba(255,255,255,0.94);
    border-color: rgba(205,180,219,0.28);
  }
  .done-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent)); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    font-size: 13px; font-weight: 700; color: #fff; position: relative;
  }
  .done-icon.pending-state { background: var(--accent); color: white; }
  .done-icon.pending-state::after { content: '×' !important; }
  .done-icon:hover { background: linear-gradient(135deg, var(--accent), #FF6B8A); transform: scale(1.1); }
  .done-icon:hover::after { content: '↩'; }
  .done-icon:not(:hover)::after { content: '✓'; }
  .done-text {
    font-size: 15px; color: #C7C7CC; text-decoration: line-through;
    line-height: 1.5; word-break: break-all; flex: 1; cursor: default;
    letter-spacing: -0.1px;
  }
  .done-meta { font-size: 12px; color: #D1D1D6; margin-top: 4px; cursor: default; user-select: none; }

  /* ══ 진행률 ══ */
  .progress {
    padding: 2px 22px 10px; font-size: 14px; color: var(--text-sub);
    font-weight: 500; cursor: default; user-select: none;
  }
  .progress-bar {
    height: 5px; background: rgba(205,180,219,0.18);
    border-radius: 3px; margin: 0 22px 16px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }

  /* ══ 입력 영역 (바텀시트) ══ */
  .add-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    padding: 12px 14px env(safe-area-inset-bottom, 14px);
    border-top: 0.5px solid rgba(205,180,219,0.22);
    z-index: 18; box-sizing: border-box;
    box-shadow: 0 -4px 20px rgba(180,140,210,0.08);
  }
  .add-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .add-input {
    flex: 1; min-width: 0;
    border: 1.5px solid rgba(205,180,219,0.30); border-radius: var(--radius-md);
    padding: 11px 14px; font-size: 15px; outline: none;
    transition: all 0.22s ease;
    background: rgba(255,255,255,0.70);
    color: var(--text); font-family: inherit; letter-spacing: -0.1px;
    cursor: text;
  }
  .add-input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(205,180,219,0.15); }
  .add-input::placeholder { color: var(--text-mute); }
  .add-btn {
    background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
    color: #fff; border: none; border-radius: var(--radius-md);
    padding: 11px 18px; font-size: 15px; font-weight: 700;
    cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0;
    transition: opacity 0.2s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: -0.1px;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.96); }
  .hint { font-size: 10px; color: var(--text-mute); text-align: center; cursor: default; user-select: none; letter-spacing: 0; padding: 5px 0 6px; }
  .hint kbd {
    background: rgba(205,180,219,0.12); border: 0.5px solid rgba(205,180,219,0.30);
    border-radius: 5px; padding: 1px 5px; font-size: 9px; color: #AEAEB2; font-family: inherit;
  }

  /* ══ 토스트 ══ */
  .toast-wrap {
    position: fixed; top: 74px; left: 50%; transform: translateX(-50%);
    z-index: 100000; display: flex; flex-direction: column; gap: 8px;
    width: calc(100% - 32px); max-width: 480px; pointer-events: none;
  }
  .toast {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(205,180,219,0.3);
    border-left: 4px solid var(--primary);
    border-radius: var(--radius-md); padding: 12px 18px; font-size: 14px; color: #3A3440;
    box-shadow: 0 12px 40px rgba(180,140,210,0.2);
    animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: auto;
    cursor: default; user-select: none; letter-spacing: -0.1px;
  }
  @keyframes slideIn { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
  .toast.success { border-left-color: var(--accent); }
  .toast.edit    { border-left-color: var(--accent2); }

  /* ══ 컨페티 ══ */
  @keyframes confetti-fly {
    0%   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
    80%  { opacity:1; }
    100% { transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(0.4); opacity:0; }
  }
  .confetti-piece { position:fixed; pointer-events:none; z-index:99999; animation:confetti-fly var(--dur) ease-out forwards; }
  .complete-flash {
    position:fixed; inset:0;
    background:radial-gradient(circle at center, rgba(205,180,219,0.25), transparent 75%);
    pointer-events:none; z-index:99998; animation:flash-out 0.7s ease-out forwards;
  }
  @keyframes flash-out { from{opacity:1} to{opacity:0} }

  /* ══ 캘린더 ══ */
  .cal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 22px 12px; user-select:none;
  }
  .cal-header-center { display:flex; align-items:center; gap:12px; }
  .cal-header span { font-size:22px; font-weight:800; color:var(--text); cursor:default; letter-spacing:-0.5px; }
  .cal-nav {
    background: rgba(255,255,255,0.80); backdrop-filter:blur(10px);
    border: 0.5px solid rgba(205,180,219,0.28); border-radius:10px;
    padding:6px 14px; cursor:pointer; font-size:18px; color:var(--primary);
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .cal-nav:hover { background:var(--primary); color:#fff; border-color:var(--primary); transform:scale(1.05); }
  .pdf-btn {
    background: linear-gradient(135deg,var(--primary),var(--accent)); color:#fff; border:none;
    border-radius:10px; padding:7px 16px; font-size:13px; font-weight:700;
    cursor:pointer; transition:opacity 0.2s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap; letter-spacing:-0.1px; font-family:inherit;
  }
  .pdf-btn:hover { opacity:0.88; }
  .pdf-btn:active { transform:scale(0.96); }

  .cal-grid {
    display:grid; grid-template-columns:repeat(7,1fr);
    margin:0 14px 20px; border-radius:var(--radius-lg); overflow:hidden;
    box-shadow: 0 2px 20px rgba(180,140,210,0.08), 0 0 0 0.5px rgba(205,180,219,0.22);
    background: rgba(255,255,255,0.70);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .cal-dow {
    text-align:center; font-size:12px; color:#AEAEB2; font-weight:600;
    padding:10px 0; background:rgba(255,255,255,0.60);
    border-bottom: 0.5px solid rgba(205,180,219,0.15);
    cursor:default; user-select:none; letter-spacing:0.2px;
  }
  .cal-day {
    min-height:84px; padding:6px 5px 5px;
    border-right: 0.5px solid rgba(205,180,219,0.12);
    border-bottom: 0.5px solid rgba(205,180,219,0.12);
    background: rgba(255,255,255,0.0); overflow:hidden;
    cursor:pointer; transition:background 0.18s ease;
  }
  .cal-day:nth-child(7n) { border-right:none; }
  .cal-day:not(.empty):hover { background:rgba(205,180,219,0.08); }
  .cal-day.empty { background:rgba(250,250,255,0.30); cursor:default; }
  .cal-day.today { background:rgba(205,180,219,0.08); }
  .cal-day-num {
    font-size:12px; font-weight:600; color:#6E6E73;
    margin-bottom:4px; line-height:1;
    cursor:default; user-select:none;
  }
  .cal-day.today .cal-day-num {
    background: linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff; border-radius:50%; width:22px; height:22px;
    display:flex; align-items:center; justify-content:center; font-size:11px;
  }
  .cal-day.sunday .cal-day-num   { color:#FF6B8A; }
  .cal-day.saturday .cal-day-num { color:var(--accent2); }
  .cal-chip {
    font-size:9px; padding:2px 5px; border-radius:5px; margin-bottom:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%; display:block; line-height:1.35;
    cursor:default; user-select:none; font-weight:500;
  }
  .cal-chip.done      { background:rgba(205,180,219,0.20); color:#9B7BB4; }
  .cal-chip.missed    { background:rgba(255,175,204,0.20); color:#C06080; text-decoration:line-through; }
  .cal-chip.todo      { background:rgba(189,224,254,0.30); color:#5A90BE; }
  .cal-chip.future    { background:rgba(255,200,221,0.22); color:#C07090; }
  .cal-chip.long      { background:rgba(162,210,255,0.28); color:#4A80AE; font-style:italic; }
  .cal-chip.long-done { background:rgba(205,180,219,0.28); color:#8A6BAE; font-style:italic; }
  .cal-more { font-size:9px; color:#C7C7CC; margin-top:2px; cursor:default; user-select:none; }

  .empty-state {
    text-align:center; padding:56px 24px; color:var(--text-mute);
    font-size:16px; line-height:2; cursor:default; user-select:none; font-weight:400;
  }
  .moved-notice {
    background:rgba(189,224,254,0.22); border-left:3px solid var(--accent2);
    border-radius:var(--radius-md); margin:8px 16px; padding:11px 16px;
    font-size:13px; color:#5A8AB0; cursor:default; user-select:none; letter-spacing:-0.1px;
  }

  /* ══ 날짜 모달 ══ */
  .modal-overlay {
    position:fixed; inset:0;
    background: rgba(100,70,150,0.14);
    backdrop-filter:blur(14px) saturate(120%);
    -webkit-backdrop-filter:blur(14px) saturate(120%);
    z-index:200; opacity:0; pointer-events:none;
    transition:opacity 0.28s ease;
  }
  .modal-overlay.active { opacity:1; pointer-events:all; }

  .day-modal {
    position:fixed; left:0; right:0; bottom:-100%;
    max-height:84vh;
    background: rgba(249,248,255,0.96);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border-radius:28px 28px 0 0;
    z-index:201;
    transition:bottom 0.42s cubic-bezier(0.32,1.28,0.64,1);
    display:flex; flex-direction:column;
    box-shadow: var(--shadow-modal), 0 -1px 0 rgba(205,180,219,0.20);
    overflow:hidden;
  }
  .day-modal.active { bottom:0; }

  .day-modal-handle {
    width:40px; height:4.5px;
    background:rgba(205,180,219,0.35); border-radius:3px;
    margin:12px auto 0; flex-shrink:0;
  }
  .day-modal-header {
    padding:14px 22px 16px;
    background: linear-gradient(135deg, var(--primary) 0%, #FFC8DD 60%, var(--accent) 100%);
    cursor:default; user-select:none; flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
  }
  .day-modal-title { font-size:16px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .day-modal-type  { font-size:11px; color:rgba(255,255,255,0.70); margin-top:2px; }
  .day-modal-close {
    background:rgba(255,255,255,0.22); border:none; border-radius:50%;
    width:30px; height:30px; cursor:pointer; color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .day-modal-close:hover { background:rgba(255,255,255,0.38); transform:scale(1.08); }

  .day-modal-body { flex:1; overflow-y:auto; padding:10px 18px 6px; }
  .modal-section-title {
    font-size:12px; font-weight:700; color:#AEAEB2;
    letter-spacing:0.5px; margin:14px 0 8px; text-transform:uppercase;
    cursor:default; user-select:none;
    display:flex; align-items:center; gap:6px;
  }
  .edit-hint { font-size:10px; color:#D1D1D6; font-weight:400; text-transform:none; letter-spacing:0; }

  .modal-task-row {
    display:flex; align-items:center; gap:12px;
    padding:10px 4px; border-bottom: 0.5px solid rgba(205,180,219,0.12);
  }
  .modal-task-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .modal-task-dot.todo   { background:var(--primary); }
  .modal-task-dot.done   { background:linear-gradient(135deg,var(--primary),var(--accent)); }
  .modal-task-dot.missed { background:var(--accent); }
  .modal-task-dot.future { background:var(--accent2); }

  .modal-task-text {
    flex:1; font-size:14px; color:var(--text); line-height:1.4;
    word-break:break-all; cursor:text; letter-spacing:-0.1px;
  }
  .modal-task-text.done-style   { color:#AEAEB2; text-decoration:line-through; }
  .modal-task-text.missed-style { color:#FFB8CC; text-decoration:line-through; }
  .modal-task-text.starred-text { font-weight:600; }

  .modal-edit-input {
    flex:1; font-size:14px; color:var(--text); border:none; outline:none;
    background:transparent; font-family:inherit; padding:0;
    border-bottom:2px solid var(--primary); caret-color:var(--primary); cursor:text;
    letter-spacing:-0.1px;
  }
  .modal-del-btn {
    background:none; border:none; cursor:pointer; color:var(--accent);
    font-size:20px; line-height:1; padding:0 2px;
    opacity:0.35; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); flex-shrink:0;
  }
  .modal-del-btn:hover { opacity:1; transform:scale(1.15); }
  .modal-check-btn {
    background:none; border:1.5px solid #D8C8E8; border-radius:50%;
    width:22px; height:22px; cursor:pointer; color:var(--primary);
    font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1); line-height:1;
  }
  .modal-check-btn:hover { border-color:var(--primary); background:rgba(205,180,219,0.12); transform:scale(1.1); }
  .modal-check-btn.done-state { background:linear-gradient(135deg,var(--primary),var(--accent)); border-color:transparent; color:#fff; }
  .modal-check-btn.done-state:hover { background:linear-gradient(135deg,var(--accent),#FF6B8A); }
  .modal-empty {
    text-align:center; color:var(--text-mute); font-size:15px;
    padding:36px 20px; cursor:default; user-select:none; line-height:1.8;
  }

  .day-modal-add {
    padding:12px 18px 20px; border-top: 0.5px solid rgba(205,180,219,0.18);
    display:flex; gap:10px; flex-shrink:0;
  }
  .day-modal-add .add-input { font-size:14px; padding:10px 14px; }
  .day-modal-add .add-btn   { padding:10px 18px; font-size:14px; }

  /* ══ 공유 버튼 ══ */
  .share-btn {
    background:rgba(255,255,255,0.22); border:none; border-radius:50%;
    width:30px; height:30px; cursor:pointer; color:#fff; font-size:15px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .share-btn:hover { background:rgba(255,255,255,0.38); transform:scale(1.08); }

  /* ══ 공유 바텀시트 ══ */
  .share-overlay {
    position:fixed; inset:0; background:rgba(100,70,150,0.18);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    z-index:310; opacity:0; pointer-events:none; transition:opacity 0.24s ease;
  }
  .share-overlay.active { opacity:1; pointer-events:all; }
  .share-sheet {
    position:fixed; left:0; right:0; bottom:-100%;
    background:rgba(249,248,255,0.97);
    backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
    border-radius:28px 28px 0 0; z-index:311;
    transition:bottom 0.38s cubic-bezier(0.32,1.28,0.64,1);
    padding:0 0 env(safe-area-inset-bottom,16px);
    box-shadow:0 -8px 48px rgba(150,100,200,0.16);
  }
  .share-sheet.active { bottom:0; }
  .share-sheet-handle { width:40px; height:4.5px; background:rgba(205,180,219,0.35); border-radius:3px; margin:12px auto 0; }
  .share-sheet-title { font-size:13px; font-weight:700; color:#AEAEB2; text-align:center; padding:14px 0 6px; letter-spacing:0.3px; }
  .share-row {
    display:flex; gap:0; border-top:0.5px solid rgba(205,180,219,0.18); border-bottom:0.5px solid rgba(205,180,219,0.18);
    margin:0 0 8px;
  }
  .share-item {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:7px; padding:18px 8px; cursor:pointer; border:none; background:none; font-family:inherit;
    transition:background 0.18s ease; border-right:0.5px solid rgba(205,180,219,0.14);
  }
  .share-item:last-child { border-right:none; }
  .share-item:hover { background:rgba(205,180,219,0.08); }
  .share-item:active { background:rgba(205,180,219,0.16); transform:scale(0.97); }
  .share-icon { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; }
  .share-icon.save   { background:linear-gradient(135deg,#CDB4DB,#FFAFCC); }
  .share-icon.kakao  { background:#FEE500; }
  .share-icon.sms    { background:linear-gradient(135deg,#34C759,#30D158); }
  .share-label { font-size:11px; font-weight:600; color:#6E6E73; letter-spacing:-0.1px; }
  .share-cancel {
    display:block; width:calc(100% - 32px); margin:0 16px 12px;
    padding:14px; background:rgba(205,180,219,0.12); border:none; border-radius:14px;
    font-size:15px; font-weight:600; color:#9B7BB4; cursor:pointer; font-family:inherit;
    transition:background 0.18s;
  }
  .share-cancel:hover { background:rgba(205,180,219,0.22); }

  /* ══ 모바일 ══ */
  @media (max-width: 430px) {
    header { padding: 8px 12px; }
    .header-title { font-size: 12px; }
    .header-date  { font-size: 9px; }
    .clo-em { font-size: 16px; }
    .clo-nm, .clo-dot { font-size: 9px; }
    .c-logo-sub { display: none; }
    #clockLabel { font-size: 10px; }
    .tabs { top: 56px; }
    .tab-btn { font-size: 13px; padding: 10px 2px; }
    .section-label { font-size: 18px; padding: 16px 16px 4px; }
    .add-input { font-size: 14px; }
    .add-btn { font-size: 14px; padding: 10px 13px; }
  }

  /* ══ 알림 팝업 ══ */
  .alarm-overlay {
    position:fixed; inset:0; background:rgba(100,70,150,0.22);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    z-index:400; opacity:0; pointer-events:none; transition:opacity 0.22s ease;
  }
  .alarm-overlay.active { opacity:1; pointer-events:all; }
  .alarm-popup {
    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%) scale(0.92);
    background:rgba(249,248,255,0.97); backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border-radius:24px; z-index:401; padding:22px 20px 18px;
    min-width:280px; max-width:340px; width:90%;
    box-shadow:0 8px 48px rgba(150,100,200,0.22);
    opacity:0; pointer-events:none;
    transition:opacity 0.22s ease, transform 0.26s cubic-bezier(0.34,1.56,0.64,1);
  }
  .alarm-popup.active { opacity:1; pointer-events:all; transform:translate(-50%,-50%) scale(1); }
  .alarm-popup-header {
    display:flex; align-items:center; gap:8px; margin-bottom:14px;
  }
  .alarm-popup-icon { font-size:22px; line-height:1; }
  .alarm-popup-title { font-size:15px; font-weight:700; color:var(--text); flex:1; }
  .alarm-popup-close {
    width:26px; height:26px; border-radius:50%; border:none;
    background:rgba(205,180,219,0.18); color:#9B7BB4;
    font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.18s;
  }
  .alarm-popup-close:hover { background:rgba(205,180,219,0.35); }
  .alarm-popup-list {
    max-height:220px; overflow-y:auto; margin-bottom:14px;
    display:flex; flex-direction:column; gap:7px;
  }
  .alarm-popup-item {
    font-size:13px; color:var(--text); background:rgba(205,180,219,0.10);
    border-radius:10px; padding:9px 12px;
    border-left:3px solid var(--primary);
    display:flex; align-items:center; gap:6px;
  }
  .alarm-popup-item.starred { border-left-color:var(--accent); }
  .alarm-popup-btn {
    width:100%; padding:10px; border-radius:12px; border:none;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff; font-size:14px; font-weight:700; font-family:inherit;
    cursor:pointer; transition:filter 0.18s;
  }
  .alarm-popup-btn:hover { filter:brightness(1.07); }

  /* ══ 인쇄 ══ */
  @media print {
    header,.tabs,.toast-wrap,.add-area,.cal-nav,.pdf-btn,
    #panel-todo,#panel-done,.modal-overlay,.day-modal { display:none !important; }
    #panel-cal { display:block !important; }
    body { background:white; }
    .print-title { display:block; text-align:center; font-size:20px; font-weight:800; margin-bottom:16px; color:var(--text); }
    .cal-grid { margin:0; border-radius:0; }
  }
  .print-title { display:none; }

  /* ══ 매일반복 버튼 ══ */
  .repeat-task-btn {
    background:rgba(162,210,255,0.18); border:none; cursor:pointer;
    padding:3px 10px; border-radius:10px; font-size:11px; color:#5A90BE;
    font-weight:600; font-family:inherit; margin-left:8px;
    transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .repeat-task-btn:hover { background:rgba(162,210,255,0.32); transform:scale(1.04); }

  /* ══ 반복 모달 ══ */
  .recurring-overlay {
    position:fixed; inset:0; background:rgba(100,70,150,0.14);
    backdrop-filter:blur(14px) saturate(120%); -webkit-backdrop-filter:blur(14px) saturate(120%);
    z-index:250; opacity:0; pointer-events:none; transition:opacity 0.28s ease;
  }
  .recurring-overlay.active { opacity:1; pointer-events:all; }
  .recurring-modal {
    position:fixed; left:0; right:0; bottom:-100%; max-height:80vh;
    background:rgba(249,248,255,0.97); backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border-radius:28px 28px 0 0; z-index:251;
    transition:bottom 0.42s cubic-bezier(0.32,1.28,0.64,1);
    display:flex; flex-direction:column;
    box-shadow:var(--shadow-modal); overflow:hidden;
  }
  .recurring-modal.active { bottom:0; }
  .recurring-modal-hdr {
    padding:18px 22px 16px;
    background:linear-gradient(135deg,var(--accent2) 0%,#BDE0FE 100%);
    flex-shrink:0; user-select:none;
    display:flex; align-items:center; justify-content:space-between;
  }
  .recurring-modal-title { font-size:16px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .recurring-modal-close {
    background:rgba(255,255,255,0.22); border:none; border-radius:50%;
    width:30px; height:30px; cursor:pointer; color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.22s;
  }
  .recurring-modal-close:hover { background:rgba(255,255,255,0.38); }
  .recurring-modal-body { flex:1; overflow-y:auto; padding:14px 18px; }
  .recurring-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 4px; border-bottom:0.5px solid rgba(205,180,219,0.12);
  }
  .recurring-item-text { flex:1; font-size:14px; color:var(--text); letter-spacing:-0.1px; cursor:pointer; transition:color 0.18s; }
  .recurring-item-text:hover { color:#5A90BE; }
  .recurring-del-btn {
    background:none; border:none; cursor:pointer; color:var(--accent);
    font-size:20px; line-height:1; padding:0 2px;
    opacity:0.35; transition:all 0.2s; flex-shrink:0;
  }
  .recurring-del-btn:hover { opacity:1; transform:scale(1.15); }
  .recurring-add-row {
    padding:12px 18px 20px; border-top:0.5px solid rgba(205,180,219,0.18);
    display:flex; gap:10px; flex-shrink:0;
  }
  .recurring-edit-input {
    flex:1; font-size:14px; color:var(--text); border:none; outline:none;
    background:transparent; font-family:inherit; padding:0;
    border-bottom:2px solid var(--accent2); caret-color:var(--accent2);
    letter-spacing:-0.1px;
  }

  /* ══ 장기업무 ══ */
  .long-section-label {
    padding:16px 22px 6px; font-size:16px; font-weight:700; color:#5A90BE;
    letter-spacing:-0.3px; cursor:default; user-select:none;
    display:flex; align-items:center; gap:8px;
  }
  .long-task-item {
    background:var(--card); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px); border-radius:var(--radius-lg);
    padding:14px 14px 11px 16px; margin-bottom:12px;
    display:flex; flex-direction:column; gap:9px;
    border:0.5px solid rgba(162,210,255,0.35);
    box-shadow:0 2px 20px rgba(140,180,210,0.09), 0 1px 3px rgba(0,0,0,0.04);
    transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;

  .long-task-top { display:flex; align-items:flex-start; gap:12px; }
  .long-check-btn {
    width:28px; height:28px; border-radius:50%;
    border:2px solid var(--accent2); background:#fff; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    margin-top:1px; font-size:11px; font-weight:700; color:#5A90BE;

  .long-check-btn.s1 { background:rgba(162,210,255,0.22); border-color:var(--accent2); color:#5A90BE; }
  .long-check-btn.s2 { background:rgba(205,180,219,0.28); border-color:var(--primary); color:#9B7BB4; }
  .long-check-btn.s3 { background:linear-gradient(135deg,var(--primary),var(--accent)); border-color:var(--accent); color:#fff; }
  .long-badge {
    font-size:10px; background:rgba(162,210,255,0.22); color:#5A90BE;
    padding:2px 8px; border-radius:20px; cursor:default; user-select:none;

  .long-stage-step.s-done   { background:linear-gradient(90deg,var(--primary),var(--accent)); }

  .long-stage-label {

  .long-stage-label.s-done  { color:#9B7BB4; font-weight:600; }

  /* ══ 간트 차트 ══ */
  .gantt-wrap {
    margin:0 14px 20px; border-radius:var(--radius-lg); overflow:hidden;
    box-shadow:0 2px 20px rgba(140,180,210,0.08), 0 0 0 0.5px rgba(162,210,255,0.22);
    background:rgba(255,255,255,0.70);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .gantt-hdr {
    padding:13px 18px 10px; font-size:13px; font-weight:700; color:#5A90BE;
    letter-spacing:-0.2px; border-bottom:0.5px solid rgba(162,210,255,0.18);
    user-select:none; display:flex; align-items:center; gap:6px; cursor:pointer;
  }
  .gantt-hdr:hover { opacity:0.80; }
  .gantt-body { padding:8px 14px 12px; }
  .gantt-row {
    display:flex; align-items:center; gap:10px;
    padding:6px 4px; border-bottom:0.5px solid rgba(205,180,219,0.10);
    transition:background 0.18s ease; border-radius:8px;
  }
  .gantt-row:last-child { border-bottom:none; }
  .gantt-row:hover { background:rgba(205,180,219,0.07); }
  .gantt-label {
    width:150px; font-size:11px; color:#6E6E73; flex-shrink:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    cursor:default; user-select:none; font-weight:500;
  }
  .gantt-bar-outer { position:relative; flex:1; height:20px; cursor:default; }
  .gantt-track { position:absolute; inset:0; overflow:visible; }
  .gantt-bar {
    position:absolute; top:3px; height:14px; border-radius:7px;
    background:linear-gradient(90deg,var(--primary),var(--accent));
    min-width:14px; transition:all 0.25s ease; cursor:default; overflow:visible;
  }
  .gantt-bar:hover { top:1px; height:18px; filter:brightness(1.12) saturate(1.2); box-shadow:0 3px 12px rgba(180,140,210,0.30); }
  .gantt-bar.g-active { background:linear-gradient(90deg,var(--accent2),#BDE0FE); }
  .gantt-bar.g-active:hover { box-shadow:0 3px 12px rgba(140,180,220,0.30); }
  .gantt-tip {
    display:none; position:absolute; bottom:calc(100% + 9px); left:50%;
    transform:translateX(-50%);
    background:rgba(29,29,31,0.90); color:#fff;
    padding:6px 11px; border-radius:9px;
    font-size:11px; white-space:nowrap; z-index:200;
    pointer-events:none; letter-spacing:-0.1px;
    box-shadow:0 4px 14px rgba(0,0,0,0.22);
  }
  .gantt-tip::after {
    content:''; position:absolute; top:100%; left:50%;
    transform:translateX(-50%);
    border:5px solid transparent; border-top-color:rgba(29,29,31,0.90);
  }
  .gantt-bar:hover .gantt-tip { display:block; }
  .gantt-status { font-size:10px; width:56px; text-align:right; flex-shrink:0; user-select:none; }
  .gantt-empty { text-align:center; padding:18px; color:var(--text-mute); font-size:13px; cursor:default; user-select:none; }

  /* ══ 완료 항목 삭제 버튼 ══ */
  .done-del-btn {
    background:none; border:none; cursor:pointer; color:#FF6B8A;
    font-size:18px; line-height:1; padding:0 4px; opacity:0.25;
    transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); flex-shrink:0; align-self:center;
  }
  .done-del-btn:hover { opacity:1; transform:scale(1.18); }

  /* ══ 장기업무 단계 노트 ══ */
  .long-stage-notes { display:flex; gap:5px; padding:0 2px; margin-bottom:3px; }
  .long-note-inp {
    flex:1; font-size:10px; border:none; border-bottom:1px solid rgba(205,180,219,0.22);
    background:transparent; color:var(--text-sub); padding:2px 4px;
    outline:none; font-family:inherit; text-align:center; min-width:0;
    transition:border-color 0.2s, color 0.2s; cursor:text;
  }
  .long-note-inp:focus { border-bottom-color:var(--primary); color:var(--text); }
  .long-note-inp::placeholder { color:var(--text-mute); font-size:9px; }

  /* ══ 장기업무 단계 배지 ══ */
  .long-cur-stage {
    font-size:11px; font-weight:700; padding:1px 8px; border-radius:20px;
    cursor:default; user-select:none; white-space:nowrap;
  }
  .long-cur-stage.s0 { background:rgba(205,205,210,0.18); color:#AEAEB2; }
  .long-cur-stage.s1 { background:rgba(162,210,255,0.22); color:#5A90BE; }
  .long-cur-stage.s2 { background:rgba(205,180,219,0.22); color:#9B7BB4; }
  .long-cur-stage.s3 { background:rgba(255,175,204,0.22); color:#CC6080; }
  .long-cur-stage.gantt-stage-btn { cursor:pointer; transition:transform 0.15s ease, filter 0.15s ease; }
  .long-cur-stage.gantt-stage-btn:hover { transform:scale(1.1); filter:brightness(1.15); }

  /* ══ 장기업무 관리 모달 ══ */
  .lmgmt-overlay {
    position:fixed; inset:0; background:rgba(100,70,150,0.14);
    backdrop-filter:blur(14px) saturate(120%); -webkit-backdrop-filter:blur(14px) saturate(120%);
    z-index:260; opacity:0; pointer-events:none; transition:opacity 0.28s ease;
  }
  .lmgmt-overlay.active { opacity:1; pointer-events:all; }
  .lmgmt-modal {
    position:fixed; left:0; right:0; bottom:-100%; max-height:88vh;
    background:rgba(249,248,255,0.97); backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border-radius:28px 28px 0 0; z-index:261;
    transition:bottom 0.42s cubic-bezier(0.32,1.28,0.64,1);
    display:flex; flex-direction:column;
    box-shadow:var(--shadow-modal); overflow:hidden;
  }
  .lmgmt-modal.active { bottom:0; }
  .lmgmt-hdr {
    padding:16px 22px 14px;
    background:linear-gradient(135deg,var(--accent2) 0%,var(--primary) 100%);
    flex-shrink:0; user-select:none;
    display:flex; align-items:center; justify-content:space-between;
  }
  .lmgmt-title { font-size:16px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
  .lmgmt-close {
    background:rgba(255,255,255,0.22); border:none; border-radius:50%;
    width:30px; height:30px; cursor:pointer; color:#fff; font-size:20px;
    display:flex; align-items:center; justify-content:center; transition:all 0.22s;
  }
  .lmgmt-close:hover { background:rgba(255,255,255,0.38); }
  .lmgmt-body { flex:1; overflow-y:auto; padding:10px 18px 20px; }
  .lmgmt-row {
    display:flex; align-items:center; gap:10px;
    padding:11px 4px; border-bottom:0.5px solid rgba(205,180,219,0.14);
  }
  .lmgmt-row:last-child { border-bottom:none; }
  .lmgmt-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .lmgmt-dot.active { background:var(--accent2); }
  .lmgmt-dot.done   { background:linear-gradient(135deg,var(--primary),var(--accent)); }
  .lmgmt-name {
    flex:1; font-size:14px; color:var(--text); cursor:text;
    letter-spacing:-0.1px; word-break:break-all;
  }
  .lmgmt-name-input {
    flex:1; font-size:14px; color:var(--text); border:none; outline:none;
    background:transparent; font-family:inherit;
    border-bottom:2px solid var(--primary); caret-color:var(--primary);
  }
  .lmgmt-date { font-size:11px; color:#AEAEB2; white-space:nowrap; flex-shrink:0; cursor:default; }
  .lmgmt-date input[type=date] {
    font-size:11px; color:var(--text); border:none; border-bottom:1.5px solid var(--primary);
    outline:none; background:transparent; font-family:inherit; cursor:pointer; padding:1px 2px;
  }
  .lmgmt-del {
    background:none; border:none; cursor:pointer; color:#FF6B8A;
    font-size:18px; line-height:1; padding:0 3px;
    opacity:0.3; transition:all 0.2s; flex-shrink:0;
  }
  .lmgmt-del:hover { opacity:1; transform:scale(1.15); }
  .lmgmt-section-title {
    font-size:11px; font-weight:700; color:#AEAEB2; letter-spacing:0.5px;
    margin:14px 0 6px; text-transform:uppercase; user-select:none;
  }

  /* ══ 매일 반복 배지 ══ */
  .daily-badge {
    font-size:10px; background:rgba(162,210,255,0.22); color:#5A90BE;
    padding:2px 7px; border-radius:20px; font-weight:600;
    cursor:default; user-select:none; white-space:nowrap;
  }
  .task-text .recurring-icon { font-size:15px; margin-left:6px; vertical-align:middle; opacity:0.75; }

  /* ══ 장기업무 pending ══ */
  .long-task-item.long-pending { opacity:0.55; animation:pending-pulse 0.7s ease-in-out infinite alternate; }
  .long-task-item.long-pending .pending-bar { display:block; }
  .long-pending-hint {
    font-size:11px; color:var(--accent2); font-weight:600; margin-top:3px;
    animation:blink 0.85s ease-in-out infinite; cursor:default; user-select:none;
  }

  /* ══ 장기업무 추가 토글 ══ */
  .long-add-row { display:flex; gap:8px; margin-bottom:6px; align-items:center; }
  .long-toggle-btn {
    background:rgba(162,210,255,0.18); border:1.5px solid rgba(162,210,255,0.30);
    border-radius:var(--radius-md); padding:11px 12px; font-size:13px; cursor:pointer;
    flex-shrink:0; font-weight:600; color:#5A90BE; font-family:inherit;
    transition:all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .long-toggle-btn:hover { background:rgba(162,210,255,0.32); }
  .long-toggle-btn.on { background:rgba(162,210,255,0.32); border-color:var(--accent2); }

  /* ══ 크로스 리스트 드래그 드롭 ══ */
  #longTaskSection.drop-zone-active { min-height: 72px; }
  #longTaskSection.drop-zone-hover {
    background: rgba(162,210,255,0.10);
    border: 1.5px dashed rgba(162,210,255,0.55);
    border-radius: var(--radius-lg);
    margin: 0 16px;
  }
  #longTaskSection.drop-zone-hover:not(:has(.long-task-item))::after {
    content: '📌 여기에 드롭 → 장기업무로 이동';
    display: flex; align-items: center; justify-content: center;
    height: 72px; font-size: 13px; color: #5A90BE; font-weight: 600;
  }
  #taskList.drop-zone-hover {
    background: rgba(205,180,219,0.08);
    border: 1.5px dashed rgba(205,180,219,0.55);
    border-radius: var(--radius-lg);
    min-height: 60px;
  }
  #taskList.drop-zone-hover:not(:has(.task-item))::after {
    content: '✅ 여기에 드롭 → 할일로 이동';
    display: flex; align-items: center; justify-content: center;
    height: 60px; font-size: 13px; color: #9B7BB4; font-weight: 600;
  }
  .long-task-item[draggable="true"] { cursor: grab; }
  .long-task-item[draggable="true"]:active { cursor: grabbing; }
  .long-task-item.is-dragging {
    opacity: 0.40; transform: scale(0.96) rotate(-0.7deg) !important;
    box-shadow: 0 20px 56px rgba(162,210,255,0.32) !important;
    background: rgba(255,255,255,0.98) !important; z-index: 50; filter: blur(0.5px);
  }

  /* ══ 데이터 내보내기/가져오기 ══ */
  .data-btn {
    background:rgba(205,180,219,0.12); border:1px solid rgba(205,180,219,0.28);
    border-radius:var(--radius-sm); padding:3px 10px; font-size:11px; color:#9B7BB4;
    cursor:pointer; font-family:inherit; font-weight:600;
    transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .data-btn:hover { background:rgba(205,180,219,0.28); transform:scale(1.04); }
  .data-btn.import { color:#5A90BE; border-color:rgba(162,210,255,0.35); background:rgba(162,210,255,0.10); }
  .data-btn.import:hover { background:rgba(162,210,255,0.24); }
  .hint-data-row { display:flex; align-items:center; justify-content:center; gap:8px; padding:2px 0 4px; }

  /* ══ 앰비언트 애니메이션 ══ */
  @keyframes card-ambient {
    0%, 100% { box-shadow: var(--shadow-card); }
    50%       { box-shadow: 0 6px 28px rgba(180,140,210,0.16), 0 2px 8px rgba(0,0,0,0.07); }
  }
  .task-item:not(.pending):not(.is-dragging):not(.completing) {
    animation: card-ambient 4s ease-in-out infinite;
  }
  .task-item:nth-child(2) { animation-delay: 0.8s; }
  .task-item:nth-child(3) { animation-delay: 1.6s; }
  .task-item:nth-child(4) { animation-delay: 2.4s; }
  .task-item:nth-child(5) { animation-delay: 3.2s; }
  .task-item:nth-child(6) { animation-delay: 0.5s; }
  .task-item:nth-child(7) { animation-delay: 1.3s; }

  @keyframes done-ambient {
    0%, 100% { box-shadow: 0 1px 10px rgba(180,140,210,0.05); }
    50%       { box-shadow: 0 4px 22px rgba(180,140,210,0.13); }
  }
  .done-item { animation: done-ambient 5s ease-in-out infinite; }
  .done-item:nth-child(2) { animation-delay: 1s; }
  .done-item:nth-child(3) { animation-delay: 2s; }
  .done-item:nth-child(4) { animation-delay: 3s; }

  @keyframes tab-glow {
    0%, 100% { border-bottom-color: var(--primary); color: var(--primary); }
    50%       { border-bottom-color: var(--accent); color: var(--accent); }
  }
  .tab-btn.active { animation: tab-glow 3s ease-in-out infinite; }

  @keyframes progress-shimmer {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--accent2), var(--primary), var(--accent), var(--primary), var(--accent2));
    background-size: 300% 100%;
    animation: progress-shimmer 4s linear infinite;
  }

  @keyframes add-glow {
    0%, 100% { box-shadow: 0 2px 8px rgba(205,180,219,0.12); }
    50%       { box-shadow: 0 4px 20px rgba(205,180,219,0.48); }
  }
  .add-btn { animation: add-glow 2.5s ease-in-out infinite; }

  @keyframes long-ambient {
    0%, 100% { box-shadow: 0 2px 20px rgba(140,180,210,0.09), 0 1px 3px rgba(0,0,0,0.04); }
    50%       { box-shadow: 0 5px 26px rgba(140,180,210,0.17), 0 2px 6px rgba(0,0,0,0.06); }
  }
  .long-task-item:not(.long-pending) { animation: long-ambient 4.5s ease-in-out infinite; }
  .long-task-item:nth-child(2):not(.long-pending) { animation-delay: 1.2s; }
  .long-task-item:nth-child(3):not(.long-pending) { animation-delay: 2.4s; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title" id="headerTitle"><span id="userNameSpan" onclick="startUserNameEdit()" title="클릭해서 이름 수정">민재</span>의 하루</div>
      <div class="header-date" id="headerDate"></div>
    </div>
  </div>

  <div class="header-center">
    <div class="c-logo-wrap" onclick="location.reload()" style="cursor:pointer;" title="새로고침">
      <span class="clo-em">오</span><span class="clo-nm">늘</span>
      <span class="clo-dot">·</span>
      <span class="clo-em">하</span><span class="clo-nm">자</span>
      <span class="clo-dot">·</span>
      <span class="clo-em">제</span><span class="clo-nm">발</span>
    </div>
    <div class="c-logo-sub">do it today</div>
  </div>

  <div class="header-right">
    <span id="clockLabel"></span>
    <div class="auth-row" id="authRow">
      <button class="auth-btn login" onclick="signInWithGoogle()" id="loginBtn">G 로그인</button>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('todo')">할 일 <span id="todoCount"></span></button>
  <button class="tab-btn" onclick="switchTab('done')">완료 <span id="doneCount"></span></button>
  <button class="tab-btn" onclick="switchTab('cal')">캘린더</button>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- 알림 팝업 -->
<div class="alarm-overlay" id="alarmOverlay" onclick="closeAlarmPopup()"></div>
<div class="alarm-popup" id="alarmPopup">
  <div class="alarm-popup-header">
    <span class="alarm-popup-icon">🔔</span>
    <span class="alarm-popup-title">아직 완료 못한 할 일</span>
    <button class="alarm-popup-close" onclick="closeAlarmPopup()">✕</button>
  </div>
  <div class="alarm-popup-list" id="alarmPopupList"></div>
  <button class="alarm-popup-btn" onclick="closeAlarmPopup()">확인</button>
</div>

<!-- 할 일 탭 -->
<div class="tab-panel active" id="panel-todo">
  <div id="movedNotice" style="display:none" class="moved-notice"></div>
  <div class="section-label">오늘 할 일 <button class="repeat-task-btn" onclick="openRecurringModal()">🔁 매일반복 설정</button></div>
  <div class="progress" id="progressText"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="task-list" id="taskList"
    ondragover="onTaskListDragOver(event)" ondragleave="onTaskListDragLeave(event)" ondrop="onTaskListDrop(event)"></div>
  <div id="longTaskSection"
    ondragover="onLongSectionDragOver(event)" ondragleave="onLongSectionDragLeave(event)" ondrop="onLongSectionDrop(event)"></div>
  <div style="height:120px;"></div>
</div>

<!-- 완료 탭 -->
<div class="tab-panel" id="panel-done">
  <div class="section-label">완료한 일 <span class="sub">체크 아이콘으로 되돌리기</span></div>
  <div class="task-list" id="doneList"></div>
  <div style="height:24px;"></div>
</div>

<!-- 캘린더 탭 -->
<div class="tab-panel" id="panel-cal">
  <div class="cal-header">
    <button class="cal-nav" onclick="moveCal(-1)">‹</button>
    <div class="cal-header-center">
      <span id="calTitle"></span>
      <button class="pdf-btn" onclick="printCal()">🖨 PDF</button>
    </div>
    <button class="cal-nav" onclick="moveCal(1)">›</button>
  </div>
  <div class="print-title" id="printTitle"></div>
  <div class="cal-grid" id="calGrid"></div>
  <div id="ganttSection"></div>
  <div style="height:24px;"></div>
</div>

<!-- 입력 영역 (바텀시트) -->
<div class="add-area" id="addArea">
  <div class="add-row">
    <input class="add-input" id="taskInput" placeholder="할 일 입력..." maxlength="300">
    <button class="add-btn" onclick="addTask(false)">추가</button>
    <button class="long-toggle-btn" id="longToggleBtn" onclick="toggleLongInput()" title="장기업무 추가">📌</button>
  </div>
  <div class="long-add-row" id="longAddRow" style="display:none;">
    <input class="add-input" id="longTaskInput" placeholder="장기 업무 입력 (일주일~한달)..." maxlength="300"
      onkeydown="if(event.key==='Enter'){event.preventDefault();submitLongTask();}">
    <button class="add-btn" style="background:linear-gradient(135deg,var(--accent2),#BDE0FE);" onclick="submitLongTask()">추가</button>
  </div>
  <div class="hint">
    <kbd>Enter</kbd> 추가 &nbsp;·&nbsp; <kbd>Ctrl+Enter</kbd> ⭐ 중요 추가 &nbsp;·&nbsp; 📌 장기업무
  </div>
  <div class="hint-data-row">
    <button class="data-btn" onclick="exportData()" title="데이터를 JSON 파일로 백업">💾 데이터 내보내기</button>
    <button class="data-btn import" onclick="document.getElementById('importFileInput').click()" title="JSON 파일에서 데이터 복원">📂 데이터 가져오기</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<!-- 매일반복 모달 -->
<div class="recurring-overlay" id="recurringOverlay" onclick="closeRecurringModal()"></div>
<div class="recurring-modal" id="recurringModal">
  <div class="day-modal-handle"></div>
  <div class="recurring-modal-hdr">
    <div class="recurring-modal-title">🔁 매일 자동 등록 할 일</div>
    <button class="recurring-modal-close" onclick="closeRecurringModal()">×</button>
  </div>
  <div class="recurring-modal-body" id="recurringBody"></div>
  <div class="recurring-add-row">
    <input class="add-input" id="recurringInput" placeholder="매일 반복할 일 입력..." maxlength="200"
      onkeydown="if(event.key==='Enter'){event.preventDefault();addRecurringTask();}">
    <button class="add-btn" style="background:linear-gradient(135deg,var(--accent2),#BDE0FE);" onclick="addRecurringTask()">추가</button>
  </div>
</div>

<!-- 장기업무 관리 모달 -->
<div class="lmgmt-overlay" id="lmgmtOverlay" onclick="closeLongMgmtModal()"></div>
<div class="lmgmt-modal" id="lmgmtModal">
  <div class="day-modal-handle"></div>
  <div class="lmgmt-hdr">
    <div class="lmgmt-title">📌 장기업무 일정 관리</div>
    <button class="lmgmt-close" onclick="closeLongMgmtModal()">×</button>
  </div>
  <div class="lmgmt-body" id="lmgmtBody"></div>
</div>

<!-- 날짜 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeDayModal()"></div>
<div class="day-modal" id="dayModal">
  <div class="day-modal-handle"></div>
  <div class="day-modal-header">
    <div>
      <div class="day-modal-title" id="dayModalTitle"></div>
      <div class="day-modal-type"  id="dayModalType"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="share-btn" onclick="openShareSheet()" title="공유">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <button class="day-modal-close" onclick="closeDayModal()">×</button>
    </div>
  </div>
  <div class="day-modal-body" id="dayModalBody"></div>

<script>
// ══ 유틸 ══
function todayStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function isQuietHours(){const h=new Date().getHours();return h>=22||h<9;}
function formatTime(ts){const d=new Date(ts);return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function formatAMPM(d){
  let h=d.getHours();const m=pad(d.getMinutes()),s=pad(d.getSeconds());
  const ap=h>=12?'PM':'AM';h=h%12||12;return`${ap} ${h}:${m}:${s}`;
}
function isOverdue(ts){return Date.now()>ts;}
function linkify(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
}
function escapeHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══ 상태 ══
let state={
  tasks:[],doneTasks:[],log:{},futureTasks:{},
  lastDate:null,nextId:1,movedCount:0,
  recurringTasks:[],recurringLastDate:null,
  longTasks:[],doneLongTasks:[],
  savedAt:0
};
let alarmTimers={};
let pendingComplete={};
let pendingUndo={};
let pendingLongUndo={};
let editingId=null;
let calYear,calMonth;
let currentModalDate=null;
let modalEditInfo=null;

// ══ Firebase ══
let _db=null,_auth=null,currentUser=null,_saveDebounce=null;
const FIREBASE_CONFIG={
  apiKey:'AIzaSyBrARQuuYF3jYp4J3myWA-26Ya58uRz8Y4',
  authDomain:'todotoday-b0b9a.firebaseapp.com',

  messagingSenderId:'971814444647',
  appId:'1:971814444647:web:9cd620bff206b5622a3ec2'
};
let _messaging=null;
// Firebase Console → 프로젝트 설정 → 클라우드 메시징 → 웹 푸시 인증서에서 발급받은 키
const VAPID_KEY='BMeytaGtC8SwzDo3SfDYaGyYqEoEW_YkBBbZAi8ARRzifmbwa39e9m1bpDqds9QzWG6pG3XG0bw9bSY3chbPxlI';

function initFirebase(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    _auth=firebase.auth();

}
async function initMessaging(){
  try{
    if(typeof firebase.messaging!=='function')return;
    if(!('serviceWorker' in navigator))return;
    const perm=await Notification.requestPermission();
    if(perm!=='granted')return;
    const reg=await navigator.serviceWorker.ready;
    _messaging=firebase.messaging();
    const token=await _messaging.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg});
    if(token&&token!==state.fcmToken){
      state.fcmToken=token;
      saveState();
    }
  }catch(e){console.warn('FCM init err:',e);}
}

    row.innerHTML=`<button class="auth-btn login" onclick="signInWithGoogle()" id="loginBtn">G 로그인</button>`;

function _renderUserName(){

  if(!title)return;

function startUserNameEdit(){

}
function setSyncDot(status){
  const dot=document.getElementById('syncDot');
  if(!dot)return;
  dot.className='sync-dot'+(status==='syncing'?' syncing':status==='off'?' off':'');
  dot.title=status==='syncing'?'동기화 중…':status==='off'?'오프라인':'동기화됨';
}
async function loadFromFirestore(){
  if(!currentUser||!_db)return;
  try{
    setSyncDot('syncing');
    const ref=_db.doc(`users/${currentUser.uid}/state/data`);
    const snap=await ref.get();
    if(snap.exists){
      const remote=snap.data();
      if(!state.savedAt||remote.savedAt>state.savedAt){
        Object.assign(state,remote);
        try{localStorage.setItem('ijma_v3',JSON.stringify(state));}catch(e){}
        checkDayTransition();
        render();renderLongTasks();updateProgress();
        if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
        if(document.getElementById('panel-done').classList.contains('active'))renderDone();
        showToast('☁️ 클라우드에서 데이터를 불러왔어요','success');
      }
    }else if(state.tasks.length>0||state.doneTasks.length>0||state.longTasks.length>0){
      await saveToFirestore();
      showToast('☁️ 기존 데이터를 클라우드에 백업했어요!','success');
    }
    setSyncDot('ok');
  }catch(e){setSyncDot('off');console.warn('Firestore load err:',e);}
}
async function saveToFirestore(){
  if(!currentUser||!_db)return;
  try{
    setSyncDot('syncing');
    const ref=_db.doc(`users/${currentUser.uid}/state/data`);
    await ref.set(JSON.parse(JSON.stringify(state)));
    setSyncDot('ok');
  }catch(e){setSyncDot('off');console.warn('Firestore save err:',e);}
}

function loadState(){
  try{
    const s=localStorage.getItem('ijma_v3');
    if(s){
      const p=JSON.parse(s);
      Object.assign(state,p);
      if(!Array.isArray(state.tasks))state.tasks=[];
      if(!Array.isArray(state.doneTasks))state.doneTasks=[];
      if(!Array.isArray(state.longTasks))state.longTasks=[];
      if(!Array.isArray(state.doneLongTasks))state.doneLongTasks=[];
      if(!state.log||typeof state.log!=='object')state.log={};
      if(!state.futureTasks||typeof state.futureTasks!=='object')state.futureTasks={};
      if(!state.recurringTasks)state.recurringTasks=[];
      if(typeof state.nextId!=='number'||isNaN(state.nextId)){
        state.nextId=(state.tasks.concat(state.doneTasks).reduce((max,t)=>Math.max(max,t.id||0),0))+1;
      }
    }
  }catch(e){
    console.warn('loadState err:',e);
    state.tasks=state.tasks||[];
    state.doneTasks=state.doneTasks||[];
    state.nextId=state.nextId||1;
  }
}

function saveState(){
  state.savedAt=Math.max(state.savedAt||0,Date.now());
  try{localStorage.setItem('ijma_v3',JSON.stringify(state));}catch(e){}
  if(currentUser&&_db){
    clearTimeout(_saveDebounce);
    _saveDebounce=setTimeout(()=>saveToFirestore(),1000);
  }
}

// ══ 날짜 전환 ══
function _tsToDateStr(ts){const d=new Date(ts);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function checkDayTransition(){
  const today=todayStr();
  if(state.lastDate===today)return; // 이미 최신
  if(state.lastDate&&state.lastDate!==today){
    // 각 완료 항목을 실제 완료일 기준으로 로그에 기록
    state.doneTasks.forEach(t=>{
      const dateKey=t.doneAt?_tsToDateStr(t.doneAt):state.lastDate;
      if(!state.log[dateKey])state.log[dateKey]={done:[],missed:[]};
      if(!state.log[dateKey].done.some(e=>e.text===t.text))
        state.log[dateKey].done.push({text:t.text,starred:t.starred});
    });
    const missed=state.tasks.filter(t=>!t.done);
    const now=Date.now();
    state.tasks=missed.map(t=>({...t,registeredAt:now,done:false}));
    state.doneTasks=[];state.movedCount=missed.length;
    if(state.futureTasks[today]&&state.futureTasks[today].length>0){
      state.tasks=[...state.tasks,...state.futureTasks[today].map(t=>({...t,registeredAt:now,done:false}))];
      delete state.futureTasks[today];
    }
  }else if(!state.lastDate){
    state.movedCount=0;if(!state.futureTasks)state.futureTasks={};
    const t2=todayStr();
    if(state.futureTasks[t2]&&state.futureTasks[t2].length>0){
      const now=Date.now();
      state.tasks=[...state.tasks,...state.futureTasks[t2].map(t=>({...t,registeredAt:now,done:false}))];
      delete state.futureTasks[t2];
    }
  }
  state.lastDate=today;saveState();
  render();renderLongTasks();updateProgress();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}

function celebrate(text){

  document.body.appendChild(flash);setTimeout(()=>flash.remove(),800);
  const colors=['#CDB4DB','#FFC8DD','#FFAFCC','#BDE0FE','#A2D2FF','#FFD6FF','#C8E6FF','#FFB3C6'];

    el.style.cssText=`left:${cx}px;top:${cy}px;width:${isRibbon?size*0.4:size}px;height:${isRibbon?size*2.2:size}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'3px'};--dx:${dx}px;--dy:${dy}px;--dr:${dr}deg;--dur:${dur}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),dur*1000+100);
  }
  showToast(`<strong>🎉 완료!</strong> "${escapeHtml(text)}" 해냈어요!`,'success');
}

// ══ 진행률 ══
function updateProgress(){
  const total=state.tasks.length+state.doneTasks.length,done=state.doneTasks.length;
  document.getElementById('progressText').textContent=`${done} / ${total} 완료`;
  document.getElementById('progressFill').style.width=total?`${(done/total)*100}%`:'0%';
  document.getElementById('todoCount').textContent=state.tasks.length>0?`(${state.tasks.length})`:'';
  document.getElementById('doneCount').textContent=done>0?`(${done})`:'';
}

// ══ 할 일 렌더 ══
function render(){
  const list=document.getElementById('taskList');
  const sorted=[...state.tasks].sort((a,b)=>{
    if(a.starred&&!b.starred)return-1;if(!a.starred&&b.starred)return 1;
    const oa=a.sortOrder!==undefined?a.sortOrder:a.registeredAt;
    const ob=b.sortOrder!==undefined?b.sortOrder:b.registeredAt;
    return oa-ob;
  });
  const notice=document.getElementById('movedNotice');
  if(state.movedCount>0){notice.style.display='';notice.textContent=`📦 어제 미완료 ${state.movedCount}개가 오늘로 이동됐어요.`;}
  else notice.style.display='none';

  if(sorted.length===0){
    list.innerHTML='<div class="empty-state">할 일이 없어요 🎉<br>아래에서 추가해보세요</div>';
  }else{
    list.innerHTML=sorted.map(t=>{
      const overdue=isOverdue(t.registeredAt);
      const isPending=!!pendingComplete[t.id];
      const isEditing=editingId===t.id;
      const textEl=isEditing
        ?`<input class="task-edit-input" id="edit-${t.id}" value="${escapeHtml(t.text)}"
            onkeydown="handleEditKey(event,${t.id})" onblur="cancelEdit()" onclick="event.stopPropagation()">`
        :`<div class="task-text" onclick="handleTaskClick(event,${t.id})" title="클릭: 수정 · 더블클릭: 매일반복 토글">${linkify(t.text)}${t.isRecurring?'<span class="recurring-icon">🔁</span>':''}</div>`;
      return`
      <div class="task-item${t.starred?' starred':''}${isPending?' pending':''}" id="task-${t.id}"
        draggable="true"
        ondragstart="onTaskDragStart(event,${t.id})"
        ondragover="onTaskDragOver(event,${t.id})"
        ondragleave="onTaskDragLeave(event,${t.id})"
        ondragend="onTaskDragEnd(event,${t.id})"
        ondrop="onTaskDrop(event,${t.id})"
      >
        ${isPending?'<div class="pending-bar"></div>':''}
        <div class="check-btn${isPending?' pending-state':''}" onclick="startComplete(${t.id})" title="${isPending?'취소':'완료'}">${isPending?'×':''}</div>
        <div class="task-info">
          ${textEl}
          <div class="task-time ${overdue?'overdue':''}">
            🕐 ${formatTime(t.registeredAt)} 등록
            ${overdue?'<span class="repeat-badge">재알림 중</span>':'<span style="color:#D1D1D6">· 미도래</span>'}
            ${t.isRecurring?'<span class="daily-badge">매일해야하는일</span>':''}
          </div>
          ${isPending?'<div class="pending-hint">⚡ 1초 후 완료 · 다시 누르면 취소</div>':''}
        </div>
        <button class="icon-btn star${t.starred?' on':''}" onclick="toggleStar(${t.id})" title="중요">⭐</button>
        <button class="icon-btn trash" onclick="deleteTask(${t.id})" title="삭제">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 3.5h12M6 3.5V2.5a.5.5 0 01.5-.5h2a.5.5 0 01.5.5v1M2.5 3.5l1 9a1 1 0 001 .9h6a1 1 0 001-.9l1-9"/>
            <line x1="6" y1="7" x2="6" y2="10.5"/><line x1="9" y1="7" x2="9" y2="10.5"/>
          </svg>
        </button>
      </div>`;
    }).join('');
  }
  if(editingId){const inp=document.getElementById(`edit-${editingId}`);if(inp){inp.focus();inp.select();}}
  updateProgress();
}

// ══ 드래그 & 드롭 ══
let dragSrcId=null;
let dragSrcType=null; // 'task' | 'long'
let dragSrcLongId=null;
function _getSortedTasks(){
  return[...state.tasks].sort((a,b)=>{
    if(a.starred&&!b.starred)return-1;if(!a.starred&&b.starred)return 1;
    const oa=a.sortOrder!==undefined?a.sortOrder:a.registeredAt;
    const ob=b.sortOrder!==undefined?b.sortOrder:b.registeredAt;
    return oa-ob;
  });
}
function onTaskDragStart(e,id){
  if(e.target.closest('button,input,a')){e.preventDefault();return;}
  dragSrcId=id;dragSrcType='task';
  e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',String(id));
  setTimeout(()=>{
    const el=document.getElementById(`task-${id}`);if(el)el.classList.add('is-dragging');
    const ls=document.getElementById('longTaskSection');if(ls)ls.classList.add('drop-zone-active');
  },0);
}
function onTaskDragOver(e,id){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(dragSrcType==='long'){
    document.getElementById('taskList').classList.add('drop-zone-hover');
    return;
  }
  if(dragSrcId===id)return;
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('drag-over'));
  const el=document.getElementById(`task-${id}`);if(el)el.classList.add('drag-over');
}
function onTaskDragLeave(e,id){
  if(dragSrcType==='long'){
    const tl=document.getElementById('taskList');
    if(tl&&!tl.contains(e.relatedTarget))tl.classList.remove('drop-zone-hover');
    return;
  }
  const el=document.getElementById(`task-${id}`);if(el)el.classList.remove('drag-over');
}
function onTaskDragEnd(e,id){
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('is-dragging','drag-over'));
  const ls=document.getElementById('longTaskSection');if(ls)ls.classList.remove('drop-zone-active','drop-zone-hover');
  const tl=document.getElementById('taskList');if(tl)tl.classList.remove('drop-zone-hover');
  dragSrcId=null;dragSrcType=null;
}
function onTaskDrop(e,targetId){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('drag-over','is-dragging'));
  const tl=document.getElementById('taskList');if(tl)tl.classList.remove('drop-zone-hover');
  // 장기업무 → 할일 변환
  if(dragSrcType==='long'){
    const id=dragSrcLongId;
    if(!id){dragSrcLongId=null;dragSrcType=null;return;}
    const longIdx=(state.longTasks||[]).findIndex(t=>t.id===id);
    if(longIdx===-1){dragSrcLongId=null;dragSrcType=null;return;}
    const lt=state.longTasks[longIdx];
    if(pendingLongComplete[id]){clearTimeout(pendingLongComplete[id].timerId);delete pendingLongComplete[id];}
    if(longEditingId===id)longEditingId=null;
    state.longTasks.splice(longIdx,1);
    const task={id:lt.id,text:lt.text,registeredAt:Date.now(),done:false,starred:lt.starred||false};
    state.tasks.push(task);scheduleAlarm(task);
    dragSrcLongId=null;dragSrcType=null;
    saveState();render();renderLongTasks();updateProgress();
    showToast(`✅ "<strong>${escapeHtml(lt.text)}</strong>" 할일로 이동됨`,'success');
    return;
  }
  // 할일 → 할일 순서 변경
  if(!dragSrcId||dragSrcId===targetId){dragSrcId=null;dragSrcType=null;return;}
  const sorted=_getSortedTasks();
  const srcIdx=sorted.findIndex(t=>t.id===dragSrcId);
  const tgtIdx=sorted.findIndex(t=>t.id===targetId);
  if(srcIdx===-1||tgtIdx===-1){dragSrcId=null;dragSrcType=null;return;}
  const src=sorted[srcIdx];const tgt=sorted[tgtIdx];
  if(src.starred!==tgt.starred){dragSrcId=null;dragSrcType=null;return;}
  sorted.splice(srcIdx,1);sorted.splice(tgtIdx,0,src);
  sorted.forEach((t,i)=>{t.sortOrder=i;});
  dragSrcId=null;dragSrcType=null;saveState();render();
}

// ══ 1초 퍼징 완료 ══
function startComplete(id){
  if(editingId===id)return;
  if(pendingComplete[id]){clearTimeout(pendingComplete[id].timerId);delete pendingComplete[id];render();return;}
  const timerId=setTimeout(()=>{delete pendingComplete[id];completeTask(id);},1000);
  pendingComplete[id]={timerId};render();
}
function completeTask(id){
  const idx=state.tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const taskText=state.tasks[idx].text;
  const el=document.getElementById(`task-${id}`);
  if(el){el.classList.add('completing');setTimeout(()=>{_doComplete(id);celebrate(taskText);},350);}
  else{_doComplete(id);celebrate(taskText);}
}
function _doComplete(id){
  const idx=state.tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const t={...state.tasks[idx],doneAt:Date.now(),done:true};
  clearInterval(alarmTimers[id]);state.doneTasks.push(t);state.tasks.splice(idx,1);
  saveState();render();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
  if(document.getElementById('panel-done').classList.contains('active'))renderDone();
}

// ══ 되돌리기 ══
function startUndo(id){
  if(pendingUndo[id]){clearTimeout(pendingUndo[id].timerId);delete pendingUndo[id];renderDone();return;}
  const timerId=setTimeout(()=>{delete pendingUndo[id];undoComplete(id);},1000);
  pendingUndo[id]={timerId};renderDone();
}
function startLongUndo(id){
  if(pendingLongUndo[id]){clearTimeout(pendingLongUndo[id].timerId);delete pendingLongUndo[id];renderDone();return;}
  const timerId=setTimeout(()=>{delete pendingLongUndo[id];undoLongComplete(id);},1000);
  pendingLongUndo[id]={timerId};renderDone();
}
function undoComplete(id){
  const idx=state.doneTasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const t={...state.doneTasks[idx],done:false};delete t.doneAt;
  state.doneTasks.splice(idx,1);state.tasks.push(t);
  scheduleAlarm(t);saveState();renderDone();render();
  if(document.getElementById('panel-cal').classList.contains('active')){renderCal();if(currentModalDate)renderDayModal();}
}

// ══ 삭제 / 별표 ══
function deleteTask(id){

  if(editingId===id)editingId=null;clearInterval(alarmTimers[id]);

}

// ══ 추가 ══
function addTask(starred){
  const input=document.getElementById('taskInput');

  try{

// ══ 캘린더 ══
function initCal(){if(calYear===undefined){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}}
function moveCal(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();
}
function getDayData(dateStr){
  const today=todayStr();
  const activeLongs=(state.longTasks||[]).filter(t=>{
    if(!t.startDate||t.stage===0)return false;
    const end=t.endDate||today;
    return t.startDate<=dateStr&&dateStr<=end;
  }).map(t=>({text:t.text,starred:t.starred,isLong:true,id:t.id,stage:t.stage}));
  const doneLongs=(state.doneLongTasks||[]).filter(t=>{
    if(!t.startDate||!t.endDate)return false;
    return t.startDate<=dateStr&&dateStr<=t.endDate;
  }).map(t=>({text:t.text,starred:t.starred,isLong:true,isDoneLong:true,id:t.id}));
  const allLong=[...activeLongs,...doneLongs];
  if(dateStr===today){
    // 완료일 기준: 오늘 완료된 것만 오늘에 표시
    const todayDone=state.doneTasks.filter(t=>!t.doneAt||_tsToDateStr(t.doneAt)===today);
    return{done:todayDone.map(t=>({text:t.text,starred:t.starred})),missed:[],todo:state.tasks.map(t=>({text:t.text,starred:t.starred,id:t.id})),long:allLong};
  }
  if(dateStr>today){const f=state.futureTasks[dateStr]||[];const hasData=f.length>0||allLong.length>0;return hasData?{done:[],missed:[],todo:[],future:f,long:allLong}:null;}
  // 과거: 로그 + 아직 전환 안 된 doneTasks(완료일이 해당 날짜인 것) 합산
  const log=state.log[dateStr];
  const unlogged=state.doneTasks.filter(t=>t.doneAt&&_tsToDateStr(t.doneAt)===dateStr);
  const logDone=(log&&log.done)||[];
  const logMissed=(log&&log.missed)||[];
  const unloggedMapped=unlogged.map(t=>({text:t.text,starred:t.starred})).filter(u=>!logDone.some(l=>l.text===u.text));
  const allDone=[...logDone,...unloggedMapped];
  if(allDone.length>0||logMissed.length>0||allLong.length>0)
    return{done:allDone,missed:logMissed,todo:[],long:allLong};
  return null;
}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear}년 ${calMonth+1}월`;
  document.getElementById('printTitle').textContent=`오늘하자제발 — ${calYear}년 ${calMonth+1}월`;
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayD=new Date();
  for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isToday=todayD.getFullYear()===calYear&&todayD.getMonth()===calMonth&&todayD.getDate()===d;
    const dow=new Date(calYear,calMonth,d).getDay();
    const data=getDayData(dateStr);
    let chips='';
    if(data){
      const all=[...(data.done||[]).map(t=>({...t,type:'done'})),...(data.missed||[]).map(t=>({...t,type:'missed'})),...(data.todo||[]).map(t=>({...t,type:'todo'})),...(data.future||[]).map(t=>({...t,type:'future'})),...(data.long||[]).map(t=>({...t,type:t.isDoneLong?'long-done':'long'}))];
      chips=all.slice(0,3).map(t=>`<span class="cal-chip ${t.type}">${t.starred?'⭐ ':''}${t.isLong?'📌 ':''}${escapeHtml(t.text)}</span>`).join('');
      if(all.length>3)chips+=`<div class="cal-more">+${all.length-3}개</div>`;
    }
    const cls=['cal-day',isToday?'today':'',dow===0?'sunday':'',dow===6?'saturday':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="openDayModal('${dateStr}')"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderGantt();
}

function openDayModal(dateStr){
  currentModalDate=dateStr;modalEditInfo=null;

  document.getElementById('dayModalTitle').textContent=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;
  document.getElementById('dayModalType').textContent=
    dateStr===today?'오늘 · 탭하여 수정':dateStr<today?'지난 날 기록 · 탭하여 수정':'예정 일정 · 탭하여 수정';
  document.getElementById('dayModalAdd').style.display=(dateStr>=today)?'flex':'none';
  document.getElementById('dayTaskInput').value='';
  renderDayModal();

  document.getElementById('dayModal').classList.add('active');
}
function closeDayModal(){

  document.getElementById('dayModal').classList.remove('active');
}
function getModalInputId(type,id,idx){
  if(type==='today')return`medit-t-${id}`;
  if(type==='today-done')return`medit-td-${id}`;
  if(type==='future')return`medit-f-${idx}`;
  if(type==='log-done')return`medit-ld-${idx}`;
  if(type==='log-missed')return`medit-lm-${idx}`;
  return null;
}
function renderDayModal(){
  const dateStr=currentModalDate;if(!dateStr)return;
  const today=todayStr();let html='';
  if(dateStr===today){
    const todos=[...state.tasks].sort((a,b)=>{if(a.starred&&!b.starred)return-1;if(!a.starred&&b.starred)return 1;return a.registeredAt-b.registeredAt;});
    const dones=[...state.doneTasks];
    if(todos.length===0&&dones.length===0){html='<div class="modal-empty">오늘의 할 일이 없어요<br>아래에서 추가해보세요 ✨</div>';}
