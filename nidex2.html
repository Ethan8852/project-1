<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘하자제발</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#CDB4DB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="오늘하자">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
  /* ══ 리셋 & 기본 ══ */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: linear-gradient(160deg, #F5F2FF 0%, #FEF2F7 45%, #F2F7FF 100%);
    background-attachment: fixed;
    min-height: 100vh;
    cursor: default;
  }

  /* ══ 헤더 — 글라스모피즘 ══ */
  header {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    position: sticky; top: 0; z-index: 20;
    border-bottom: 0.5px solid rgba(205, 180, 219, 0.25);
    user-select: none;
  }
  .header-left { display: flex; align-items: center; }

  .header-title { font-size: 13px; font-weight: 700; color: #1D1D1F; letter-spacing: -0.2px; white-space: nowrap; }
  .header-date  { font-size: 10px; color: #8E8E93; margin-top: 1px; font-weight: 400; white-space: nowrap; }

  /* ══ 중앙 로고 — 그라데이션 텍스트 ══ */
  .header-center { text-align: center; }
  .c-logo-wrap { display: inline-flex; align-items: baseline; gap: 0; line-height: 1; }
  .clo-em {
    font-size: 18px; font-weight: 800; line-height: 1; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #CDB4DB 0%, #FFAFCC 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .clo-nm { font-size: 10px; font-weight: 400; color: #AEAEB2; letter-spacing: 0; }
  .clo-dot { font-size: 10px; font-weight: 700; color: #BDE0FE; margin: 0 1px; align-self: center; }
  .c-logo-sub { font-size: 7px; letter-spacing: 2px; color: #C7C7CC; font-weight: 500; text-align: center; margin-top: 2px; }

  .header-right { display: flex; justify-content: flex-end; }
  #clockLabel { font-size: 11px; color: #6E6E73; font-weight: 500; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; user-select: none; white-space: nowrap; }

  /* ══ 탭 바 — 글라스 ══ */
  .tabs {
    display: flex;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border-bottom: 0.5px solid rgba(205, 180, 219, 0.20);
    position: sticky; top: 65px; z-index: 19;
    user-select: none;
  }
  .tab-btn {
    flex: 1; padding: 12px 4px; text-align: center;
    font-size: 14px; font-weight: 500; color: #AEAEB2;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.22s cubic-bezier(0.34, 1.0, 0.64, 1);
    background: none; border-top: none; border-left: none; border-right: none;
    letter-spacing: -0.1px;
  }
  .tab-btn.active { color: #CDB4DB; border-bottom-color: #CDB4DB; font-weight: 700; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ══ 섹션 레이블 ══ */
  .section-label {
    padding: 22px 22px 6px;
    font-size: 22px; font-weight: 800; color: #1D1D1F;
    letter-spacing: -0.5px; cursor: default; user-select: none;
  }
  .section-label .sub { font-size: 13px; font-weight: 400; color: #8E8E93; margin-left: 8px; letter-spacing: 0; }
  .task-list { padding: 0 16px; }

  /* ══ 할 일 카드 ══ */
  .task-item {
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 15px 14px 15px 16px; margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 12px;
    border: 0.5px solid rgba(205, 180, 219, 0.18);
    box-shadow: 0 2px 20px rgba(180, 140, 210, 0.07), 0 1px 3px rgba(0,0,0,0.04);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.25s ease, opacity 0.3s, filter 0.3s;
    position: relative; overflow: hidden; cursor: default;
  }
  .task-item:active { transform: scale(0.985); }
  .task-item:hover {
    box-shadow: 0 4px 28px rgba(180, 140, 210, 0.12), 0 1px 4px rgba(0,0,0,0.05);
    transform: translateY(-1px);
  }
  .task-item.starred {
    background: rgba(255, 200, 221, 0.10);
    border-color: rgba(255, 175, 204, 0.30);
  }
  .task-item.pending { opacity: 0.55; filter: blur(0.7px); animation: pending-pulse 0.7s ease-in-out infinite alternate; }
  @keyframes pending-pulse { from{opacity:.42}to{opacity:.62} }
  .task-item.completing { animation: fly-out 0.38s ease-in forwards; }
  @keyframes fly-out { 0%{transform:translateX(0) scale(1);opacity:1} 100%{transform:translateX(60px) scale(0.85);opacity:0} }

  .pending-bar {
    position: absolute; bottom: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #CDB4DB, #FFAFCC);
    border-radius: 0 0 20px 20px;
    animation: pending-progress 2s linear forwards;
  }
  @keyframes pending-progress { from{width:0%} to{width:100%} }

  /* ══ 체크 버튼 ══ */
  .check-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid #D8C8E8; background: #fff;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    margin-top: 1px; font-size: 13px; font-weight: 700;
  }
  .check-btn:hover { border-color: #CDB4DB; background: rgba(205,180,219,0.12); transform: scale(1.12); }
  .check-btn.pending-state { background: #FFAFCC; border-color: #FFAFCC; color: white; }

  .task-info { flex: 1; min-width: 0; cursor: default; }

  /* ══ 할 일 텍스트 ══ */
  .task-text {
    font-size: 15px; color: #1D1D1F; line-height: 1.5;
    word-break: break-all; cursor: text; letter-spacing: -0.1px;
  }
  .task-text:hover { color: #9B7BB4; }
  .task-text a { color: #A2D2FF; text-decoration: underline; cursor: pointer; }
  .task-edit-input {
    width: 100%; font-size: 15px; color: #1D1D1F; line-height: 1.5;
    border: none; outline: none; background: transparent;
    font-family: inherit; padding: 0; margin: 0;
    border-bottom: 2px solid #CDB4DB; caret-color: #CDB4DB; cursor: text;
    letter-spacing: -0.1px;
  }

  .task-time {
    font-size: 12px; color: #AEAEB2; margin-top: 5px;
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    cursor: default; user-select: none;
  }
  .task-time.overdue { color: #FF6B8A; font-weight: 600; }
  .repeat-badge {
    font-size: 11px; background: rgba(255,200,221,0.22); color: #CC7090;
    padding: 2px 8px; border-radius: 20px; cursor: default; user-select: none;
  }
  .pending-hint {
    font-size: 11px; color: #FFAFCC; font-weight: 600; margin-top: 3px;
    animation: blink 0.85s ease-in-out infinite; cursor: default; user-select: none;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.38} }

  /* ══ 아이콘 버튼 ══ */
  .icon-btn {
    background: none; border: none; cursor: pointer;
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px; line-height: 1; opacity: 0.22;
    transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .icon-btn:hover { background: rgba(0,0,0,0.04); opacity: 0.9; transform: scale(1.12); }
  .icon-btn.star.on { opacity: 1; }
  .icon-btn.urgent { color: #FF6B8A; font-size: 14px; }
  .icon-btn.urgent:hover { background: rgba(255,107,138,0.08); opacity: 1; }
  .icon-btn.trash { color: #FF6B8A; }
  .icon-btn.trash:hover { background: rgba(255,107,138,0.08); opacity: 1; }

  /* ══ 드래그 & 드롭 ══ */
  .task-item[draggable="true"] { cursor: grab; }
  .task-item[draggable="true"]:active { cursor: grabbing; }
  .task-item.is-dragging {
    opacity: 0.40; transform: scale(0.96) rotate(-0.7deg) !important;
    box-shadow: 0 20px 56px rgba(180,140,210,0.32) !important;
    background: rgba(255,255,255,0.98) !important; z-index: 50;
    filter: blur(0.5px);
  }
  .task-item.drag-over {
    border-color: rgba(205,180,219,0.60) !important;
    background: rgba(205,180,219,0.12) !important;
    transform: translateY(-4px) scale(1.012) !important;
    box-shadow: 0 10px 32px rgba(180,140,210,0.20) !important;
  }
  .task-item.drag-over::before {
    content:''; position:absolute; top:-2px; left:16px; right:16px; height:3px;
    background:linear-gradient(90deg,#CDB4DB,#FFAFCC); border-radius:2px; z-index:1;
  }

  /* ══ 완료 카드 ══ */
  .done-item {
    background: rgba(255,255,255,0.80);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 20px; padding: 14px 16px; margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 12px;
    border: 0.5px solid rgba(205, 180, 219, 0.14);
    box-shadow: 0 1px 10px rgba(180,140,210,0.05);
    cursor: default;
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, background 0.2s ease;
  }
  .done-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(180,140,210,0.13), 0 1px 4px rgba(0,0,0,0.05);
    background: rgba(255,255,255,0.94);
    border-color: rgba(205,180,219,0.28);
  }
  .done-icon {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #CDB4DB, #FFAFCC); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-size: 13px; font-weight: 700; color: #fff; position: relative;
  }
  .done-icon:hover { background: linear-gradient(135deg, #FFAFCC, #FF6B8A); transform: scale(1.1); }
  .done-icon:hover::after { content: '↩'; }
  .done-icon:not(:hover)::after { content: '✓'; }
  .done-text {
    font-size: 15px; color: #C7C7CC; text-decoration: line-through;
    line-height: 1.5; word-break: break-all; flex: 1; cursor: default;
    letter-spacing: -0.1px;
  }
  .done-meta { font-size: 12px; color: #D1D1D6; margin-top: 4px; cursor: default; user-select: none; }

  /* ══ 진행률 ══ */
  .progress {
    padding: 2px 22px 10px; font-size: 14px; color: #8E8E93;
    font-weight: 500; cursor: default; user-select: none;
  }
  .progress-bar {
    height: 5px; background: rgba(205,180,219,0.18);
    border-radius: 3px; margin: 0 22px 16px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #A2D2FF, #CDB4DB, #FFAFCC);
    border-radius: 3px; transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
  }

  /* ══ 입력 영역 — 글라스 ══ */
  .add-area {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255, 255, 255, 0.90);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    padding: 10px 12px env(safe-area-inset-bottom, 12px);
    border-top: 0.5px solid rgba(205, 180, 219, 0.22);
    z-index: 18; box-sizing: border-box;
  }
  .add-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .add-input {
    flex: 1; min-width: 0;
    border: 1.5px solid rgba(205,180,219,0.30); border-radius: 14px;
    padding: 10px 12px; font-size: 15px; outline: none;
    transition: all 0.22s ease;
    background: rgba(255,255,255,0.70);
    color: #1D1D1F; font-family: inherit; letter-spacing: -0.1px;
    cursor: text;
  }
  .add-input:focus { border-color: #CDB4DB; background: #fff; box-shadow: 0 0 0 3px rgba(205,180,219,0.15); }
  .add-input::placeholder { color: #C7C7CC; }
  .add-btn {
    background: linear-gradient(135deg, #CDB4DB 0%, #FFAFCC 100%);
    color: #fff; border: none; border-radius: 14px;
    padding: 10px 16px; font-size: 15px; font-weight: 700;
    cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0;
    transition: opacity 0.2s, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    letter-spacing: -0.1px;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.96); }
  .urgent-btn {
    background: rgba(255,107,138,0.10); border: 1.5px solid rgba(255,107,138,0.25);
    border-radius: 14px; padding: 10px 11px; font-size: 17px; cursor: pointer;
    flex-shrink: 0; line-height: 1;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .urgent-btn:hover { background: rgba(255,107,138,0.20); transform: scale(1.08); }
  .urgent-btn:active { transform: scale(0.94); }
  .hint { font-size: 10px; color: #C7C7CC; text-align: center; cursor: default; user-select: none; letter-spacing: 0; padding: 6px 0 8px; }
  .hint kbd {
    background: rgba(205,180,219,0.12); border: 0.5px solid rgba(205,180,219,0.30);
    border-radius: 5px; padding: 1px 5px; font-size: 9px; color: #AEAEB2; font-family: inherit;
  }

  /* ══ 토스트 — 글라스 ══ */
  .toast-wrap {
    position: fixed; top: 74px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 8px;
    width: calc(100% - 32px); max-width: 480px; pointer-events: none;
  }
  .toast {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 0.5px solid rgba(205,180,219,0.25);
    border-left: 3.5px solid #CDB4DB;
    border-radius: 14px; padding: 12px 16px; font-size: 13px; color: #3A3440;
    box-shadow: 0 8px 32px rgba(180,140,210,0.14);
    animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: auto;
    cursor: default; user-select: none; letter-spacing: -0.1px;
  }
  .toast.success { border-left-color: #A8D4BC; color: #2E6248; }
  .toast.edit { border-left-color: #FFAFCC; color: #8A3A68; }
  .toast strong { font-weight: 700; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-10px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

  /* ══ 컨페티 ══ */
  @keyframes confetti-fly {
    0%   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
    80%  { opacity:1; }
    100% { transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(0.4); opacity:0; }
  }
  .confetti-piece { position:fixed; pointer-events:none; z-index:9999; animation:confetti-fly var(--dur) ease-out forwards; }
  .complete-flash {
    position:fixed; inset:0;
    background:radial-gradient(circle at center, rgba(205,180,219,0.22), transparent 70%);
    pointer-events:none; z-index:9998; animation:flash-out 0.6s ease-out forwards;
  }
  @keyframes flash-out { from{opacity:1} to{opacity:0} }

  /* ══ 캘린더 ══ */
  .cal-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 22px 12px; user-select:none;
  }
  .cal-header-center { display:flex; align-items:center; gap:12px; }
  .cal-header span { font-size:22px; font-weight:800; color:#1D1D1F; cursor:default; letter-spacing:-0.5px; }
  .cal-nav {
    background: rgba(255,255,255,0.80); backdrop-filter:blur(10px);
    border: 0.5px solid rgba(205,180,219,0.28); border-radius:10px;
    padding:6px 14px; cursor:pointer; font-size:18px; color:#CDB4DB;
    transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .cal-nav:hover { background:#CDB4DB; color:#fff; border-color:#CDB4DB; transform:scale(1.05); }
  .pdf-btn {
    background: linear-gradient(135deg,#CDB4DB,#FFAFCC); color:#fff; border:none;
    border-radius:10px; padding:7px 16px; font-size:13px; font-weight:700;
    cursor:pointer; transition:opacity 0.2s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap; letter-spacing:-0.1px; font-family:inherit;
  }
  .pdf-btn:hover { opacity:0.88; }
  .pdf-btn:active { transform:scale(0.96); }

  .cal-grid {
    display:grid; grid-template-columns:repeat(7,1fr);
    margin:0 14px 20px; border-radius:20px; overflow:hidden;
    box-shadow: 0 2px 20px rgba(180,140,210,0.08), 0 0 0 0.5px rgba(205,180,219,0.22);
    background: rgba(255,255,255,0.70);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .cal-dow {
    text-align:center; font-size:12px; color:#AEAEB2; font-weight:600;
    padding:10px 0; background:rgba(255,255,255,0.60);
    border-bottom: 0.5px solid rgba(205,180,219,0.15);
    cursor:default; user-select:none; letter-spacing:0.2px;
  }
  .cal-day {
    min-height:84px; padding:6px 5px 5px;
    border-right: 0.5px solid rgba(205,180,219,0.12);
    border-bottom: 0.5px solid rgba(205,180,219,0.12);
    background: rgba(255,255,255,0.0); overflow:hidden;
    cursor:pointer; transition:background 0.18s ease;
  }
  .cal-day:nth-child(7n) { border-right:none; }
  .cal-day:not(.empty):hover { background:rgba(205,180,219,0.08); }
  .cal-day.empty { background:rgba(250,250,255,0.30); cursor:default; }
  .cal-day.today { background:rgba(205,180,219,0.08); }
  .cal-day-num {
    font-size:12px; font-weight:600; color:#6E6E73;
    margin-bottom:4px; line-height:1;
    cursor:default; user-select:none;
  }
  .cal-day.today .cal-day-num {
    background: linear-gradient(135deg,#CDB4DB,#FFAFCC);
    color:#fff; border-radius:50%; width:22px; height:22px;
    display:flex; align-items:center; justify-content:center; font-size:11px;
  }
  .cal-day.sunday .cal-day-num   { color:#FF6B8A; }
  .cal-day.saturday .cal-day-num { color:#A2D2FF; }
  .cal-chip {
    font-size:9px; padding:2px 5px; border-radius:5px; margin-bottom:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:100%; display:block; line-height:1.35;
    cursor:default; user-select:none; font-weight:500;
  }
  .cal-chip.done   { background:rgba(205,180,219,0.20); color:#9B7BB4; }
  .cal-chip.missed { background:rgba(255,175,204,0.20); color:#C06080; text-decoration:line-through; }
  .cal-chip.todo   { background:rgba(189,224,254,0.30); color:#5A90BE; }
  .cal-chip.future { background:rgba(255,200,221,0.22); color:#C07090; }
  .cal-more { font-size:9px; color:#C7C7CC; margin-top:2px; cursor:default; user-select:none; }

  .empty-state {
    text-align:center; padding:56px 24px; color:#C7C7CC;
    font-size:16px; line-height:2; cursor:default; user-select:none; font-weight:400;
  }
  .moved-notice {
    background:rgba(189,224,254,0.22); border-left:3px solid #A2D2FF;
    border-radius:14px; margin:8px 16px; padding:11px 16px;
    font-size:13px; color:#5A8AB0; cursor:default; user-select:none; letter-spacing:-0.1px;
  }

  /* ══ 날짜 모달 ══ */
  .modal-overlay {
    position:fixed; inset:0;
    background: rgba(100,70,150,0.14);
    backdrop-filter:blur(14px) saturate(120%);
    -webkit-backdrop-filter:blur(14px) saturate(120%);
    z-index:200; opacity:0; pointer-events:none;
    transition:opacity 0.28s ease;
  }
  .modal-overlay.active { opacity:1; pointer-events:all; }

  .day-modal {
    position:fixed; left:0; right:0; bottom:-100%;
    max-height:84vh;
    background: rgba(249,248,255,0.96);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border-radius:28px 28px 0 0;
    z-index:201;

    position: absolute; top: 4px; right: 4px;

    transition: background 0.3s;

  .tg-modal-overlay {
    position: fixed; inset: 0;

  }

  .tg-modal {

    transform: translate(-50%, -48%) scale(0.96);
    width: calc(100% - 40px); max-width: 360px;
    background: rgba(249,248,255,0.97);
    backdrop-filter: blur(30px) saturate(180%);
    -webkit-backdrop-filter: blur(30px) saturate(180%);

  }

  .tg-status.err { color: #FF6B8A; }
  .tg-actions { display: flex; gap: 10px; margin-top: 14px; }
  .tg-connect-btn {
    flex: 1; background: linear-gradient(135deg,#CDB4DB,#FFAFCC);
    color: #fff; border: none; border-radius: 14px;
    padding: 12px; font-size: 14px; font-weight: 700;

    transition: opacity 0.2s, transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tg-connect-btn:hover { opacity: 0.88; }
  .tg-connect-btn:active { transform: scale(0.96); }
  .tg-disconnect-btn {
    background: rgba(255,107,138,0.10); color: #FF6B8A;
    border: none; border-radius: 14px; padding: 12px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;

  }

  .tg-toggle-row {
    display: flex; align-items: center; justify-content: space-between;

  .long-section-label {

<script>
// ══ 텔레그램 ══
const TG_TOKEN = '8683843543:AAET9zUOMLKjTd9t99qtPYOPdDgY8VABk_M';
const TG_API   = `https://api.telegram.org/bot${TG_TOKEN}`;

function tgUpdateDot(){
  const dot=document.getElementById('tgDot');
  if(dot)dot.className='tg-dot'+(state.tgChatId?' on':'');
}
function tgUpdateToggle(){
  const t=document.getElementById('tgToggle');
  if(t)t.className='tg-toggle'+(state.tgNotif?' on':'');
}
function openTgModal(){
  const hasConn=!!state.tgChatId;
  document.getElementById('tgStatus').textContent=hasConn?`✅ 연결됨 (ID: ${state.tgChatId})`:'';
  document.getElementById('tgStatus').className='tg-status'+(hasConn?' ok':'');
  document.getElementById('tgActions').innerHTML=hasConn
    ?`<button class="tg-connect-btn" onclick="tgConnect()">재연결</button><button class="tg-disconnect-btn" onclick="tgDisconnect()">연결 해제</button>`
    :`<button class="tg-connect-btn" onclick="tgConnect()">연결하기</button>`;
  document.getElementById('tgToggleRow').style.display=hasConn?'flex':'none';
  tgUpdateToggle();
  document.getElementById('tgOverlay').classList.add('active');
  document.getElementById('tgModal').classList.add('active');
}
function closeTgModal(){
  document.getElementById('tgOverlay').classList.remove('active');
  document.getElementById('tgModal').classList.remove('active');
}
async function tgConnect(){
  const statusEl=document.getElementById('tgStatus');
  statusEl.className='tg-status'; statusEl.textContent='⏳ 연결 중...';
  // 폴링이 메시지를 소비하지 못하도록 일시 중단
  stopTgPolling();
  try{
    // 1. 유효한(확인되지 않은) 업데이트 확인
    let r=await fetch(`${TG_API}/getUpdates?limit=50&allowed_updates=%5B%22message%22%5D`);
    let j=await r.json();
    
    // 2. 비어있다면 강제로 최신 메시지 1개 확인 (offset=-1)
    if(j.ok && j.result.length === 0){
      r=await fetch(`${TG_API}/getUpdates?offset=-1&limit=1&allowed_updates=%5B%22message%22%5D`);
      j=await r.json();
    }

    if(j.ok&&j.result.length>0){
      const msgs=j.result.filter(u=>u.message&&u.message.chat);
      if(msgs.length>0){
        const last=msgs[msgs.length-1];
        const chatId=last.message.chat.id;
        state.tgChatId=chatId; state.tgNotif=true; state.tgOffset=last.update_id||0; saveState();
        statusEl.className='tg-status ok'; statusEl.textContent=`✅ 연결 완료! (ID: ${chatId})`;
        document.getElementById('tgActions').innerHTML=
          `<button class="tg-connect-btn" onclick="tgConnect()">재연결</button><button class="tg-disconnect-btn" onclick="tgDisconnect()">연결 해제</button>`;
        document.getElementById('tgToggleRow').style.display='flex';
        tgUpdateToggle(); tgUpdateDot(); startTgPolling(); loadSync();
        tgSend('✅ <b>오늘하자제발</b> 연결 완료!\n\n할 일 완료 시 알림 + /help 로 원격 조작 가능해요 🎉');
        return;
      }
    }
    // 새 메시지 없지만 기존 chatId가 살아있는지 확인
    if(state.tgChatId){
      const cr=await fetch(`${TG_API}/getChat`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:state.tgChatId})});
      const cj=await cr.json();
      if(cj.ok){
        statusEl.className='tg-status ok'; statusEl.textContent=`✅ 연결 유지됨 (ID: ${state.tgChatId})`;
        document.getElementById('tgActions').innerHTML=
          `<button class="tg-connect-btn" onclick="tgConnect()">재연결</button><button class="tg-disconnect-btn" onclick="tgDisconnect()">연결 해제</button>`;
        document.getElementById('tgToggleRow').style.display='flex';
        tgUpdateToggle(); tgUpdateDot(); startTgPolling();
        return;
      }
    }
    statusEl.className='tg-status err'; statusEl.textContent='❌ 메시지를 찾지 못했어요. 봇에게 /start 를 먼저 보내주세요.';
  }catch(e){
    statusEl.className='tg-status err'; statusEl.textContent='❌ 연결 실패. 인터넷을 확인해주세요.';
  }finally{
    // 연결 실패해도 기존 chatId 있으면 폴링 재시작
    if(state.tgChatId&&!tgPolling)startTgPolling();
  }
}
function tgDisconnect(){
  state.tgChatId=null; state.tgNotif=false; state.tgOffset=0; saveState(); tgUpdateDot(); stopTgPolling();
  document.getElementById('tgStatus').className='tg-status'; document.getElementById('tgStatus').textContent='연결이 해제됐어요.';
  document.getElementById('tgActions').innerHTML=`<button class="tg-connect-btn" onclick="tgConnect()">연결하기</button>`;
  document.getElementById('tgToggleRow').style.display='none';
}
function tgToggleNotif(){
  state.tgNotif=!state.tgNotif; saveState(); tgUpdateToggle();
}
async function tgSend(text){
  if(!state.tgChatId)return;
  try{
    await fetch(`${TG_API}/sendMessage`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:state.tgChatId,text,parse_mode:'HTML'})
    });
  }catch(e){}
}

// ══ 긴급 알림 ══
async function sendUrgentAlert(){
  if(!state.tgChatId){showToast('텔레그램 연결 후 사용 가능해요 📨');return;}
  const sorted=tgSortedTasks();
  if(sorted.length===0&&state.doneTasks.length===0){
    await tgSend('🎉 오늘 할 일이 없어요!');
    showToast('텔레그램으로 알림을 보냈어요','success');return;
  }
  const overdues=sorted.filter(t=>isOverdue(t.registeredAt));
  const pending=sorted.filter(t=>!isOverdue(t.registeredAt));
  const done=state.doneTasks.length,total=sorted.length+done;
  const rate=total>0?Math.round(done/total*100):0;
  const bar='▓'.repeat(Math.round(rate/10))+'░'.repeat(10-Math.round(rate/10));

  let msg='🚨 <b>긴급 알림!</b>\n';
  msg+=`${bar} ${rate}%  (${done}/${total})\n`;
  if(overdues.length>0){
    msg+=`\n⏰ <b>기한 초과 (${overdues.length}개)</b>\n`;
    msg+=overdues.map((t,i)=>`${i+1}. ${t.starred?'⭐ ':''}${escapeHtml(t.text)}`).join('\n');
  }
  if(pending.length>0){
    msg+=`\n\n📝 <b>남은 할 일 (${pending.length}개)</b>\n`;
    msg+=pending.map((t,i)=>`${overdues.length+i+1}. ${t.starred?'⭐ ':''}${escapeHtml(t.text)}`).join('\n');
  }
  if(state.doneTasks.length>0){
    msg+=`\n\n✅ <b>완료 (${state.doneTasks.length}개)</b>\n`;
    msg+=state.doneTasks.slice(-3).map(t=>`• ${escapeHtml(t.text)}`).join('\n');
    if(state.doneTasks.length>3)msg+=`\n… 외 ${state.doneTasks.length-3}개`;
  }
  msg+='\n\n/list /done [번호] /add [내용]';
  await tgSend(msg);
  showToast('🚨 긴급 알림을 보냈어요!','success');
}

// ══ 실시간 동기화 (Telegram 핀 메시지) ══
const SYNC_HDR='🔄 동기화';
let _syncTimer=null;

function debouncedSync(){
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(doSync,2000);
}

function buildSyncB64(){
  const futKeys=Object.keys(state.futureTasks||{}).filter(k=>k>=todayStr()).slice(0,14);
  const ft={};futKeys.forEach(k=>ft[k]=state.futureTasks[k]);
  const p={tasks:state.tasks,doneTasks:state.doneTasks,nextId:state.nextId,
    lastDate:state.lastDate,movedCount:state.movedCount,futureTasks:ft,fcmToken:state.fcmToken,
    tgOffset:state.tgOffset||0,savedAt:Date.now()};
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(p))));}catch(e){return null;}
}

async function doSync(){
  if(!state.tgChatId)return;
  const b64=buildSyncB64();
  if(!b64||b64.length>3900)return;
  const msgText=`${SYNC_HDR}\n<tg-spoiler>${b64}</tg-spoiler>`;
  try{
    if(state.syncMsgId){
      const r=await fetch(`${TG_API}/editMessageText`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:state.tgChatId,message_id:state.syncMsgId,text:msgText,parse_mode:'HTML'})});
      const j=await r.json();
      if(!j.ok&&j.error_code!==400){state.syncMsgId=null;await newSyncMsg(msgText);}
    }else{await newSyncMsg(msgText);}
  }catch(e){}
}

async function newSyncMsg(msgText){
  try{
    const r=await fetch(`${TG_API}/sendMessage`,{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:state.tgChatId,text:msgText,parse_mode:'HTML',disable_notification:true})});
    const j=await r.json();
    if(j.ok){
      state.syncMsgId=j.result.message_id;
      localStorage.setItem('ijma_v3',JSON.stringify(state));
      fetch(`${TG_API}/pinChatMessage`,{method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:state.tgChatId,message_id:state.syncMsgId,disable_notification:true})});
    }
  }catch(e){}
}

async function loadSync(){
  if(!state.tgChatId||editingId)return false;
  try{
    const r=await fetch(`${TG_API}/getChat`,{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:state.tgChatId})});
    const j=await r.json();
    if(!j.ok)return false;
    const pin=j.result?.pinned_message;
    const nl=pin?.text?.indexOf('\n')??-1;
    if(nl<0||pin.text.slice(0,nl)!==SYNC_HDR){
      if(state.tasks.length>0||state.doneTasks.length>0)debouncedSync();
      return false;
    }
    if(state.syncMsgId!==pin.message_id)state.syncMsgId=pin.message_id;
    let b64=pin.text.slice(nl+1);
    // HTML 태그 제거 (특히 <tg-spoiler>)
    b64 = b64.replace(/<[^>]*>/g, '').trim();
    const remote=JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!remote?.savedAt)return false;
    if(remote.savedAt>(state.savedAt||0)){
      const keep={tgChatId:state.tgChatId,tgNotif:state.tgNotif,
                  tgOffset:Math.max(state.tgOffset||0,remote.tgOffset||0),
                  syncMsgId:pin.message_id,savedAt:remote.savedAt,
                  nextId:Math.max(state.nextId||1,remote.nextId||1),
                  fcmToken:state.fcmToken||remote.fcmToken||null};
      Object.assign(state,remote,keep);
      localStorage.setItem('ijma_v3',JSON.stringify(state));
      render();
      return true;
    }
  }catch(e){}
  return false;
}

// ══ 양방향 폴링 ══
let tgPolling=null;
let tgPollRunning=false;
const processedUpdateIds=new Set();

function startTgPolling(){
  if(tgPolling)return;
  tgPoll();
  tgPolling=setInterval(tgPoll,10000);
}
function stopTgPolling(){
  if(tgPolling){clearInterval(tgPolling);tgPolling=null;}
  tgPollRunning=false;
}

async function tgPoll(){
  if(!state.tgChatId||tgPollRunning)return;
  tgPollRunning=true;
  try{
    await loadSync(); // 다른 기기가 처리한 tgOffset을 먼저 반영
    const offset=(state.tgOffset||0)+1;
    const r=await fetch(`${TG_API}/getUpdates?offset=${offset}&limit=20&timeout=0&allowed_updates=%5B%22message%22%5D`);
    const j=await r.json();
    if(!j.ok||!j.result.length)return;
    let processed=false;
    for(const upd of j.result){
      if(upd.update_id>(state.tgOffset||0)&&!processedUpdateIds.has(upd.update_id)){
        processedUpdateIds.add(upd.update_id);
        state.tgOffset=upd.update_id;
        if(upd.message&&String(upd.message.chat.id)===String(state.tgChatId)){
          await handleTgMessage(upd.message);
          processed=true;
        }
      }
    }
    saveState();
    if(processed)await doSync(); // 처리 즉시 동기화해서 다른 기기가 중복 실행 못 하도록
  }catch(e){}finally{
    tgPollRunning=false;
  }
}

function tgSortedTasks(){
  return[...state.tasks].sort((a,b)=>{
    if(a.starred&&!b.starred)return-1;if(!a.starred&&b.starred)return 1;
    return a.registeredAt-b.registeredAt;
  });
}

async function handleTgMessage(msg){
  const text=(msg.text||'').trim();
  if(!text||text.startsWith('🔧SYNCID:'))return;

  if(text==='/start'||text==='/help'){
    await tgSend(
      '🤖 <b>오늘하자제발 봇</b>\n\n'+
      '📋 /list — 오늘 할 일 목록\n'+
      '➕ /add [내용] — 할 일 추가\n'+
      '✅ /done [번호] — 완료 처리\n'+
      '⭐ /star [번호] — 중요 토글\n'+
      '📊 /status — 오늘 진행률\n'+
      '🗑 /delete [번호] — 삭제\n\n'+
      '앱이 열려있을 때 명령이 처리돼요!'
    );
  } else if(text==='/list'){
    const sorted=tgSortedTasks();
    if(sorted.length===0){await tgSend('🎉 할 일이 없어요!');return;}
    const lines=sorted.map((t,i)=>`${i+1}. ${t.starred?'⭐ ':''}${escapeHtml(t.text)}`).join('\n');
    await tgSend(`📝 <b>오늘 할 일 (${sorted.length}개)</b>\n\n${lines}\n\n/done [번호] 완료  /star [번호] 중요`);
  } else if(text.startsWith('/add ')){
    const taskText=text.slice(5).trim();
    if(!taskText){await tgSend('❌ 내용을 입력해주세요. 예) /add 운동하기');return;}
    const task={id:state.nextId++,text:taskText,registeredAt:Date.now(),done:false,starred:false};
    state.tasks.push(task);scheduleAlarm(task);saveState();render();
    await tgSend(`➕ 추가됐어요!\n<b>${escapeHtml(taskText)}</b>`);
  } else if(text.startsWith('/done ')){
    const num=parseInt(text.slice(6))-1;
    const sorted=tgSortedTasks();
    if(isNaN(num)||num<0||num>=sorted.length){await tgSend(`❌ 번호를 확인해주세요.\n/list 로 목록을 확인하세요.`);return;}
    const task=sorted[num];
    const el=document.getElementById(`task-${task.id}`);
    if(el){el.classList.add('completing');}
    setTimeout(()=>{_doComplete(task.id);celebrate(task.text);},el?350:0);
  } else if(text.startsWith('/star ')){
    const num=parseInt(text.slice(6))-1;
    const sorted=tgSortedTasks();
    if(isNaN(num)||num<0||num>=sorted.length){await tgSend('❌ 번호를 확인해주세요.');return;}
    const task=sorted[num];
    task.starred=!task.starred;saveState();render();
    await tgSend(`${task.starred?'⭐ 중요 표시':'☆ 중요 해제'}: <b>${escapeHtml(task.text)}</b>`);
  } else if(text.startsWith('/delete ')){
    const num=parseInt(text.slice(8))-1;
    const sorted=tgSortedTasks();
    if(isNaN(num)||num<0||num>=sorted.length){await tgSend('❌ 번호를 확인해주세요.');return;}
    const task=sorted[num];
    deleteTask(task.id);
    await tgSend(`🗑 삭제됐어요: <b>${escapeHtml(task.text)}</b>`);
  } else if(text==='/status'){
    const done=state.doneTasks.length,total=state.tasks.length+done;
    const rate=total>0?Math.round(done/total*100):0;
    const bar='▓'.repeat(Math.round(rate/10))+'░'.repeat(10-Math.round(rate/10));
    await tgSend(`📊 <b>오늘 진행률</b>\n\n${bar} ${rate}%\n\n✅ 완료: ${done}개\n📝 남은 일: ${state.tasks.length}개`);
  } else {
    await tgSend('❓ 모르는 명령어예요.\n/help 로 명령어를 확인해보세요!');
  }
}

function todayStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function isQuietHours(){const h=new Date().getHours();return h>=22||h<9;}
function formatTime(ts){const d=new Date(ts);return`${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function formatAMPM(d){
  let h=d.getHours();const m=pad(d.getMinutes()),s=pad(d.getSeconds());
  const ap=h>=12?'PM':'AM';h=h%12||12;return`${ap} ${h}:${m}:${s}`;
}
function isOverdue(ts){return Date.now()>ts;}
function linkify(text){
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
}
function escapeHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let state={tasks:[],doneTasks:[],log:{},futureTasks:{},lastDate:null,nextId:1,movedCount:0,tgChatId:null,tgNotif:true,fcmToken:null,recurringTasks:[],recurringLastDate:null,longTasks:[],doneLongTasks:[]};
let alarmTimers={};

function loadState(){
  try{const s=localStorage.getItem('ijma_v3');if(s){const p=JSON.parse(s);state={...state,...p};
    if(!state.futureTasks)state.futureTasks={};
    if(!state.recurringTasks)state.recurringTasks=[];
    if(!state.longTasks)state.longTasks=[];
    if(!state.doneLongTasks)state.doneLongTasks=[];
  }}catch(e){}
}
function saveState(){
  state.savedAt=Date.now();
  try{localStorage.setItem('ijma_v3',JSON.stringify(state));}catch(e){}
  debouncedSync();

// ══ 날짜 전환 ══
function checkDayTransition(){
  const today=todayStr();
  if(state.lastDate&&state.lastDate!==today){
    const missed=state.tasks.filter(t=>!t.done);
    if(state.doneTasks.length>0){
      state.log[state.lastDate]={
        done:state.doneTasks.map(t=>({text:t.text,starred:t.starred})),
        missed:[]
      };
    }
    const now=Date.now();
    state.tasks=missed.map(t=>({...t,registeredAt:now,done:false}));
    state.doneTasks=[];state.movedCount=missed.length;
    if(state.futureTasks[today]&&state.futureTasks[today].length>0){
      state.tasks=[...state.tasks,...state.futureTasks[today].map(t=>({...t,registeredAt:now,done:false}))];
      delete state.futureTasks[today];
    }
  }else if(!state.lastDate){
    state.movedCount=0;if(!state.futureTasks)state.futureTasks={};
    const t2=todayStr();
    if(state.futureTasks[t2]&&state.futureTasks[t2].length>0){
      const now=Date.now();
      state.tasks=[...state.tasks,...state.futureTasks[t2].map(t=>({...t,registeredAt:now,done:false}))];
      delete state.futureTasks[t2];
    }
  }
  state.lastDate=today;saveState();
}

function scheduleAlarm(task){
  clearInterval(alarmTimers[task.id]);
  alarmTimers[task.id]=setInterval(()=>{
    const t=state.tasks.find(t=>t.id===task.id);
    if(!t||t.done){clearInterval(alarmTimers[task.id]);return;}
    if(isOverdue(t.registeredAt)&&!isQuietHours()){
      showToast(`<strong>🔔 재알림</strong> — "${escapeHtml(t.text)}" 아직 완료 안 하셨어요.`);
    }
  },60*60*1000);
}

// ══ 드래그 & 드롭 ══
let dragSrcId=null;
function _getSortedTasks(){
  return[...state.tasks].sort((a,b)=>{
    if(a.starred&&!b.starred)return-1;if(!a.starred&&b.starred)return 1;
    const oa=a.sortOrder!==undefined?a.sortOrder:a.registeredAt;
    const ob=b.sortOrder!==undefined?b.sortOrder:b.registeredAt;
    return oa-ob;
  });
}
function onTaskDragStart(e,id){
  if(e.target.closest('button,input,a')){e.preventDefault();return;}
  dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(id));
  setTimeout(()=>{
    const el=document.getElementById(`task-${id}`);
    if(el)el.classList.add('is-dragging');
  },0);
}
function onTaskDragOver(e,id){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  if(dragSrcId===id)return;
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('drag-over'));
  const el=document.getElementById(`task-${id}`);
  if(el)el.classList.add('drag-over');
}
function onTaskDragLeave(e,id){
  const el=document.getElementById(`task-${id}`);
  if(el)el.classList.remove('drag-over');
}
function onTaskDragEnd(e,id){
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('is-dragging','drag-over'));
  dragSrcId=null;
}
function onTaskDrop(e,targetId){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('drag-over','is-dragging'));
  if(!dragSrcId||dragSrcId===targetId){dragSrcId=null;return;}
  const sorted=_getSortedTasks();
  const srcIdx=sorted.findIndex(t=>t.id===dragSrcId);
  const tgtIdx=sorted.findIndex(t=>t.id===targetId);
  if(srcIdx===-1||tgtIdx===-1){dragSrcId=null;return;}
  const src=sorted[srcIdx];const tgt=sorted[tgtIdx];
  if(src.starred!==tgt.starred){dragSrcId=null;return;}
  sorted.splice(srcIdx,1);sorted.splice(tgtIdx,0,src);
  sorted.forEach((t,i)=>{t.sortOrder=i;});
  dragSrcId=null;saveState();render();
}

// ══ 클릭 / 더블클릭 분기 ══
const _clickTimers={};
function handleTaskClick(e,id){
  if(pendingComplete[id])return;
  if(_clickTimers[id]){
    clearTimeout(_clickTimers[id]);delete _clickTimers[id];
    toggleTaskRecurring(id);return;
  }
  _clickTimers[id]=setTimeout(()=>{delete _clickTimers[id];startEdit(id);},240);
}
function toggleTaskRecurring(id){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;
  if(t.isRecurring){
    t.isRecurring=false;
    state.recurringTasks=(state.recurringTasks||[]).filter(rt=>rt.text!==t.text);
    saveState();render();
    showToast(`🔁 "<strong>${escapeHtml(t.text)}</strong>" 매일반복 해제됐어요`);
  }else{
    t.isRecurring=true;
    if(!state.recurringTasks)state.recurringTasks=[];
    if(!state.recurringTasks.some(rt=>rt.text===t.text))
      state.recurringTasks.push({id:state.nextId++,text:t.text,starred:t.starred||false});
    saveState();render();
    showToast(`🔁 "<strong>${escapeHtml(t.text)}</strong>" 매일반복 설정됐어요`,'success');
  }
}

// ══ 인라인 수정 ══
function startEdit(id){if(pendingComplete[id])return;editingId=id;render();}
function handleEditKey(e,id){
  if(e.key==='Enter'){
    e.preventDefault();

// ══ 1초 퍼징 완료 ══
function startComplete(id){
  if(editingId===id)return;
  if(pendingComplete[id]){clearTimeout(pendingComplete[id].timerId);delete pendingComplete[id];render();return;}
  const timerId=setTimeout(()=>{delete pendingComplete[id];completeTask(id);},1000);
  pendingComplete[id]={timerId};render();
}
function completeTask(id){
  const idx=state.tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const taskText=state.tasks[idx].text;
  const el=document.getElementById(`task-${id}`);
  if(el){el.classList.add('completing');setTimeout(()=>{_doComplete(id);celebrate(taskText);},350);}
  else{_doComplete(id);celebrate(taskText);}
}
function _doComplete(id){
  const idx=state.tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const t={...state.tasks[idx],doneAt:Date.now(),done:true};
  clearInterval(alarmTimers[id]);state.doneTasks.push(t);state.tasks.splice(idx,1);
  saveState();render();
}
function undoComplete(id){
  const idx=state.doneTasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const t={...state.doneTasks[idx],done:false};delete t.doneAt;
  state.doneTasks.splice(idx,1);state.tasks.push(t);
  scheduleAlarm(t);saveState();renderDone();render();
}

// ══ 삭제 / 별표 ══
function deleteTask(id){
  if(pendingComplete[id]){clearTimeout(pendingComplete[id].timerId);delete pendingComplete[id];}
  if(editingId===id)editingId=null;clearInterval(alarmTimers[id]);
  state.tasks=state.tasks.filter(t=>t.id!==id);saveState();render();
}
function toggleStar(id){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;
  t.starred=!t.starred;saveState();render();
}

// ══ 할일 긴급 알림 ══
async function sendTaskUrgent(id){
  const t=state.tasks.find(t=>t.id===id);if(!t)return;
  if(!state.tgChatId){showToast('텔레그램 연결 후 사용 가능해요 📨');return;}
  const overdue=isOverdue(t.registeredAt);
  await tgSend(`🚨 <b>긴급!</b>${t.starred?' ⭐':''}\n\n"${escapeHtml(t.text)}"\n\n지금 당장 해주세요!!${overdue?'\n⏰ 이미 기한이 지났어요!':''}`);
  showToast(`🚨 "${escapeHtml(t.text)}" 긴급 알림 전송!`,'success');
}

// ══ 추가 ══
function addTask(starred){
  const input=document.getElementById('taskInput');
  const text=input.value.trim();if(!text){input.focus();return;}
  const task={id:state.nextId++,text,registeredAt:Date.now(),done:false,starred:!!starred};

});

// ══ 캘린더 ══
function initCal(){if(calYear===undefined){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}}
function moveCal(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();
}
function getDayData(dateStr){
  const today=todayStr();
  if(dateStr===today)return{done:state.doneTasks.map(t=>({text:t.text,starred:t.starred})),missed:[],todo:state.tasks.map(t=>({text:t.text,starred:t.starred}))};
  if(dateStr>today){const f=state.futureTasks[dateStr]||[];return f.length>0?{done:[],missed:[],todo:[],future:f}:null;}
  const log=state.log[dateStr];if(log)return{done:log.done||[],missed:log.missed||[],todo:[]};
  return null;
}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calYear}년 ${calMonth+1}월`;
  document.getElementById('printTitle').textContent=`오늘하자제발 — ${calYear}년 ${calMonth+1}월`;
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayD=new Date();
  for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isToday=todayD.getFullYear()===calYear&&todayD.getMonth()===calMonth&&todayD.getDate()===d;
    const dow=new Date(calYear,calMonth,d).getDay();
    const data=getDayData(dateStr);
    let chips='';
    if(data){
      const all=[...(data.done||[]).map(t=>({...t,type:'done'})),...(data.missed||[]).map(t=>({...t,type:'missed'})),...(data.todo||[]).map(t=>({...t,type:'todo'})),...(data.future||[]).map(t=>({...t,type:'future'}))];
      chips=all.slice(0,3).map(t=>`<span class="cal-chip ${t.type}">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`).join('');
      if(all.length>3)chips+=`<div class="cal-more">+${all.length-3}개</div>`;
    }
    const cls=['cal-day',isToday?'today':'',dow===0?'sunday':'',dow===6?'saturday':''].filter(Boolean).join(' ');
    html+=`<div class="${cls}" onclick="openDayModal('${dateStr}')"><div class="cal-day-num">${d}</div>${chips}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderGantt();
}

function getModalInputId(type,id,idx){
  if(type==='today')return`medit-t-${id}`;
  if(type==='today-done')return`medit-td-${id}`;
  if(type==='future')return`medit-f-${idx}`;
  if(type==='log-done')return`medit-ld-${idx}`;
  if(type==='log-missed')return`medit-lm-${idx}`;

}

  const dateStr=currentModalDate;if(!dateStr)return;

  if(dateStr===today){

    const dones=[...state.doneTasks];
    if(todos.length===0&&dones.length===0){html='<div class="modal-empty">오늘의 할 일이 없어요<br>아래에서 추가해보세요 ✨</div>';}
    else{

        html+=dones.map(t=>{
          const isEd=modalEditInfo&&modalEditInfo.type==='today-done'&&modalEditInfo.id===t.id;
          const el=isEd

          return`<div class="modal-task-row"><span class="modal-task-dot done"></span>${el}</div>`;

    else{
      if(log.done&&log.done.length>0){
        html+='<div class="modal-section-title">✅ 완료한 일 <span class="edit-hint">· 탭하여 수정</span></div>';
        html+=log.done.map((t,i)=>{
          const isEd=modalEditInfo&&modalEditInfo.type==='log-done'&&modalEditInfo.idx===i;
          const el=isEd
            ?`<input class="modal-edit-input" id="medit-ld-${i}" value="${escapeHtml(t.text)}"
                onkeydown="handleModalEditKey(event,'log-done',-1,${i})" onblur="cancelModalEdit()" onclick="event.stopPropagation()">`
            :`<span class="modal-task-text done-style" onclick="startModalEdit('log-done',-1,${i})">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row"><span class="modal-task-dot done"></span>${el}</div>`;

      if(log.missed&&log.missed.length>0){

        html+=log.missed.map((t,i)=>{

          const el=isEd

                onkeydown="handleModalEditKey(event,'log-missed',-1,${i})" onblur="cancelModalEdit()" onclick="event.stopPropagation()">`
            :`<span class="modal-task-text missed-style" onclick="startModalEdit('log-missed',-1,${i})">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</span>`;
          return`<div class="modal-task-row"><span class="modal-task-dot missed"></span>${el}</div>`;
        }).join('');

function startModalEdit(type,id,idx){modalEditInfo={type,id,idx,date:currentModalDate};renderDayModal();}
function cancelModalEdit(){modalEditInfo=null;renderDayModal();}

function handleModalEditKey(e,type,id,idx){
  if(e.key==='Enter'){
    e.preventDefault();
    const inputId=getModalInputId(type,id,idx);
    const inp=inputId?document.getElementById(inputId):null;if(!inp)return;
    const newText=inp.value.trim();if(!newText)return;
    const dateStr=currentModalDate;let changed=false;
    if(type==='today'){const t=state.tasks.find(t=>t.id===id);if(t&&t.text!==newText){t.text=newText;changed=true;saveState();render();}}
    else if(type==='today-done'){const t=state.doneTasks.find(t=>t.id===id);if(t&&t.text!==newText){t.text=newText;changed=true;saveState();renderDone();}}
    else if(type==='future'){if(state.futureTasks[dateStr]&&state.futureTasks[dateStr][idx]&&state.futureTasks[dateStr][idx].text!==newText){state.futureTasks[dateStr][idx].text=newText;changed=true;saveState();}}
    else if(type==='log-done'){if(state.log[dateStr]&&state.log[dateStr].done&&state.log[dateStr].done[idx]&&state.log[dateStr].done[idx].text!==newText){state.log[dateStr].done[idx].text=newText;changed=true;saveState();}}
    else if(type==='log-missed'){if(state.log[dateStr]&&state.log[dateStr].missed&&state.log[dateStr].missed[idx]&&state.log[dateStr].missed[idx].text!==newText){state.log[dateStr].missed[idx].text=newText;changed=true;saveState();}}
    modalEditInfo=null;renderDayModal();renderCal();
    if(changed)showToast(`<strong>✏️ 수정 완료!</strong> "${escapeHtml(newText)}"`, 'edit');
  }
  if(e.key==='Escape'){e.preventDefault();cancelModalEdit();}
}

function deleteModalTask(id){
  if(pendingComplete[id]){clearTimeout(pendingComplete[id].timerId);delete pendingComplete[id];}
  clearInterval(alarmTimers[id]);state.tasks=state.tasks.filter(t=>t.id!==id);
  saveState();render();renderDayModal();renderCal();
}
function deleteFutureTask(dateStr,idx){
  if(!state.futureTasks[dateStr])return;
  state.futureTasks[dateStr].splice(idx,1);
  if(state.futureTasks[dateStr].length===0)delete state.futureTasks[dateStr];
  saveState();renderDayModal();renderCal();
}
function addDayTask(){
  const input=document.getElementById('dayTaskInput');
  const text=input.value.trim();if(!text)return;
  const today=todayStr();
  if(currentModalDate===today){
    const task={id:state.nextId++,text,registeredAt:Date.now(),done:false,starred:false};
    state.tasks.push(task);scheduleAlarm(task);saveState();render();
    if(state.tgNotif&&state.tgChatId)tgSend(`➕ <b>할 일 추가됨</b>\n"${escapeHtml(text)}"`);
  }else if(currentModalDate>today){
    if(!state.futureTasks[currentModalDate])state.futureTasks[currentModalDate]=[];
    state.futureTasks[currentModalDate].push({id:state.nextId++,text,starred:false});saveState();
  }
  input.value='';renderDayModal();renderCal();
}

// ══ PDF ══
function printCal(){
  const win=window.open('','_blank','width=1100,height=800');
  if(!win){alert('팝업이 차단되었어요.');return;}
  const dows=['일','월','화','수','목','금','토'];
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayD=new Date();
  const mNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let cells='';
  cells+=dows.map((d,i)=>`<div class="dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++)cells+=`<div class="day empty"></div>`;
  let tDone=0,tMissed=0,tTodo=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isT=todayD.getFullYear()===calYear&&todayD.getMonth()===calMonth&&todayD.getDate()===d;
    const dow=new Date(calYear,calMonth,d).getDay();
    const data=getDayData(ds);let chips='';
    if(data){
      (data.done||[]).forEach(t=>{tDone++;chips+=`<div class="chip done">${t.starred?'★ ':''}${escapeHtml(t.text)}</div>`;});
      (data.missed||[]).forEach(t=>{tMissed++;chips+=`<div class="chip missed">${t.starred?'★ ':''}${escapeHtml(t.text)}</div>`;});
      (data.todo||[]).forEach(t=>{tTodo++;chips+=`<div class="chip todo">${t.starred?'★ ':''}${escapeHtml(t.text)}</div>`;});
    }
    const cls=['day',isT?'today':'',dow===0?'sun':dow===6?'sat':''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}"><div class="dn${isT?' tc':''}">${d}</div>${chips}</div>`;
  }
  const rate=tDone+tMissed>0?Math.round(tDone/(tDone+tMissed)*100):0;
  // 간트 데이터
  const mOriginP=new Date(`${calYear}-${pad(calMonth+1)}-01T00:00:00`);
  const allLongP=[...(state.longTasks||[]),...(state.doneLongTasks||[])];
  const monthStartP=`${calYear}-${pad(calMonth+1)}-01`;
  const monthEndP=`${calYear}-${pad(calMonth+1)}-${pad(daysInMonth)}`;
  const visibleP=allLongP.filter(t=>{const s=t.startDate||t.endDate;if(!s)return false;const e=t.endDate||todayStr();return s<=monthEndP&&e>=monthStartP;});
  let ganttHtml='';
  if(visibleP.length>0){
    const ganttRows=visibleP.map(t=>{
      const sDate=new Date((t.startDate||todayStr())+'T12:00:00');
      const eDate=new Date((t.endDate||todayStr())+'T12:00:00');
      const sDay=Math.round((sDate-mOriginP)/86400000)+1;
      const eDay=Math.round((eDate-mOriginP)/86400000)+1;
      const clampS=Math.max(1,Math.min(daysInMonth,sDay));
      const clampE=Math.max(1,Math.min(daysInMonth,eDay));
      const leftPct=((clampS-1)/daysInMonth)*100;
      const wPct=Math.max(1.5,((clampE-clampS+1)/daysInMonth)*100);
      const isDone=!!t.done;
      const days=Math.max(1,Math.round((eDate-sDate)/86400000)+1);

// ══ 매일 반복 ══
function checkRecurring(){
  if(!state.recurringTasks||state.recurringTasks.length===0)return;
  const today=todayStr();
  if(new Date().getHours()<9)return; // 9시 이전엔 추가 안 함
  if(state.recurringLastDate===today)return; // 오늘 이미 추가함
  const nowTs=Date.now();
  state.recurringTasks.forEach(rt=>{
    const exists=state.tasks.some(t=>t.text===rt.text)||state.doneTasks.some(t=>t.text===rt.text);
    if(!exists){
      const task={id:state.nextId++,text:rt.text,registeredAt:nowTs,done:false,starred:rt.starred||false,isRecurring:true};
      state.tasks.push(task);scheduleAlarm(task);
    }
  });
  state.recurringLastDate=today;
  saveState();render();
}

function scheduleRecurringCheck(){
  const now=new Date();
  const next9=new Date(now.getFullYear(),now.getMonth(),now.getDate(),9,0,0,0);
  if(now>=next9)next9.setDate(next9.getDate()+1);
  setTimeout(()=>{checkRecurring();scheduleRecurringCheck();},next9-now);
}

function openRecurringModal(){
  renderRecurringBody();
  document.getElementById('recurringOverlay').classList.add('active');
  document.getElementById('recurringModal').classList.add('active');
}
function closeRecurringModal(){
  document.getElementById('recurringOverlay').classList.remove('active');
  document.getElementById('recurringModal').classList.remove('active');
}
let recurringEditId=null;
function renderRecurringBody(){
  const body=document.getElementById('recurringBody');
  if(!state.recurringTasks||state.recurringTasks.length===0){
    body.innerHTML='<div class="modal-empty">매일 자동 등록할 할 일이 없어요<br>아래에서 추가하세요 🔁</div>';return;
  }
  body.innerHTML=state.recurringTasks.map(rt=>{
    const isEd=recurringEditId===rt.id;
    return`<div class="recurring-item">
      <span style="font-size:14px">🔁</span>
      ${isEd
        ?`<input class="recurring-edit-input" id="rec-edit-${rt.id}" value="${escapeHtml(rt.text)}"
            onkeydown="saveRecurringEdit(event,${rt.id})" onblur="cancelRecurringEdit()" onclick="event.stopPropagation()">`
        :`<span class="recurring-item-text" onclick="startRecurringEdit(${rt.id})" title="클릭하여 수정">${escapeHtml(rt.text)}${rt.starred?' ⭐':''}</span>`}
      <button class="recurring-del-btn" onclick="removeRecurringTask(${rt.id})">×</button>
    </div>`;
  }).join('');
  if(recurringEditId){
    const inp=document.getElementById(`rec-edit-${recurringEditId}`);
    if(inp){inp.focus();inp.select();}
  }
}
function startRecurringEdit(id){recurringEditId=id;renderRecurringBody();}
function cancelRecurringEdit(){recurringEditId=null;renderRecurringBody();}
function saveRecurringEdit(e,id){
  if(e.key==='Escape'){cancelRecurringEdit();return;}
  if(e.key!=='Enter')return;
  const inp=document.getElementById(`rec-edit-${id}`);if(!inp)return;
  const newText=inp.value.trim();if(!newText)return;
  const rt=state.recurringTasks.find(r=>r.id===id);
  if(rt){
    const old=rt.text;rt.text=newText;
    state.tasks.filter(t=>t.isRecurring&&t.text===old).forEach(t=>t.text=newText);
    saveState();render();
  }
  recurringEditId=null;renderRecurringBody();
  showToast(`✏️ "<strong>${escapeHtml(newText)}</strong>" 수정 완료`,'edit');
}
function addRecurringTask(){
  const inp=document.getElementById('recurringInput');
  const text=inp.value.trim();if(!text)return;
  if(!state.recurringTasks)state.recurringTasks=[];
  state.recurringTasks.push({id:state.nextId++,text,starred:false});
  state.recurringLastDate=null; // 오늘치 다시 추가되도록
  inp.value='';saveState();renderRecurringBody();
  // 9시 이후라면 바로 추가
  if(new Date().getHours()>=9){
    const exists=state.tasks.some(t=>t.text===text)||state.doneTasks.some(t=>t.text===text);
    if(!exists){
      const task={id:state.nextId++,text,registeredAt:Date.now(),done:false,starred:false,isRecurring:true};
      state.tasks.push(task);scheduleAlarm(task);state.recurringLastDate=todayStr();saveState();render();
    }
  }
  showToast(`🔁 "<strong>${escapeHtml(text)}</strong>" 매일 자동 등록 추가!`,'success');
}
function removeRecurringTask(id){
  state.recurringTasks=state.recurringTasks.filter(rt=>rt.id!==id);
  saveState();renderRecurringBody();
}

// ══ 장기업무 ══
const LONG_STAGES=['시작','진행중','마무리'];

function toggleLongInput(){
  const row=document.getElementById('longAddRow');
  const btn=document.getElementById('longToggleBtn');
  const visible=row.style.display==='flex';
  row.style.display=visible?'none':'flex';
  btn.classList.toggle('on',!visible);
  if(!visible)document.getElementById('longTaskInput').focus();
}

function submitLongTask(){
  const inp=document.getElementById('longTaskInput');
  const text=inp.value.trim();if(!text)return;
  if(!state.longTasks)state.longTasks=[];
  const task={id:state.nextId++,text,starred:false,stage:0,startDate:null,endDate:null,createdAt:Date.now()};
  state.longTasks.push(task);
  saveState();renderLongTasks();inp.value='';
  if(state.tgNotif&&state.tgChatId)tgSend(`📌 <b>장기업무 추가됨</b>\n"${escapeHtml(text)}"`);
  showToast(`📌 "<strong>${escapeHtml(text)}</strong>" 장기업무 추가!`,'success');
}

let pendingLongComplete={};

function advanceLongStage(id){
  if(!state.longTasks)return;
  const t=state.longTasks.find(t=>t.id===id);if(!t)return;
  if(t.stage===3){startLongComplete(id);return;}
  const today=todayStr();
  if(t.stage===0){t.stage=1;t.startDate=today;}
  else if(t.stage===1){t.stage=2;}
  else if(t.stage===2){t.stage=3;}
  saveState();renderLongTasks();
}

function setLongStage(id,targetStage){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  if(t.stage===targetStage)return;
  if(pendingLongComplete[id]){clearTimeout(pendingLongComplete[id].timerId);delete pendingLongComplete[id];}
  const today=todayStr();
  if(targetStage>=1&&!t.startDate)t.startDate=today;
  if(targetStage===0)t.startDate=null;
  t.stage=targetStage;
  saveState();renderLongTasks();
}

function startLongComplete(id){
  if(pendingLongComplete[id]){
    clearTimeout(pendingLongComplete[id].timerId);delete pendingLongComplete[id];
    renderLongTasks();return;
  }
  const timerId=setTimeout(()=>{delete pendingLongComplete[id];_doCompleteLong(id);},2000);
  pendingLongComplete[id]={timerId};renderLongTasks();
}

function _doCompleteLong(id){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  const today=todayStr();
  const completed={...t,endDate:today,done:true,doneAt:Date.now()};
  if(!state.doneLongTasks)state.doneLongTasks=[];
  state.doneLongTasks.push(completed);
  state.longTasks=state.longTasks.filter(lt=>lt.id!==id);
  celebrate(t.text);
  if(state.tgChatId&&state.tgNotif)tgSend(`✅ <b>장기업무 완료!</b>\n"${escapeHtml(t.text)}"\n📅 ${t.startDate} → ${today}`);
  saveState();renderLongTasks();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}

function deleteLongTask(id){
  state.longTasks=(state.longTasks||[]).filter(t=>t.id!==id);
  saveState();renderLongTasks();
}

// 완료 탭 삭제
function deleteDoneTask(id){
  state.doneTasks=state.doneTasks.filter(t=>t.id!==id);
  saveState();renderDone();updateProgress();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}
function deleteDoneLongTask(id){
  state.doneLongTasks=(state.doneLongTasks||[]).filter(t=>t.id!==id);
  saveState();renderDone();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}

// 장기업무 되돌리기
function undoLongComplete(id){
  const idx=(state.doneLongTasks||[]).findIndex(t=>t.id===id);
  if(idx===-1)return;
  const t={...state.doneLongTasks[idx],done:false,endDate:null,doneAt:undefined};
  delete t.doneAt;
  state.doneLongTasks.splice(idx,1);
  if(!state.longTasks)state.longTasks=[];
  state.longTasks.push(t);
  saveState();renderDone();renderLongTasks();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
  showToast(`↩ "<strong>${escapeHtml(t.text)}</strong>" 장기업무 되돌렸어요`);
}

// 장기업무 관리 모달
let lmgmtEditInfo=null;
function openLongMgmtModal(){
  lmgmtEditInfo=null;renderLongMgmtModal();
  document.getElementById('lmgmtOverlay').classList.add('active');
  document.getElementById('lmgmtModal').classList.add('active');
}
function closeLongMgmtModal(){
  document.getElementById('lmgmtOverlay').classList.remove('active');
  document.getElementById('lmgmtModal').classList.remove('active');
  lmgmtEditInfo=null;
}
function renderLongMgmtModal(){
  const body=document.getElementById('lmgmtBody');
  const active=state.longTasks||[];
  const done=state.doneLongTasks||[];
  if(active.length===0&&done.length===0){
    body.innerHTML='<div class="modal-empty">장기업무가 없어요<br>할 일 탭에서 📌 버튼으로 추가하세요</div>';return;
  }
  let html='';
  if(active.length>0){
    html+=`<div class="lmgmt-section-title">진행 중 (${active.length})</div>`;
    html+=active.map(t=>{
      const isEditName=lmgmtEditInfo&&lmgmtEditInfo.id===t.id&&lmgmtEditInfo.field==='name';
      const isEditStart=lmgmtEditInfo&&lmgmtEditInfo.id===t.id&&lmgmtEditInfo.field==='start';
      const stageLabel=['미시작','시작','진행중','마무리'][t.stage];
      return`<div class="lmgmt-row">
        <div class="lmgmt-dot active"></div>
        ${isEditName
          ?`<input class="lmgmt-name-input" id="lmgmt-n-${t.id}" value="${escapeHtml(t.text)}"
              onkeydown="saveLmgmtName(event,${t.id},'active')" onblur="cancelLmgmtEdit()">`
          :`<div class="lmgmt-name" onclick="startLmgmtEdit(${t.id},'name')">${escapeHtml(t.text)}</div>`}
        <div class="lmgmt-date">
          ${isEditStart
            ?`<input type="date" value="${t.startDate||''}" onchange="saveLmgmtDate(event,${t.id},'start','active')" onblur="cancelLmgmtEdit()">`
            :`<span onclick="startLmgmtEdit(${t.id},'start')" style="cursor:pointer">${t.startDate||'미시작'}</span>`}
        </div>
        <span class="long-cur-stage s${t.stage}" style="font-size:10px">${stageLabel}</span>
        <button class="lmgmt-del" onclick="lmgmtDelete(${t.id},'active')">×</button>
      </div>`;
    }).join('');
  }
  if(done.length>0){
    html+=`<div class="lmgmt-section-title">완료 (${done.length})</div>`;
    html+=done.map(t=>{
      const isEditName=lmgmtEditInfo&&lmgmtEditInfo.id===t.id&&lmgmtEditInfo.field==='name';
      return`<div class="lmgmt-row">
        <div class="lmgmt-dot done"></div>
        ${isEditName
          ?`<input class="lmgmt-name-input" id="lmgmt-n-${t.id}" value="${escapeHtml(t.text)}"
              onkeydown="saveLmgmtName(event,${t.id},'done')" onblur="cancelLmgmtEdit()">`
          :`<div class="lmgmt-name" onclick="startLmgmtEdit(${t.id},'name')">${escapeHtml(t.text)}</div>`}
        <div class="lmgmt-date">${t.startDate||'?'} → ${t.endDate||'?'}</div>
        <button class="lmgmt-del" onclick="lmgmtDelete(${t.id},'done')">×</button>
      </div>`;
    }).join('');
  }
  body.innerHTML=html;
  if(lmgmtEditInfo){
    const inp=document.getElementById(`lmgmt-n-${lmgmtEditInfo.id}`);
    if(inp){inp.focus();inp.select();}
  }
}
function startLmgmtEdit(id,field){lmgmtEditInfo={id,field};renderLongMgmtModal();}
function cancelLmgmtEdit(){lmgmtEditInfo=null;renderLongMgmtModal();}
function saveLmgmtName(e,id,type){
  if(e.key==='Escape'){cancelLmgmtEdit();return;}
  if(e.key!=='Enter')return;
  const inp=document.getElementById(`lmgmt-n-${id}`);
  if(!inp)return;
  const newText=inp.value.trim();if(!newText)return;
  const arr=type==='active'?state.longTasks:state.doneLongTasks;
  const t=(arr||[]).find(t=>t.id===id);
  if(t){t.text=newText;saveState();renderLongTasks();}
  lmgmtEditInfo=null;renderLongMgmtModal();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}
function saveLmgmtDate(e,id,field,type){
  const val=e.target.value;
  const arr=type==='active'?state.longTasks:state.doneLongTasks;
  const t=(arr||[]).find(t=>t.id===id);
  if(t){t[field==='start'?'startDate':'endDate']=val;saveState();renderLongTasks();}
  lmgmtEditInfo=null;renderLongMgmtModal();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}
function lmgmtDelete(id,type){
  if(type==='active'){
    state.longTasks=(state.longTasks||[]).filter(t=>t.id!==id);
    renderLongTasks();
  }else{
    state.doneLongTasks=(state.doneLongTasks||[]).filter(t=>t.id!==id);
    renderDone();
  }
  saveState();renderLongMgmtModal();
  if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
}
function toggleLongStar(id){
  const t=(state.longTasks||[]).find(t=>t.id===id);if(!t)return;
  t.starred=!t.starred;saveState();renderLongTasks();
}

function renderLongTasks(){
  const container=document.getElementById('longTaskSection');
  if(!container)return;
  if(!state.longTasks||state.longTasks.length===0){container.innerHTML='';return;}
  let html=`<div class="long-section-label">📌 장기 업무 <span style="font-size:12px;color:#AEAEB2;font-weight:400">· 단계별 완료</span></div><div class="task-list">`;
  html+=state.longTasks.map(t=>{
    const isPend=!!pendingLongComplete[t.id];
    const sc=t.stage>0?`s${t.stage}`:'';
    const icon=isPend?'…':(t.stage===0?'→':t.stage===1?'②':t.stage===2?'③':'✓');
    const steps=[1,2,3].map(s=>{
      const cls=s<t.stage?'s-done':s===t.stage?'s-active':'';
      return`<div class="long-stage-step ${cls}" onclick="setLongStage(${t.id},${s})" title="${LONG_STAGES[s-1]}로 설정"></div>`;
    }).join('');
    const labels=LONG_STAGES.map((l,i)=>{
      const cls=(i+1)<t.stage?'s-done':(i+1)===t.stage?'s-active':'';
      return`<div class="long-stage-label ${cls}" onclick="setLongStage(${t.id},${i+1})" title="${l}로 설정">${l}</div>`;
    }).join('');
    return`<div class="long-task-item${isPend?' long-pending':''}" id="longtask-${t.id}">
      ${isPend?'<div class="pending-bar"></div>':''}
      <div class="long-task-top">
        <div class="long-check-btn ${sc}" onclick="advanceLongStage(${t.id})" title="${t.stage===3?'완료 (2초)':'다음 단계'}">${icon}</div>
        <div class="task-info">
          <div class="task-text">${escapeHtml(t.text)}</div>

// ══ 간트 차트 ══
function renderGantt(){
  const container=document.getElementById('ganttSection');
  if(!container)return;
  const allLong=[...(state.longTasks||[]),...(state.doneLongTasks||[])];
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const monthStart=`${calYear}-${pad(calMonth+1)}-01`;
  const monthEnd=`${calYear}-${pad(calMonth+1)}-${pad(daysInMonth)}`;
  const visible=allLong.filter(t=>{
    const s=t.startDate||t.endDate;
    if(!s)return false;
    const e=t.endDate||todayStr();
    return s<=monthEnd&&e>=monthStart;
  });
  if(visible.length===0){container.innerHTML='';return;}
  const mOrigin=new Date(`${calYear}-${pad(calMonth+1)}-01T00:00:00`);
  let html=`<div class="gantt-wrap"><div class="gantt-hdr" onclick="openLongMgmtModal()" title="클릭: 장기업무 관리">📊 장기업무 일정 (간트) <span style="font-size:10px;opacity:0.55;margin-left:4px">▸ 클릭해서 수정/삭제</span></div><div class="gantt-body">`;
  html+=visible.map(t=>{
    const sDate=new Date((t.startDate||todayStr())+'T12:00:00');
    const eDate=new Date((t.endDate||todayStr())+'T12:00:00');
    const sDay=Math.round((sDate-mOrigin)/86400000)+1;
    const eDay=Math.round((eDate-mOrigin)/86400000)+1;
    const clampS=Math.max(1,Math.min(daysInMonth,sDay));
    const clampE=Math.max(1,Math.min(daysInMonth,eDay));
    const leftPct=((clampS-1)/daysInMonth)*100;
    const wPct=Math.max(2,((clampE-clampS+1)/daysInMonth)*100);
    const isDone=!!t.done;
    const stageLabel=isDone?'완료':t.stage>0?LONG_STAGES[t.stage-1]:'미시작';
    const totalDays=Math.max(1,Math.round((eDate-sDate)/86400000)+1);
    const tipText=`${t.startDate||'?'} ~ ${t.endDate||todayStr()} (${totalDays}일)`;
    const stageIdx=isDone?-1:t.stage;
    const badgeCls=isDone?'s3':`s${stageIdx}`;
    const badgeLabel=isDone?'완료':['미시작','시작','진행중','마무리'][stageIdx];
    return`<div class="gantt-row">
      <div class="gantt-label" title="${escapeHtml(t.text)}">${t.starred?'⭐ ':''}${escapeHtml(t.text)}</div>
      <div class="gantt-bar-outer">
        <div class="gantt-track" style="position:absolute;inset:0;overflow:visible;">
          <div class="gantt-bar${isDone?'':' g-active'}" style="left:${leftPct.toFixed(1)}%;width:${wPct.toFixed(1)}%;">
            <div class="gantt-tip">${tipText}</div>
          </div>
        </div>
      </div>
      <div class="gantt-status">${isDone?`<span class="long-cur-stage s3">완료</span>`:`<span class="long-cur-stage ${badgeCls} gantt-stage-btn" onclick="openGanttStagePicker(event,${t.id})" title="클릭해서 단계 변경">${badgeLabel}</span>`}</div>
    </div>`;
  }).join('');
  html+='</div></div>';
  container.innerHTML=html;
}

function openGanttStagePicker(e,taskId){
  e.stopPropagation();
  const existing=document.getElementById('ganttStagePicker');
  if(existing){const wasThis=existing.dataset.taskId===String(taskId);existing.remove();if(wasThis)return;}
  const task=(state.longTasks||[]).find(t=>t.id==taskId);
  if(!task)return;
  const stageLabels=['미시작','시작','진행중','마무리'];
  const stageCls=['s0','s1','s2','s3'];
  const rect=e.currentTarget.getBoundingClientRect();
  const picker=document.createElement('div');
  picker.id='ganttStagePicker';
  picker.dataset.taskId=String(taskId);
  picker.style.cssText='position:fixed;z-index:9999;background:rgba(255,255,255,0.97);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);padding:5px 4px;display:flex;flex-direction:column;gap:2px;min-width:76px;backdrop-filter:blur(8px);border:1px solid rgba(205,180,219,0.3);';
  const totalH=stageLabels.length*34+10;
  const top=rect.bottom+4+totalH<window.innerHeight?rect.bottom+4:rect.top-totalH-4;
  picker.style.top=Math.max(4,top)+'px';
  picker.style.left=Math.max(4,rect.left-10)+'px';
  stageLabels.forEach((label,idx)=>{
    const btn=document.createElement('button');
    btn.textContent=label;
    const isCur=task.stage===idx;
    btn.style.cssText=`border:none;background:${isCur?'rgba(205,180,219,0.32)':'transparent'};padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;text-align:left;font-family:inherit;font-weight:${isCur?'600':'400'};color:#333;transition:background 0.12s;width:100%;`;
    btn.onmouseenter=()=>{if(!isCur)btn.style.background='rgba(205,180,219,0.15)';};
    btn.onmouseleave=()=>{btn.style.background=isCur?'rgba(205,180,219,0.32)':'transparent';};
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      task.stage=idx;
      saveState();
      render();renderLongTasks();
      if(document.getElementById('panel-cal').classList.contains('active'))renderCal();
      picker.remove();
      showToast(`단계 변경: <strong>${label}</strong>`);
    };
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  function closePicker(ev){if(!picker.contains(ev.target)){picker.remove();document.removeEventListener('click',closePicker,true);}}
  setTimeout(()=>document.addEventListener('click',closePicker,true),50);
}

// ══ Firebase Realtime DB 실시간 동기화 ══
let _fbSyncTimer=null;
let _fbListening=false;
let _fbLastWritten=0;
let _fbReady=false; // initFirebaseDB 완료 전엔 쓰기 차단

function debouncedFirebaseSync(){
  if(!_fbReady)return; // 초기화 전 Firebase 쓰기 방지
  if(_fbSyncTimer)clearTimeout(_fbSyncTimer);
  _fbSyncTimer=setTimeout(doFirebaseSync,1500);
}

function _buildFullPayload(){
  return{
    tasks:state.tasks,doneTasks:state.doneTasks,log:state.log,
    futureTasks:state.futureTasks,lastDate:state.lastDate,
    nextId:state.nextId,movedCount:state.movedCount,
    recurringTasks:state.recurringTasks||[],
    recurringLastDate:state.recurringLastDate||null,
    longTasks:state.longTasks||[],
    doneLongTasks:state.doneLongTasks||[],
    savedAt:state.savedAt
  };
}

async function doFirebaseSync(){
  try{
    if(!firebase.apps.length||!state.savedAt)return;
    _fbLastWritten=state.savedAt;
    await firebase.database().ref('ijma_v3').set(_buildFullPayload());
  }catch(e){console.warn('FB sync:',e);}
}

function _applyFirebaseRemote(remote){
  if(!remote||!remote.savedAt)return;
  if(remote.savedAt<=(_fbLastWritten||0))return;
  if(remote.savedAt<=(state.savedAt||0))return;
  if(editingId)return;
  const keep={
    tgChatId:state.tgChatId,tgNotif:state.tgNotif,
    tgOffset:Math.max(state.tgOffset||0,remote.tgOffset||0),
    syncMsgId:state.syncMsgId||remote.syncMsgId||null,
    fcmToken:state.fcmToken||remote.fcmToken||null
  };
  Object.assign(state,remote,keep);
  if(!state.recurringTasks)state.recurringTasks=[];
  if(!state.longTasks)state.longTasks=[];
  if(!state.doneLongTasks)state.doneLongTasks=[];
  if(!state.futureTasks)state.futureTasks={};
  try{localStorage.setItem('ijma_v3',JSON.stringify(state));}catch(e){}
  render();renderLongTasks();
}

function startFirebaseListener(){
  if(_fbListening)return;
  try{
    if(!firebase.apps.length)return;
    _fbListening=true;
    firebase.database().ref('ijma_v3').on('value',snap=>{
      _applyFirebaseRemote(snap.val());
    });
  }catch(e){console.warn('FB listener:',e);}
}

async function initFirebaseDB(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    const snap=await firebase.database().ref('ijma_v3').once('value');
    const remote=snap.val();
    if(remote&&remote.savedAt&&remote.savedAt>(state.savedAt||0)){
      // 원격이 더 최신 → 로컬 덮어쓰기
      _applyFirebaseRemote(remote);
    }
    _fbReady=true;
    // 로컬이 최신이면 Firebase에 업로드
    if(state.savedAt&&(!remote||!remote.savedAt||state.savedAt>=remote.savedAt)){
      await doFirebaseSync();
    }
    startFirebaseListener();
  }catch(e){console.warn('FB DB init:',e);}
}
